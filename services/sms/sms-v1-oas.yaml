openapi: 3.0.3
info:
  title: SMS API
  description: Outbound and inbound SMS messaging.
  version: 1.3.4
  contact:
    name: SMS Team
    email: sms@example.com
servers:
- url: https://api.example.com/sms/v1
  description: Production
- url: https://staging-api.example.com/sms/v1
  description: Staging
tags:
- name: Sms
  description: Sms resource operations.
- name: Health
  description: Service health checks.
paths:
  /sms:
    get:
      tags:
      - Sms
      summary: List sms
      operationId: listSm
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of sms.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Sms
      summary: Create sm
      operationId: createSm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSmRequest'
      responses:
        '201':
          description: Sm created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sm'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /sms/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Sms
      summary: Get sm by ID
      operationId: getSm
      responses:
        '200':
          description: Sm details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sm'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Sms
      summary: Update sm
      operationId: updateSm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSmRequest'
      responses:
        '200':
          description: Sm updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sm'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Sms
      summary: Delete sm
      operationId: deleteSm
      responses:
        '204':
          description: Sm deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /sms/search:
    post:
      tags:
      - Sms
      summary: Advanced search across sms
      operationId: searchSm
      description: Submit a structured query for complex filtering not expressible via the list endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      op:
                        type: string
                        enum:
                        - eq
                        - ne
                        - gt
                        - lt
                        - in
                        - contains
                      value: {}
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      direction:
                        type: string
                        enum:
                        - asc
                        - desc
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
                  maximum: 200
            example:
              filters:
              - field: status
                op: eq
                value: active
              - field: createdAt
                op: gt
                value: '2026-01-01T00:00:00Z'
              sort:
              - field: createdAt
                direction: desc
              page: 1
              limit: 50
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmList'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Sm:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - draft
          - published
          - archived
        notes: &id001
          type: string
        displayName: &id002
          type: string
        score: &id003
          type: number
          format: float
        verified: &id004
          type: boolean
        dueDate: &id005
          type: string
          format: date
        price: &id006
          type: number
          format: float
        total: &id007
          type: number
          format: float
        organizationId: &id008
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    SmList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Sm'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateSmRequest:
      type: object
      properties:
        notes: *id001
        displayName: *id002
        score: *id003
        verified: *id004
        dueDate: *id005
        price: *id006
        total: *id007
        organizationId: *id008
      required:
      - notes
      - displayName
    UpdateSmRequest:
      type: object
      properties:
        notes: *id001
        displayName: *id002
        score: *id003
        verified: *id004
        dueDate: *id005
        price: *id006
        total: *id007
        organizationId: *id008
      required:
      - notes
      - displayName
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
