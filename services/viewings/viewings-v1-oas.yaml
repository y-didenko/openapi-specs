openapi: 3.0.3
info:
  title: Viewings API
  description: Property viewing scheduling.
  version: 1.0.0
  contact:
    name: Viewings Team
    email: viewings@example.com
servers:
- url: https://api.example.com/viewings/v1
  description: Production
- url: https://staging-api.example.com/viewings/v1
  description: Staging
tags:
- name: Viewings
  description: Viewings resource operations.
- name: Health
  description: Service health checks.
paths:
  /viewings:
    get:
      tags:
      - Viewings
      summary: List viewings
      operationId: listViewing
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of viewings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewingList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Viewings
      summary: Create viewing
      operationId: createViewing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateViewingRequest'
      responses:
        '201':
          description: Viewing created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Viewing'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /viewings/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Viewings
      summary: Get viewing by ID
      operationId: getViewing
      responses:
        '200':
          description: Viewing details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Viewing'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Viewings
      summary: Update viewing
      operationId: updateViewing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateViewingRequest'
      responses:
        '200':
          description: Viewing updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Viewing'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Viewings
      summary: Delete viewing
      operationId: deleteViewing
      responses:
        '204':
          description: Viewing deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /viewings/stats:
    get:
      tags:
      - Viewings
      summary: Aggregate viewings stats
      operationId: getViewingStats
      description: Returns aggregate counters (totals, by status, by day) suitable for dashboards.
      parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Aggregate stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  byDay:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        count:
                          type: integer
                example:
                  total: 1234
                  byStatus:
                    active: 800
                    archived: 200
                    pending: 234
                  byDay:
                  - date: '2026-04-28'
                    count: 42
                  - date: '2026-04-29'
                    count: 51
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Viewing:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - new
          - in_progress
          - resolved
          - closed
        name: &id001
          type: string
        title: &id002
          type: string
        priority: &id003
          type: integer
        capacity: &id004
          type: integer
        enabled: &id005
          type: boolean
        expiresAt: &id006
          type: string
          format: date-time
        createdBy: &id007
          type: string
          format: uuid
        categoryId: &id008
          type: string
          format: uuid
        websiteUrl: &id009
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    ViewingList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Viewing'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateViewingRequest:
      type: object
      properties:
        name: *id001
        title: *id002
        priority: *id003
        capacity: *id004
        enabled: *id005
        expiresAt: *id006
        createdBy: *id007
        categoryId: *id008
        websiteUrl: *id009
      required:
      - name
      - title
    UpdateViewingRequest:
      type: object
      properties:
        name: *id001
        title: *id002
        priority: *id003
        capacity: *id004
        enabled: *id005
        expiresAt: *id006
        createdBy: *id007
        categoryId: *id008
        websiteUrl: *id009
      required:
      - name
      - title
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
