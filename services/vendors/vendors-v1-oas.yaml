openapi: 3.0.3
info:
  title: Vendors API
  description: Marketplace vendor onboarding and management.
  version: 1.3.4
  contact:
    name: Vendors Team
    email: vendors@example.com
servers:
- url: https://api.example.com/vendors/v1
  description: Production
- url: https://staging-api.example.com/vendors/v1
  description: Staging
tags:
- name: Vendors
  description: Vendors resource operations.
- name: Health
  description: Service health checks.
paths:
  /vendors:
    get:
      tags:
      - Vendors
      summary: List vendors
      operationId: listVendor
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of vendors.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Vendors
      summary: Create vendor
      operationId: createVendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVendorRequest'
      responses:
        '201':
          description: Vendor created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vendor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /vendors/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Vendors
      summary: Get vendor by ID
      operationId: getVendor
      responses:
        '200':
          description: Vendor details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vendor'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Vendors
      summary: Update vendor
      operationId: updateVendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVendorRequest'
      responses:
        '200':
          description: Vendor updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vendor'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Vendors
      summary: Delete vendor
      operationId: deleteVendor
      responses:
        '204':
          description: Vendor deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Vendor:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - scheduled
          - running
          - completed
          - failed
        summary: &id001
          type: string
        notes: &id002
          type: string
        archived: &id003
          type: boolean
        default: &id004
          type: boolean
        completedAt: &id005
          type: string
          format: date-time
        amount: &id006
          type: number
          format: float
        price: &id007
          type: number
          format: float
        ownerId: &id008
          type: string
          format: uuid
        organizationId: &id009
          type: string
          format: uuid
        phone: &id010
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    VendorList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Vendor'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateVendorRequest:
      type: object
      properties:
        summary: *id001
        notes: *id002
        archived: *id003
        default: *id004
        completedAt: *id005
        amount: *id006
        price: *id007
        ownerId: *id008
        organizationId: *id009
        phone: *id010
      required:
      - summary
      - notes
    UpdateVendorRequest:
      type: object
      properties:
        summary: *id001
        notes: *id002
        archived: *id003
        default: *id004
        completedAt: *id005
        amount: *id006
        price: *id007
        ownerId: *id008
        organizationId: *id009
        phone: *id010
      required:
      - summary
      - notes
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
