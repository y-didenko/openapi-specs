openapi: 3.0.3
info:
  title: Secrets API
  description: Encrypted secret storage.
  version: 2.1.0
  contact:
    name: Secrets Team
    email: secrets@example.com
servers:
- url: https://api.example.com/secrets/v1
  description: Production
- url: https://staging-api.example.com/secrets/v1
  description: Staging
tags:
- name: Secrets
  description: Secrets resource operations.
- name: Health
  description: Service health checks.
paths:
  /secrets:
    get:
      tags:
      - Secrets
      summary: List secrets
      operationId: listSecret
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of secrets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Secrets
      summary: Create secret
      operationId: createSecret
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSecretRequest'
      responses:
        '201':
          description: Secret created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Secret'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /secrets/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Secrets
      summary: Get secret by ID
      operationId: getSecret
      responses:
        '200':
          description: Secret details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Secret'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Secrets
      summary: Update secret
      operationId: updateSecret
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSecretRequest'
      responses:
        '200':
          description: Secret updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Secret'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Secrets
      summary: Delete secret
      operationId: deleteSecret
      responses:
        '204':
          description: Secret deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Secret:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - draft
          - published
          - archived
        name: &id001
          type: string
        reference: &id002
          type: string
        priority: &id003
          type: integer
        verified: &id004
          type: boolean
        active: &id005
          type: boolean
        endDate: &id006
          type: string
          format: date
        subtotal: &id007
          type: number
          format: float
        amount: &id008
          type: number
          format: float
        createdBy: &id009
          type: string
          format: uuid
        email: &id010
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    SecretList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Secret'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateSecretRequest:
      type: object
      properties:
        name: *id001
        reference: *id002
        priority: *id003
        verified: *id004
        active: *id005
        endDate: *id006
        subtotal: *id007
        amount: *id008
        createdBy: *id009
        email: *id010
      required:
      - name
      - reference
    UpdateSecretRequest:
      type: object
      properties:
        name: *id001
        reference: *id002
        priority: *id003
        verified: *id004
        active: *id005
        endDate: *id006
        subtotal: *id007
        amount: *id008
        createdBy: *id009
        email: *id010
      required:
      - name
      - reference
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
