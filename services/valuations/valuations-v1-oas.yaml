openapi: 3.0.3
info:
  title: Valuations API
  description: Automated property valuations.
  version: 2.0.0
  contact:
    name: Valuations Team
    email: valuations@example.com
servers:
- url: https://api.example.com/valuations/v1
  description: Production
- url: https://staging-api.example.com/valuations/v1
  description: Staging
tags:
- name: Valuations
  description: Valuations resource operations.
- name: Health
  description: Service health checks.
paths:
  /valuations:
    get:
      tags:
      - Valuations
      summary: List valuations
      operationId: listValuation
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of valuations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValuationList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Valuations
      summary: Create valuation
      operationId: createValuation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateValuationRequest'
      responses:
        '201':
          description: Valuation created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Valuation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /valuations/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Valuations
      summary: Get valuation by ID
      operationId: getValuation
      responses:
        '200':
          description: Valuation details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Valuation'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Valuations
      summary: Update valuation
      operationId: updateValuation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateValuationRequest'
      responses:
        '200':
          description: Valuation updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Valuation'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Valuations
      summary: Delete valuation
      operationId: deleteValuation
      responses:
        '204':
          description: Valuation deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Valuation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - open
          - closed
        name: &id001
          type: string
        notes: &id002
          type: string
        reference: &id003
          type: string
        active: &id004
          type: boolean
        visible: &id005
          type: boolean
        startDate: &id006
          type: string
          format: date
        completedAt: &id007
          type: string
          format: date-time
        currency: &id008
          type: string
        updatedBy: &id009
          type: string
          format: uuid
        createdBy: &id010
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    ValuationList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Valuation'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateValuationRequest:
      type: object
      properties:
        name: *id001
        notes: *id002
        reference: *id003
        active: *id004
        visible: *id005
        startDate: *id006
        completedAt: *id007
        currency: *id008
        updatedBy: *id009
        createdBy: *id010
      required:
      - name
      - notes
    UpdateValuationRequest:
      type: object
      properties:
        name: *id001
        notes: *id002
        reference: *id003
        active: *id004
        visible: *id005
        startDate: *id006
        completedAt: *id007
        currency: *id008
        updatedBy: *id009
        createdBy: *id010
      required:
      - name
      - notes
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
