      summary: Upload attachment
      operationId: uploadPolicyAttachment
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                description:
                  type: string
              required:
              - file
      responses:
