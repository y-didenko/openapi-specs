openapi: 3.0.3
info:
  title: Catalog API
  description: Product catalog browsing with categories, search, and merchandising.
  version: 2.0.0
  contact:
    name: Catalog Team
    email: catalog@example.com
servers:
- url: https://api.example.com/catalog/v1
  description: Production
- url: https://staging-api.example.com/catalog/v1
  description: Staging
tags:
- name: Catalog
  description: Catalog resource operations.
- name: History
  description: History resource operations.
- name: Logs
  description: Logs resource operations.
- name: Policies
  description: Policies resource operations.
- name: Health
  description: Service health checks.
paths:
  /catalog:
    get:
      tags:
      - Catalog
      summary: List catalog
      operationId: listCatalog
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of catalog.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
      description: Returns a paginated list of catalog. Supports status and free-text filters.
    post:
      tags:
      - Catalog
      summary: Create catalog
      operationId: createCatalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCatalogRequest'
      responses:
        '201':
          description: Catalog created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Catalog'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
      description: Creates a new catalog record.
  /catalog/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Catalog
      summary: Get catalog by ID
      operationId: getCatalog
      responses:
        '200':
          description: Catalog details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Catalog'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Catalog
      summary: Update catalog
      operationId: updateCatalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCatalogRequest'
      responses:
        '200':
          description: Catalog updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Catalog'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Catalog
      summary: Delete catalog
      operationId: deleteCatalog
      responses:
        '204':
          description: Catalog deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /catalog/bulk:
    post:
      tags:
      - Catalog
      summary: Bulk create catalog
      operationId: bulkCreateCatalog
      description: Create up to 500 records in a single request. Returns per-row results.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items:
                    $ref: '#/components/schemas/CreateCatalogRequest'
              required:
              - items
      responses:
        '200':
          description: Bulk operation results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  succeeded:
                    type: integer
                  failed:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        id:
                          type: string
                          format: uuid
                          nullable: true
                        error:
                          type: string
                          nullable: true
      security:
      - bearerAuth: []
    delete:
      tags:
      - Catalog
      summary: Bulk delete catalog
      operationId: bulkDeleteCatalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
              required:
              - ids
      responses:
        '200':
          description: Deletion summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                  skipped:
                    type: integer
      security:
      - bearerAuth: []
  /catalog/search:
    post:
      tags:
      - Catalog
      summary: Advanced search across catalog
      operationId: searchCatalog
      description: Submit a structured query for complex filtering not expressible via the list endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      op:
                        type: string
                        enum:
                        - eq
                        - ne
                        - gt
                        - lt
                        - in
                        - contains
                      value: {}
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      direction:
                        type: string
                        enum:
                        - asc
                        - desc
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
                  maximum: 200
            example:
              filters:
              - field: status
                op: eq
                value: active
              - field: createdAt
                op: gt
                value: '2026-01-01T00:00:00Z'
              sort:
              - field: createdAt
                direction: desc
              page: 1
              limit: 50
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogList'
      security:
      - bearerAuth: []
  /catalog/stats:
    get:
      tags:
      - Catalog
      summary: Aggregate catalog stats
      operationId: getCatalogStats
      description: Returns aggregate counters (totals, by status, by day) suitable for dashboards.
      parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Aggregate stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  byDay:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        count:
                          type: integer
                example:
                  total: 1234
                  byStatus:
                    active: 800
                    archived: 200
                    pending: 234
                  byDay:
                  - date: '2026-04-28'
                    count: 42
                  - date: '2026-04-29'
                    count: 51
      security:
      - bearerAuth: []
  /catalog/{id}/attachments:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Catalog
      summary: List attachments
      operationId: listCatalogAttachments
      responses:
        '200':
          description: Attachments list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attachment'
      security:
      - bearerAuth: []
    post:
      tags:
      - Catalog
      summary: Upload attachment
      operationId: uploadCatalogAttachment
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                description:
                  type: string
              required:
              - file
      responses:
        '201':
          description: Attachment created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
      security:
      - bearerAuth: []
  /catalog/{id}/comments:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
