openapi: 3.0.3
info:
  title: Events API
  description: Public events and RSVPs.
  version: 2.0.0
  contact:
    name: Events Team
    email: events@example.com
servers:
- url: https://api.example.com/events/v1
  description: Production
- url: https://staging-api.example.com/events/v1
  description: Staging
tags:
- name: Events
  description: Events resource operations.
- name: Links
  description: Links resource operations.
- name: Health
  description: Service health checks.
paths:
  /events:
    get:
      tags:
      - Events
      summary: List events
      operationId: listEvent
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Events
      summary: Create event
      operationId: createEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventRequest'
      responses:
        '201':
          description: Event created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /events/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Events
      summary: Get event by ID
      operationId: getEvent
      responses:
        '200':
          description: Event details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Events
      summary: Update event
      operationId: updateEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventRequest'
      responses:
        '200':
          description: Event updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Events
      summary: Delete event
      operationId: deleteEvent
      responses:
        '204':
          description: Event deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /links:
    get:
      tags:
      - Links
      summary: List links
      operationId: listLink
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of links.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Links
      summary: Create link
      operationId: createLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLinkRequest'
      responses:
        '201':
          description: Link created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /links/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Links
      summary: Get link by ID
      operationId: getLink
      responses:
        '200':
          description: Link details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Links
      summary: Update link
      operationId: updateLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLinkRequest'
      responses:
        '200':
          description: Link updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Links
      summary: Delete link
      operationId: deleteLink
      responses:
        '204':
          description: Link deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Event:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - scheduled
          - running
          - completed
          - failed
        externalId: &id001
          type: string
        code: &id002
          type: string
        threshold: &id003
          type: number
          format: float
        score: &id004
          type: number
          format: float
        active: &id005
          type: boolean
        locked: &id006
          type: boolean
        completedAt: &id007
          type: string
          format: date-time
        endDate: &id008
          type: string
          format: date
        currency: &id009
          type: string
        teamId: &id010
          type: string
          format: uuid
        createdBy: &id011
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    EventList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateEventRequest:
      type: object
      properties:
        externalId: *id001
        code: *id002
        threshold: *id003
        score: *id004
        active: *id005
        locked: *id006
        completedAt: *id007
        endDate: *id008
        currency: *id009
        teamId: *id010
        createdBy: *id011
      required:
      - externalId
      - code
    UpdateEventRequest:
      type: object
      properties:
        externalId: *id001
        code: *id002
        threshold: *id003
        score: *id004
        active: *id005
        locked: *id006
        completedAt: *id007
        endDate: *id008
        currency: *id009
        teamId: *id010
        createdBy: *id011
      required:
      - externalId
      - code
    Link:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - active
          - inactive
          - archived
        code: &id012
          type: string
        displayName: &id013
          type: string
        title: &id014
          type: string
        score: &id015
          type: number
          format: float
        verified: &id016
          type: boolean
        dueDate: &id017
          type: string
          format: date
        completedAt: &id018
          type: string
          format: date-time
        ownerId: &id019
          type: string
          format: uuid
        phone: &id020
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    LinkList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Link'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateLinkRequest:
      type: object
      properties:
        code: *id012
        displayName: *id013
        title: *id014
        score: *id015
        verified: *id016
        dueDate: *id017
        completedAt: *id018
        ownerId: *id019
        phone: *id020
      required:
      - code
      - displayName
    UpdateLinkRequest:
      type: object
      properties:
        code: *id012
        displayName: *id013
        title: *id014
        score: *id015
        verified: *id016
        dueDate: *id017
        completedAt: *id018
        ownerId: *id019
        phone: *id020
      required:
      - code
      - displayName
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
