openapi: 3.0.3
info:
  title: Leads API
  description: Inbound lead capture.
  version: 1.1.0
  contact:
    name: Leads Team
    email: leads@example.com
servers:
- url: https://api.example.com/leads/v1
  description: Production
- url: https://staging-api.example.com/leads/v1
  description: Staging
tags:
- name: Leads
  description: Leads resource operations.
- name: Imports
  description: Imports resource operations.
- name: Health
  description: Service health checks.
paths:
  /leads:
    get:
      tags:
      - Leads
      summary: List leads
      operationId: listLead
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of leads.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Leads
      summary: Create lead
      operationId: createLead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLeadRequest'
      responses:
        '201':
          description: Lead created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lead'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /leads/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Leads
      summary: Get lead by ID
      operationId: getLead
      responses:
        '200':
          description: Lead details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lead'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Leads
      summary: Update lead
      operationId: updateLead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLeadRequest'
      responses:
        '200':
          description: Lead updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lead'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Leads
      summary: Delete lead
      operationId: deleteLead
      responses:
        '204':
          description: Lead deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /leads/stats:
    get:
      tags:
      - Leads
      summary: Aggregate leads stats
      operationId: getLeadStats
      description: Returns aggregate counters (totals, by status, by day) suitable for dashboards.
      parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Aggregate stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  byDay:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        count:
                          type: integer
                example:
                  total: 1234
                  byStatus:
                    active: 800
                    archived: 200
                    pending: 234
                  byDay:
                  - date: '2026-04-28'
                    count: 42
                  - date: '2026-04-29'
                    count: 51
      security:
      - bearerAuth: []
  /imports:
    get:
      tags:
      - Imports
      summary: List imports
      operationId: listImport
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of imports.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Imports
      summary: Create import
      operationId: createImport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImportRequest'
      responses:
        '201':
          description: Import created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Import'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /imports/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Imports
      summary: Get import by ID
      operationId: getImport
      responses:
        '200':
          description: Import details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Import'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Imports
      summary: Update import
      operationId: updateImport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateImportRequest'
      responses:
        '200':
          description: Import updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Import'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Imports
      summary: Delete import
      operationId: deleteImport
      responses:
        '204':
          description: Import deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Lead:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - scheduled
          - running
          - completed
          - failed
        code: &id001
          type: string
        reference: &id002
          type: string
        name: &id003
          type: string
        locked: &id004
          type: boolean
        enabled: &id005
          type: boolean
        expiresAt: &id006
          type: string
          format: date-time
        total: &id007
          type: number
          format: float
        discount: &id008
          type: number
          format: float
        tagId: &id009
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    LeadList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Lead'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateLeadRequest:
      type: object
      properties:
        code: *id001
        reference: *id002
        name: *id003
        locked: *id004
        enabled: *id005
        expiresAt: *id006
        total: *id007
        discount: *id008
        tagId: *id009
      required:
      - code
      - reference
    UpdateLeadRequest:
      type: object
      properties:
        code: *id001
        reference: *id002
        name: *id003
        locked: *id004
        enabled: *id005
        expiresAt: *id006
        total: *id007
        discount: *id008
        tagId: *id009
      required:
      - code
      - reference
    Import:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - open
          - closed
        slug: &id010
          type: string
        name: &id011
          type: string
        rank: &id012
          type: integer
        visible: &id013
          type: boolean
        locked: &id014
          type: boolean
        startDate: &id015
          type: string
          format: date
        completedAt: &id016
          type: string
          format: date-time
        parentId: &id017
          type: string
          format: uuid
        categoryId: &id018
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    ImportList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Import'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateImportRequest:
      type: object
      properties:
        slug: *id010
        name: *id011
        rank: *id012
        visible: *id013
        locked: *id014
        startDate: *id015
        completedAt: *id016
        parentId: *id017
        categoryId: *id018
      required:
      - slug
      - name
    UpdateImportRequest:
      type: object
      properties:
        slug: *id010
        name: *id011
        rank: *id012
        visible: *id013
        locked: *id014
        startDate: *id015
        completedAt: *id016
        parentId: *id017
        categoryId: *id018
      required:
      - slug
      - name
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
