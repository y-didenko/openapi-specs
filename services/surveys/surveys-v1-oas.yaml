openapi: 3.0.3
info:
  title: Surveys API
  description: Customer surveys and responses.
  version: 1.0.0
  contact:
    name: Surveys Team
    email: surveys@example.com
servers:
- url: https://api.example.com/surveys/v1
  description: Production
- url: https://staging-api.example.com/surveys/v1
  description: Staging
tags:
- name: Surveys
  description: Surveys resource operations.
- name: Links
  description: Links resource operations.
- name: Health
  description: Service health checks.
paths:
  /surveys:
    get:
      tags:
      - Surveys
      summary: List surveys
      operationId: listSurvey
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of surveys.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SurveyList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Surveys
      summary: Create survey
      operationId: createSurvey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSurveyRequest'
      responses:
        '201':
          description: Survey created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Survey'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /surveys/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Surveys
      summary: Get survey by ID
      operationId: getSurvey
      responses:
        '200':
          description: Survey details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Survey'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Surveys
      summary: Update survey
      operationId: updateSurvey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSurveyRequest'
      responses:
        '200':
          description: Survey updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Survey'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Surveys
      summary: Delete survey
      operationId: deleteSurvey
      responses:
        '204':
          description: Survey deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /surveys/stats:
    get:
      tags:
      - Surveys
      summary: Aggregate surveys stats
      operationId: getSurveyStats
      description: Returns aggregate counters (totals, by status, by day) suitable for dashboards.
      parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Aggregate stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  byDay:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        count:
                          type: integer
                example:
                  total: 1234
                  byStatus:
                    active: 800
                    archived: 200
                    pending: 234
                  byDay:
                  - date: '2026-04-28'
                    count: 42
                  - date: '2026-04-29'
                    count: 51
      security:
      - bearerAuth: []
  /links:
    get:
      tags:
      - Links
      summary: List links
      operationId: listLink
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of links.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Links
      summary: Create link
      operationId: createLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLinkRequest'
      responses:
        '201':
          description: Link created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /links/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Links
      summary: Get link by ID
      operationId: getLink
      responses:
        '200':
          description: Link details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Links
      summary: Update link
      operationId: updateLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLinkRequest'
      responses:
        '200':
          description: Link updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Links
      summary: Delete link
      operationId: deleteLink
      responses:
        '204':
          description: Link deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Survey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - approved
          - rejected
        externalId: &id001
          type: string
        summary: &id002
          type: string
        code: &id003
          type: string
        default: &id004
          type: boolean
        lastSeenAt: &id005
          type: string
          format: date-time
        scheduledAt: &id006
          type: string
          format: date-time
        total: &id007
          type: number
          format: float
        price: &id008
          type: number
          format: float
        tagId: &id009
          type: string
          format: uuid
        teamId: &id010
          type: string
          format: uuid
        phone: &id011
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    SurveyList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Survey'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateSurveyRequest:
      type: object
      properties:
        externalId: *id001
        summary: *id002
        code: *id003
        default: *id004
        lastSeenAt: *id005
        scheduledAt: *id006
        total: *id007
        price: *id008
        tagId: *id009
        teamId: *id010
        phone: *id011
      required:
      - externalId
      - summary
    UpdateSurveyRequest:
      type: object
      properties:
        externalId: *id001
        summary: *id002
        code: *id003
        default: *id004
        lastSeenAt: *id005
        scheduledAt: *id006
        total: *id007
        price: *id008
        tagId: *id009
        teamId: *id010
        phone: *id011
      required:
      - externalId
      - summary
    Link:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - new
          - in_progress
          - resolved
          - closed
        summary: &id012
          type: string
        reference: &id013
          type: string
        locked: &id014
          type: boolean
        dueDate: &id015
          type: string
          format: date
        categoryId: &id016
          type: string
          format: uuid
        parentId: &id017
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    LinkList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Link'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateLinkRequest:
      type: object
      properties:
        summary: *id012
        reference: *id013
        locked: *id014
        dueDate: *id015
        categoryId: *id016
        parentId: *id017
      required:
      - summary
      - reference
    UpdateLinkRequest:
      type: object
      properties:
        summary: *id012
        reference: *id013
        locked: *id014
        dueDate: *id015
        categoryId: *id016
        parentId: *id017
      required:
      - summary
      - reference
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
