openapi: 3.0.3
info:
  title: Shipping Rates API
  description: Real-time shipping rate quotes for carriers.
  version: 1.1.0
  contact:
    name: Shipping Rates Team
    email: shippingrates@example.com
servers:
- url: https://api.example.com/shipping-rates/v1
  description: Production
- url: https://staging-api.example.com/shipping-rates/v1
  description: Staging
tags:
- name: Shipping Rates
  description: Shipping Rates resource operations.
- name: Health
  description: Service health checks.
paths:
  /shipping-rates:
    get:
      tags:
      - Shipping Rates
      summary: List shipping rates
      operationId: listShippingRate
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of shipping rates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShippingRateList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Shipping Rates
      summary: Create shipping rate
      operationId: createShippingRate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShippingRateRequest'
      responses:
        '201':
          description: Shipping Rate created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShippingRate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /shipping-rates/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Shipping Rates
      summary: Get shipping rate by ID
      operationId: getShippingRate
      responses:
        '200':
          description: Shipping Rate details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShippingRate'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Shipping Rates
      summary: Update shipping rate
      operationId: updateShippingRate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateShippingRateRequest'
      responses:
        '200':
          description: Shipping Rate updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShippingRate'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Shipping Rates
      summary: Delete shipping rate
      operationId: deleteShippingRate
      responses:
        '204':
          description: Shipping Rate deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    ShippingRate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - scheduled
          - running
          - completed
          - failed
        notes: &id001
          type: string
        slug: &id002
          type: string
        name: &id003
          type: string
        active: &id004
          type: boolean
        dueDate: &id005
          type: string
          format: date
        scheduledAt: &id006
          type: string
          format: date-time
        parentId: &id007
          type: string
          format: uuid
        phone: &id008
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    ShippingRateList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ShippingRate'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateShippingRateRequest:
      type: object
      properties:
        notes: *id001
        slug: *id002
        name: *id003
        active: *id004
        dueDate: *id005
        scheduledAt: *id006
        parentId: *id007
        phone: *id008
      required:
      - notes
      - slug
    UpdateShippingRateRequest:
      type: object
      properties:
        notes: *id001
        slug: *id002
        name: *id003
        active: *id004
        dueDate: *id005
        scheduledAt: *id006
        parentId: *id007
        phone: *id008
      required:
      - notes
      - slug
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
