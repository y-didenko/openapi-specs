openapi: 3.0.3
info:
  title: Recruitment API
  description: Job postings, candidates, and pipelines.
  version: 1.1.0
  contact:
    name: Recruitment Team
    email: recruitment@example.com
servers:
- url: https://api.example.com/recruitment/v1
  description: Production
- url: https://staging-api.example.com/recruitment/v1
  description: Staging
tags:
- name: Recruitment
  description: Recruitment resource operations.
- name: Health
  description: Service health checks.
paths:
  /recruitment:
    get:
      tags:
      - Recruitment
      summary: List recruitment
      operationId: listRecruitment
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of recruitment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecruitmentList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Recruitment
      summary: Create recruitment
      operationId: createRecruitment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecruitmentRequest'
      responses:
        '201':
          description: Recruitment created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recruitment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /recruitment/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Recruitment
      summary: Get recruitment by ID
      operationId: getRecruitment
      responses:
        '200':
          description: Recruitment details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recruitment'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Recruitment
      summary: Update recruitment
      operationId: updateRecruitment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRecruitmentRequest'
      responses:
        '200':
          description: Recruitment updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recruitment'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Recruitment
      summary: Delete recruitment
      operationId: deleteRecruitment
      responses:
        '204':
          description: Recruitment deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Recruitment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - draft
          - published
          - archived
        reference: &id001
          type: string
        externalId: &id002
          type: string
        verified: &id003
          type: boolean
        expiresAt: &id004
          type: string
          format: date-time
        currency: &id005
          type: string
        parentId: &id006
          type: string
          format: uuid
        updatedBy: &id007
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    RecruitmentList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Recruitment'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateRecruitmentRequest:
      type: object
      properties:
        reference: *id001
        externalId: *id002
        verified: *id003
        expiresAt: *id004
        currency: *id005
        parentId: *id006
        updatedBy: *id007
      required:
      - reference
      - externalId
    UpdateRecruitmentRequest:
      type: object
      properties:
        reference: *id001
        externalId: *id002
        verified: *id003
        expiresAt: *id004
        currency: *id005
        parentId: *id006
        updatedBy: *id007
      required:
      - reference
      - externalId
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
