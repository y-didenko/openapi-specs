openapi: 3.0.3
info:
  title: Employees API
  description: Employee records and lifecycle.
  version: 2.0.0
  contact:
    name: Employees Team
    email: employees@example.com
servers:
- url: https://api.example.com/employees/v1
  description: Production
- url: https://staging-api.example.com/employees/v1
  description: Staging
tags:
- name: Employees
  description: Employees resource operations.
- name: Links
  description: Links resource operations.
- name: Health
  description: Service health checks.
paths:
  /employees:
    get:
      tags:
      - Employees
      summary: List employees
      operationId: listEmployee
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of employees.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Employees
      summary: Create employee
      operationId: createEmployee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmployeeRequest'
      responses:
        '201':
          description: Employee created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /employees/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Employees
      summary: Get employee by ID
      operationId: getEmployee
      responses:
        '200':
          description: Employee details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Employees
      summary: Update employee
      operationId: updateEmployee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmployeeRequest'
      responses:
        '200':
          description: Employee updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Employees
      summary: Delete employee
      operationId: deleteEmployee
      responses:
        '204':
          description: Employee deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /links:
    get:
      tags:
      - Links
      summary: List links
      operationId: listLink
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of links.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Links
      summary: Create link
      operationId: createLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLinkRequest'
      responses:
        '201':
          description: Link created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /links/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Links
      summary: Get link by ID
      operationId: getLink
      responses:
        '200':
          description: Link details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Links
      summary: Update link
      operationId: updateLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLinkRequest'
      responses:
        '200':
          description: Link updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Links
      summary: Delete link
      operationId: deleteLink
      responses:
        '204':
          description: Link deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Employee:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - approved
          - rejected
        displayName: &id001
          type: string
        description: &id002
          type: string
        externalId: &id003
          type: string
        weight: &id004
          type: number
          format: float
        capacity: &id005
          type: integer
        archived: &id006
          type: boolean
        locked: &id007
          type: boolean
        dueDate: &id008
          type: string
          format: date
        fee: &id009
          type: number
          format: float
        discount: &id010
          type: number
          format: float
        tagId: &id011
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    EmployeeList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Employee'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateEmployeeRequest:
      type: object
      properties:
        displayName: *id001
        description: *id002
        externalId: *id003
        weight: *id004
        capacity: *id005
        archived: *id006
        locked: *id007
        dueDate: *id008
        fee: *id009
        discount: *id010
        tagId: *id011
      required:
      - displayName
      - description
    UpdateEmployeeRequest:
      type: object
      properties:
        displayName: *id001
        description: *id002
        externalId: *id003
        weight: *id004
        capacity: *id005
        archived: *id006
        locked: *id007
        dueDate: *id008
        fee: *id009
        discount: *id010
        tagId: *id011
      required:
      - displayName
      - description
    Link:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - scheduled
          - running
          - completed
          - failed
        description: &id012
          type: string
        notes: &id013
          type: string
        code: &id014
          type: string
        weight: &id015
          type: number
          format: float
        capacity: &id016
          type: integer
        visible: &id017
          type: boolean
        endDate: &id018
          type: string
          format: date
        lastSeenAt: &id019
          type: string
          format: date-time
        total: &id020
          type: number
          format: float
        createdBy: &id021
          type: string
          format: uuid
        parentId: &id022
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    LinkList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Link'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateLinkRequest:
      type: object
      properties:
        description: *id012
        notes: *id013
        code: *id014
        weight: *id015
        capacity: *id016
        visible: *id017
        endDate: *id018
        lastSeenAt: *id019
        total: *id020
        createdBy: *id021
        parentId: *id022
      required:
      - description
      - notes
    UpdateLinkRequest:
      type: object
      properties:
        description: *id012
        notes: *id013
        code: *id014
        weight: *id015
        capacity: *id016
        visible: *id017
        endDate: *id018
        lastSeenAt: *id019
        total: *id020
        createdBy: *id021
        parentId: *id022
      required:
      - description
      - notes
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
