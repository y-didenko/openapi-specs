openapi: 3.0.3
info:
  title: Classrooms API
  description: Classroom assignments and capacity.
  version: 2.1.0
  contact:
    name: Classrooms Team
    email: classrooms@example.com
servers:
- url: https://api.example.com/classrooms/v1
  description: Production
- url: https://staging-api.example.com/classrooms/v1
  description: Staging
tags:
- name: Classrooms
  description: Classrooms resource operations.
- name: Health
  description: Service health checks.
paths:
  /classrooms:
    get:
      tags:
      - Classrooms
      summary: List classrooms
      operationId: listClassroom
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of classrooms.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassroomList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Classrooms
      summary: Create classroom
      operationId: createClassroom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClassroomRequest'
      responses:
        '201':
          description: Classroom created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Classroom'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /classrooms/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Classrooms
      summary: Get classroom by ID
      operationId: getClassroom
      responses:
        '200':
          description: Classroom details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Classroom'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Classrooms
      summary: Update classroom
      operationId: updateClassroom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClassroomRequest'
      responses:
        '200':
          description: Classroom updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Classroom'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Classrooms
      summary: Delete classroom
      operationId: deleteClassroom
      responses:
        '204':
          description: Classroom deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /classrooms/stats:
    get:
      tags:
      - Classrooms
      summary: Aggregate classrooms stats
      operationId: getClassroomStats
      description: Returns aggregate counters (totals, by status, by day) suitable for dashboards.
      parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Aggregate stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  byDay:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        count:
                          type: integer
                example:
                  total: 1234
                  byStatus:
                    active: 800
                    archived: 200
                    pending: 234
                  byDay:
                  - date: '2026-04-28'
                    count: 42
                  - date: '2026-04-29'
                    count: 51
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Classroom:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - queued
          - processing
          - completed
          - failed
          - cancelled
        externalId: &id001
          type: string
        notes: &id002
          type: string
        priority: &id003
          type: integer
        count: &id004
          type: integer
        default: &id005
          type: boolean
        scheduledAt: &id006
          type: string
          format: date-time
        total: &id007
          type: number
          format: float
        fee: &id008
          type: number
          format: float
        teamId: &id009
          type: string
          format: uuid
        websiteUrl: &id010
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    ClassroomList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Classroom'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateClassroomRequest:
      type: object
      properties:
        externalId: *id001
        notes: *id002
        priority: *id003
        count: *id004
        default: *id005
        scheduledAt: *id006
        total: *id007
        fee: *id008
        teamId: *id009
        websiteUrl: *id010
      required:
      - externalId
      - notes
    UpdateClassroomRequest:
      type: object
      properties:
        externalId: *id001
        notes: *id002
        priority: *id003
        count: *id004
        default: *id005
        scheduledAt: *id006
        total: *id007
        fee: *id008
        teamId: *id009
        websiteUrl: *id010
      required:
      - externalId
      - notes
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
