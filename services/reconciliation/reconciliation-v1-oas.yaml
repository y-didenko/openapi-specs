openapi: 3.0.3
info:
  title: Reconciliation API
  description: Bank/ledger reconciliation jobs.
  version: 2.1.0
  contact:
    name: Reconciliation Team
    email: reconciliation@example.com
servers:
- url: https://api.example.com/reconciliation/v1
  description: Production
- url: https://staging-api.example.com/reconciliation/v1
  description: Staging
tags:
- name: Reconciliation
  description: Reconciliation resource operations.
- name: Templates
  description: Templates resource operations.
- name: Health
  description: Service health checks.
paths:
  /reconciliation:
    get:
      tags:
      - Reconciliation
      summary: List reconciliation
      operationId: listReconciliation
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of reconciliation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Reconciliation
      summary: Create reconciliation
      operationId: createReconciliation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReconciliationRequest'
      responses:
        '201':
          description: Reconciliation created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reconciliation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /reconciliation/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Reconciliation
      summary: Get reconciliation by ID
      operationId: getReconciliation
      responses:
        '200':
          description: Reconciliation details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reconciliation'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Reconciliation
      summary: Update reconciliation
      operationId: updateReconciliation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReconciliationRequest'
      responses:
        '200':
          description: Reconciliation updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reconciliation'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Reconciliation
      summary: Delete reconciliation
      operationId: deleteReconciliation
      responses:
        '204':
          description: Reconciliation deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /reconciliation/search:
    post:
      tags:
      - Reconciliation
      summary: Advanced search across reconciliation
      operationId: searchReconciliation
      description: Submit a structured query for complex filtering not expressible via the list endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      op:
                        type: string
                        enum:
                        - eq
                        - ne
                        - gt
                        - lt
                        - in
                        - contains
                      value: {}
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      direction:
                        type: string
                        enum:
                        - asc
                        - desc
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
                  maximum: 200
            example:
              filters:
              - field: status
                op: eq
                value: active
              - field: createdAt
                op: gt
                value: '2026-01-01T00:00:00Z'
              sort:
              - field: createdAt
                direction: desc
              page: 1
              limit: 50
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationList'
      security:
      - bearerAuth: []
  /templates:
    get:
      tags:
      - Templates
      summary: List templates
      operationId: listTemplate
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of templates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Templates
      summary: Create template
      operationId: createTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
      responses:
        '201':
          description: Template created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /templates/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Templates
      summary: Get template by ID
      operationId: getTemplate
      responses:
        '200':
          description: Template details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Templates
      summary: Update template
      operationId: updateTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateRequest'
      responses:
        '200':
          description: Template updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Templates
      summary: Delete template
      operationId: deleteTemplate
      responses:
        '204':
          description: Template deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Reconciliation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - new
          - in_progress
          - resolved
          - closed
        description: &id001
          type: string
        title: &id002
          type: string
        name: &id003
          type: string
        threshold: &id004
          type: number
          format: float
        archived: &id005
          type: boolean
        visible: &id006
          type: boolean
        publishedAt: &id007
          type: string
          format: date-time
        tagId: &id008
          type: string
          format: uuid
        ownerId: &id009
          type: string
          format: uuid
        phone: &id010
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    ReconciliationList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Reconciliation'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateReconciliationRequest:
      type: object
      properties:
        description: *id001
        title: *id002
        name: *id003
        threshold: *id004
        archived: *id005
        visible: *id006
        publishedAt: *id007
        tagId: *id008
        ownerId: *id009
        phone: *id010
      required:
      - description
      - title
    UpdateReconciliationRequest:
      type: object
      properties:
        description: *id001
        title: *id002
        name: *id003
        threshold: *id004
        archived: *id005
        visible: *id006
        publishedAt: *id007
        tagId: *id008
        ownerId: *id009
        phone: *id010
      required:
      - description
      - title
    Template:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - queued
          - processing
          - completed
          - failed
          - cancelled
        title: &id011
          type: string
        description: &id012
          type: string
        archived: &id013
          type: boolean
        dueDate: &id014
          type: string
          format: date
        endDate: &id015
          type: string
          format: date
        teamId: &id016
          type: string
          format: uuid
        ownerId: &id017
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    TemplateList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Template'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateTemplateRequest:
      type: object
      properties:
        title: *id011
        description: *id012
        archived: *id013
        dueDate: *id014
        endDate: *id015
        teamId: *id016
        ownerId: *id017
      required:
      - title
      - description
    UpdateTemplateRequest:
      type: object
      properties:
        title: *id011
        description: *id012
        archived: *id013
        dueDate: *id014
        endDate: *id015
        teamId: *id016
        ownerId: *id017
      required:
      - title
      - description
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
