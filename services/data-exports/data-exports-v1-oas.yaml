openapi: 3.0.3
info:
  title: Data Exports API
  description: Bulk data export jobs.
  version: 1.3.4
  contact:
    name: Data Exports Team
    email: dataexports@example.com
servers:
- url: https://api.example.com/data-exports/v1
  description: Production
- url: https://staging-api.example.com/data-exports/v1
  description: Staging
tags:
- name: Data Exports
  description: Data Exports resource operations.
- name: Exports
  description: Exports resource operations.
- name: Events
  description: Events resource operations.
- name: Health
  description: Service health checks.
paths:
  /data-exports:
    get:
      tags:
      - Data Exports
      summary: List data exports
      operationId: listDataExport
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of data exports.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataExportList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Data Exports
      summary: Create data export
      operationId: createDataExport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDataExportRequest'
      responses:
        '201':
          description: Data Export created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataExport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /data-exports/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Data Exports
      summary: Get data export by ID
      operationId: getDataExport
      responses:
        '200':
          description: Data Export details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataExport'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Data Exports
      summary: Update data export
      operationId: updateDataExport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDataExportRequest'
      responses:
        '200':
          description: Data Export updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataExport'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Data Exports
      summary: Delete data export
      operationId: deleteDataExport
      responses:
        '204':
          description: Data Export deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /data-exports/bulk:
    post:
      tags:
      - Data Exports
      summary: Bulk create data exports
      operationId: bulkCreateDataExport
      description: Create up to 500 records in a single request. Returns per-row results.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items:
                    $ref: '#/components/schemas/CreateDataExportRequest'
              required:
              - items
      responses:
        '200':
          description: Bulk operation results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  succeeded:
                    type: integer
                  failed:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        id:
                          type: string
                          format: uuid
                          nullable: true
                        error:
                          type: string
                          nullable: true
      security:
      - bearerAuth: []
    delete:
      tags:
      - Data Exports
      summary: Bulk delete data exports
      operationId: bulkDeleteDataExport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
              required:
              - ids
      responses:
        '200':
          description: Deletion summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                  skipped:
                    type: integer
      security:
      - bearerAuth: []
  /data-exports/{id}/enable:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    post:
      tags:
      - Data Exports
      summary: Enable data export
      operationId: enableDataExport
      description: Transitions the record to the enable state. Idempotent on records already in the target state.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for the transition.
                note:
                  type: string
            example:
              reason: manager_override
              note: Approved offline
      responses:
        '200':
          description: Record after transition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataExport'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Invalid state transition
      security:
      - bearerAuth: []
  /data-exports/{id}/disable:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    post:
      tags:
      - Data Exports
      summary: Disable data export
      operationId: disableDataExport
      description: Transitions the record to the disable state. Idempotent on records already in the target state.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for the transition.
                note:
                  type: string
            example:
              reason: manager_override
              note: Approved offline
      responses:
        '200':
          description: Record after transition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataExport'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Invalid state transition
      security:
      - bearerAuth: []
  /exports:
    get:
      tags:
      - Exports
      summary: List exports
      operationId: listExport
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of exports.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Exports
      summary: Create export
      operationId: createExport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExportRequest'
      responses:
        '201':
          description: Export created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Export'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /exports/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Exports
      summary: Get export by ID
      operationId: getExport
      responses:
        '200':
          description: Export details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Export'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Exports
      summary: Update export
      operationId: updateExport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExportRequest'
      responses:
        '200':
          description: Export updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Export'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Exports
      summary: Delete export
      operationId: deleteExport
      responses:
        '204':
          description: Export deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /exports/{id}/audit:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Exports
      summary: Get audit trail
      operationId: getExportAuditTrail
      description: Returns the chronological audit log for this record.
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          default: 50
          maximum: 500
      responses:
        '200':
          description: Audit entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        actor:
                          type: string
                        action:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
                        diff:
                          type: object
                          additionalProperties: true
      security:
      - bearerAuth: []
  /events:
    get:
      tags:
      - Events
      summary: List events
      operationId: listEvent
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Events
      summary: Create event
      operationId: createEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventRequest'
      responses:
        '201':
          description: Event created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /events/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Events
      summary: Get event by ID
      operationId: getEvent
      responses:
        '200':
          description: Event details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Events
      summary: Update event
      operationId: updateEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventRequest'
      responses:
        '200':
          description: Event updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Events
      summary: Delete event
      operationId: deleteEvent
      responses:
        '204':
          description: Event deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /events/stats:
    get:
      tags:
      - Events
      summary: Aggregate events stats
      operationId: getEventStats
      description: Returns aggregate counters (totals, by status, by day) suitable for dashboards.
      parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Aggregate stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  byDay:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        count:
                          type: integer
                example:
                  total: 1234
                  byStatus:
                    active: 800
                    archived: 200
                    pending: 234
                  byDay:
                  - date: '2026-04-28'
                    count: 42
                  - date: '2026-04-29'
                    count: 51
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    CommentEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        author:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
    Attachment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        contentType:
          type: string
        size:
          type: integer
        url:
          type: string
          format: uri
        uploadedAt:
          type: string
          format: date-time
    DataExport:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - approved
          - rejected
        description: &id001
          type: string
        name: &id002
          type: string
        score: &id003
          type: number
          format: float
        visible: &id004
          type: boolean
        publishedAt: &id005
          type: string
          format: date-time
        endDate: &id006
          type: string
          format: date
        organizationId: &id007
          type: string
          format: uuid
        email: &id008
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    DataExportList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DataExport'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateDataExportRequest:
      type: object
      properties:
        description: *id001
        name: *id002
        score: *id003
        visible: *id004
        publishedAt: *id005
        endDate: *id006
        organizationId: *id007
        email: *id008
      required:
      - description
      - name
    UpdateDataExportRequest:
      type: object
      properties:
        description: *id001
        name: *id002
        score: *id003
        visible: *id004
        publishedAt: *id005
        endDate: *id006
        organizationId: *id007
        email: *id008
      required:
      - description
      - name
    Export:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - draft
          - published
          - archived
        summary: &id009
          type: string
        reference: &id010
          type: string
        name: &id011
          type: string
        capacity: &id012
          type: integer
        score: &id013
          type: number
          format: float
        locked: &id014
          type: boolean
        active: &id015
          type: boolean
        publishedAt: &id016
          type: string
          format: date-time
        scheduledAt: &id017
          type: string
          format: date-time
        currency: &id018
          type: string
        fee: &id019
          type: number
          format: float
        ownerId: &id020
          type: string
          format: uuid
        phone: &id021
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    ExportList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Export'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateExportRequest:
      type: object
      properties:
        summary: *id009
        reference: *id010
        name: *id011
        capacity: *id012
        score: *id013
        locked: *id014
        active: *id015
        publishedAt: *id016
        scheduledAt: *id017
        currency: *id018
        fee: *id019
        ownerId: *id020
        phone: *id021
      required:
      - summary
      - reference
    UpdateExportRequest:
      type: object
      properties:
        summary: *id009
        reference: *id010
        name: *id011
        capacity: *id012
        score: *id013
        locked: *id014
        active: *id015
        publishedAt: *id016
        scheduledAt: *id017
        currency: *id018
        fee: *id019
        ownerId: *id020
        phone: *id021
      required:
      - summary
      - reference
    Event:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - new
          - in_progress
          - resolved
          - closed
        displayName: &id022
          type: string
        reference: &id023
          type: string
        slug: &id024
          type: string
        visible: &id025
          type: boolean
        locked: &id026
          type: boolean
        scheduledAt: &id027
          type: string
          format: date-time
        publishedAt: &id028
          type: string
          format: date-time
        price: &id029
          type: number
          format: float
        teamId: &id030
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    EventList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateEventRequest:
      type: object
      properties:
        displayName: *id022
        reference: *id023
        slug: *id024
        visible: *id025
        locked: *id026
        scheduledAt: *id027
        publishedAt: *id028
        price: *id029
        teamId: *id030
      required:
      - displayName
      - reference
    UpdateEventRequest:
      type: object
      properties:
        displayName: *id022
        reference: *id023
        slug: *id024
        visible: *id025
        locked: *id026
        scheduledAt: *id027
        publishedAt: *id028
        price: *id029
        teamId: *id030
      required:
      - displayName
      - reference
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
