openapi: 3.0.3
info:
  title: Threads API
  description: Conversation threading across channels.
  version: 1.2.0
  contact:
    name: Threads Team
    email: threads@example.com
servers:
- url: https://api.example.com/threads/v1
  description: Production
- url: https://staging-api.example.com/threads/v1
  description: Staging
tags:
- name: Threads
  description: Threads resource operations.
- name: Configs
  description: Configs resource operations.
- name: Health
  description: Service health checks.
paths:
  /threads:
    get:
      tags:
      - Threads
      summary: List threads
      operationId: listThread
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of threads.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Threads
      summary: Create thread
      operationId: createThread
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateThreadRequest'
      responses:
        '201':
          description: Thread created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thread'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /threads/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Threads
      summary: Get thread by ID
      operationId: getThread
      responses:
        '200':
          description: Thread details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thread'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Threads
      summary: Update thread
      operationId: updateThread
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateThreadRequest'
      responses:
        '200':
          description: Thread updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thread'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Threads
      summary: Delete thread
      operationId: deleteThread
      responses:
        '204':
          description: Thread deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /threads/{id}/audit:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Threads
      summary: Get audit trail
      operationId: getThreadAuditTrail
      description: Returns the chronological audit log for this record.
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          default: 50
          maximum: 500
      responses:
        '200':
          description: Audit entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        actor:
                          type: string
                        action:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
                        diff:
                          type: object
                          additionalProperties: true
      security:
      - bearerAuth: []
  /threads/{id}/activate:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    post:
      tags:
      - Threads
      summary: Activate thread
      operationId: activateThread
      description: Transitions the record to the activate state. Idempotent on records already in the target state.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for the transition.
                note:
                  type: string
            example:
              reason: manager_override
              note: Approved offline
      responses:
        '200':
          description: Record after transition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thread'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Invalid state transition
      security:
      - bearerAuth: []
  /threads/{id}/deactivate:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    post:
      tags:
      - Threads
      summary: Deactivate thread
      operationId: deactivateThread
      description: Transitions the record to the deactivate state. Idempotent on records already in the target state.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for the transition.
                note:
                  type: string
            example:
              reason: manager_override
              note: Approved offline
      responses:
        '200':
          description: Record after transition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thread'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Invalid state transition
      security:
      - bearerAuth: []
  /threads/search:
    post:
      tags:
      - Threads
      summary: Advanced search across threads
      operationId: searchThread
      description: Submit a structured query for complex filtering not expressible via the list endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      op:
                        type: string
                        enum:
                        - eq
                        - ne
                        - gt
                        - lt
                        - in
                        - contains
                      value: {}
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      direction:
                        type: string
                        enum:
                        - asc
                        - desc
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
                  maximum: 200
            example:
              filters:
              - field: status
                op: eq
                value: active
              - field: createdAt
                op: gt
                value: '2026-01-01T00:00:00Z'
              sort:
              - field: createdAt
                direction: desc
              page: 1
              limit: 50
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadList'
      security:
      - bearerAuth: []
  /configs:
    get:
      tags:
      - Configs
      summary: List configs
      operationId: listConfig
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of configs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Configs
      summary: Create config
      operationId: createConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConfigRequest'
      responses:
        '201':
          description: Config created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /configs/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Configs
      summary: Get config by ID
      operationId: getConfig
      responses:
        '200':
          description: Config details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Configs
      summary: Update config
      operationId: updateConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConfigRequest'
      responses:
        '200':
          description: Config updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Configs
      summary: Delete config
      operationId: deleteConfig
      responses:
        '204':
          description: Config deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    CommentEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        author:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
    Attachment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        contentType:
          type: string
        size:
          type: integer
        url:
          type: string
          format: uri
        uploadedAt:
          type: string
          format: date-time
    Thread:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - new
          - in_progress
          - resolved
          - closed
        externalId: &id001
          type: string
        title: &id002
          type: string
        displayName: &id003
          type: string
        rank: &id004
          type: integer
        active: &id005
          type: boolean
        lastSeenAt: &id006
          type: string
          format: date-time
        publishedAt: &id007
          type: string
          format: date-time
        subtotal: &id008
          type: number
          format: float
        discount: &id009
          type: number
          format: float
        createdBy: &id010
          type: string
          format: uuid
        email: &id011
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    ThreadList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Thread'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateThreadRequest:
      type: object
      properties:
        externalId: *id001
        title: *id002
        displayName: *id003
        rank: *id004
        active: *id005
        lastSeenAt: *id006
        publishedAt: *id007
        subtotal: *id008
        discount: *id009
        createdBy: *id010
        email: *id011
      required:
      - externalId
      - title
    UpdateThreadRequest:
      type: object
      properties:
        externalId: *id001
        title: *id002
        displayName: *id003
        rank: *id004
        active: *id005
        lastSeenAt: *id006
        publishedAt: *id007
        subtotal: *id008
        discount: *id009
        createdBy: *id010
        email: *id011
      required:
      - externalId
      - title
    Config:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - draft
          - published
          - archived
        notes: &id012
          type: string
        reference: &id013
          type: string
        locked: &id014
          type: boolean
        visible: &id015
          type: boolean
        lastSeenAt: &id016
          type: string
          format: date-time
        startDate: &id017
          type: string
          format: date
        currency: &id018
          type: string
        price: &id019
          type: number
          format: float
        teamId: &id020
          type: string
          format: uuid
        categoryId: &id021
          type: string
          format: uuid
        phone: &id022
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    ConfigList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Config'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateConfigRequest:
      type: object
      properties:
        notes: *id012
        reference: *id013
        locked: *id014
        visible: *id015
        lastSeenAt: *id016
        startDate: *id017
        currency: *id018
        price: *id019
        teamId: *id020
        categoryId: *id021
        phone: *id022
      required:
      - notes
      - reference
    UpdateConfigRequest:
      type: object
      properties:
        notes: *id012
        reference: *id013
        locked: *id014
        visible: *id015
        lastSeenAt: *id016
        startDate: *id017
        currency: *id018
        price: *id019
        teamId: *id020
        categoryId: *id021
        phone: *id022
      required:
      - notes
      - reference
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
