openapi: 3.0.3
info:
  title: Mortgages API
  description: Mortgage applications and quotes.
  version: 1.2.0
  contact:
    name: Mortgages Team
    email: mortgages@example.com
servers:
- url: https://api.example.com/mortgages/v1
  description: Production
- url: https://staging-api.example.com/mortgages/v1
  description: Staging
tags:
- name: Mortgages
  description: Mortgages resource operations.
- name: Health
  description: Service health checks.
paths:
  /mortgages:
    get:
      tags:
      - Mortgages
      summary: List mortgages
      operationId: listMortgage
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of mortgages.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MortgageList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Mortgages
      summary: Create mortgage
      operationId: createMortgage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMortgageRequest'
      responses:
        '201':
          description: Mortgage created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mortgage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /mortgages/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Mortgages
      summary: Get mortgage by ID
      operationId: getMortgage
      responses:
        '200':
          description: Mortgage details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mortgage'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Mortgages
      summary: Update mortgage
      operationId: updateMortgage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMortgageRequest'
      responses:
        '200':
          description: Mortgage updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mortgage'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Mortgages
      summary: Delete mortgage
      operationId: deleteMortgage
      responses:
        '204':
          description: Mortgage deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /mortgages/stats:
    get:
      tags:
      - Mortgages
      summary: Aggregate mortgages stats
      operationId: getMortgageStats
      description: Returns aggregate counters (totals, by status, by day) suitable for dashboards.
      parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Aggregate stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  byDay:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        count:
                          type: integer
                example:
                  total: 1234
                  byStatus:
                    active: 800
                    archived: 200
                    pending: 234
                  byDay:
                  - date: '2026-04-28'
                    count: 42
                  - date: '2026-04-29'
                    count: 51
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Mortgage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - scheduled
          - running
          - completed
          - failed
        reference: &id001
          type: string
        code: &id002
          type: string
        description: &id003
          type: string
        locked: &id004
          type: boolean
        verified: &id005
          type: boolean
        dueDate: &id006
          type: string
          format: date
        price: &id007
          type: number
          format: float
        categoryId: &id008
          type: string
          format: uuid
        ownerId: &id009
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    MortgageList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Mortgage'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateMortgageRequest:
      type: object
      properties:
        reference: *id001
        code: *id002
        description: *id003
        locked: *id004
        verified: *id005
        dueDate: *id006
        price: *id007
        categoryId: *id008
        ownerId: *id009
      required:
      - reference
      - code
    UpdateMortgageRequest:
      type: object
      properties:
        reference: *id001
        code: *id002
        description: *id003
        locked: *id004
        verified: *id005
        dueDate: *id006
        price: *id007
        categoryId: *id008
        ownerId: *id009
      required:
      - reference
      - code
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
