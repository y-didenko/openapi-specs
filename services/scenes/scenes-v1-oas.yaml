openapi: 3.0.3
info:
  title: Scenes API
  description: Smart scene definitions.
  version: 1.1.0
  contact:
    name: Scenes Team
    email: scenes@example.com
servers:
- url: https://api.example.com/scenes/v1
  description: Production
- url: https://staging-api.example.com/scenes/v1
  description: Staging
tags:
- name: Scenes
  description: Scenes resource operations.
- name: Health
  description: Service health checks.
paths:
  /scenes:
    get:
      tags:
      - Scenes
      summary: List scenes
      operationId: listScene
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of scenes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SceneList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Scenes
      summary: Create scene
      operationId: createScene
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSceneRequest'
      responses:
        '201':
          description: Scene created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scene'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /scenes/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Scenes
      summary: Get scene by ID
      operationId: getScene
      responses:
        '200':
          description: Scene details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scene'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Scenes
      summary: Update scene
      operationId: updateScene
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSceneRequest'
      responses:
        '200':
          description: Scene updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scene'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Scenes
      summary: Delete scene
      operationId: deleteScene
      responses:
        '204':
          description: Scene deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /scenes/stats:
    get:
      tags:
      - Scenes
      summary: Aggregate scenes stats
      operationId: getSceneStats
      description: Returns aggregate counters (totals, by status, by day) suitable for dashboards.
      parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Aggregate stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  byDay:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        count:
                          type: integer
                example:
                  total: 1234
                  byStatus:
                    active: 800
                    archived: 200
                    pending: 234
                  byDay:
                  - date: '2026-04-28'
                    count: 42
                  - date: '2026-04-29'
                    count: 51
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Scene:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - active
          - inactive
          - archived
        externalId: &id001
          type: string
        title: &id002
          type: string
        enabled: &id003
          type: boolean
        locked: &id004
          type: boolean
        endDate: &id005
          type: string
          format: date
        total: &id006
          type: number
          format: float
        subtotal: &id007
          type: number
          format: float
        ownerId: &id008
          type: string
          format: uuid
        teamId: &id009
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    SceneList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Scene'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateSceneRequest:
      type: object
      properties:
        externalId: *id001
        title: *id002
        enabled: *id003
        locked: *id004
        endDate: *id005
        total: *id006
        subtotal: *id007
        ownerId: *id008
        teamId: *id009
      required:
      - externalId
      - title
    UpdateSceneRequest:
      type: object
      properties:
        externalId: *id001
        title: *id002
        enabled: *id003
        locked: *id004
        endDate: *id005
        total: *id006
        subtotal: *id007
        ownerId: *id008
        teamId: *id009
      required:
      - externalId
      - title
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
