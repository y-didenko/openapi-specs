              note: Approved offline
      responses:
        '200':
          description: Record after transition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Invalid state transition
      security:
      - bearerAuth: []
  /events/{id}/restore:
    parameters:
    - name: id
      in: path
      required: true
