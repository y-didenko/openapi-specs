openapi: 3.0.3
info:
  title: Instructors API
  description: Instructor directory.
  version: 1.3.4
  contact:
    name: Instructors Team
    email: instructors@example.com
servers:
- url: https://api.example.com/instructors/v1
  description: Production
- url: https://staging-api.example.com/instructors/v1
  description: Staging
tags:
- name: Instructors
  description: Instructors resource operations.
- name: Health
  description: Service health checks.
paths:
  /instructors:
    get:
      tags:
      - Instructors
      summary: List instructors
      operationId: listInstructor
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of instructors.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstructorList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Instructors
      summary: Create instructor
      operationId: createInstructor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInstructorRequest'
      responses:
        '201':
          description: Instructor created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Instructor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /instructors/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Instructors
      summary: Get instructor by ID
      operationId: getInstructor
      responses:
        '200':
          description: Instructor details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Instructor'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Instructors
      summary: Update instructor
      operationId: updateInstructor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInstructorRequest'
      responses:
        '200':
          description: Instructor updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Instructor'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Instructors
      summary: Delete instructor
      operationId: deleteInstructor
      responses:
        '204':
          description: Instructor deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Instructor:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - draft
          - published
          - archived
        displayName: &id001
          type: string
        description: &id002
          type: string
        notes: &id003
          type: string
        weight: &id004
          type: number
          format: float
        enabled: &id005
          type: boolean
        locked: &id006
          type: boolean
        startDate: &id007
          type: string
          format: date
        fee: &id008
          type: number
          format: float
        discount: &id009
          type: number
          format: float
        tagId: &id010
          type: string
          format: uuid
        email: &id011
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    InstructorList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Instructor'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateInstructorRequest:
      type: object
      properties:
        displayName: *id001
        description: *id002
        notes: *id003
        weight: *id004
        enabled: *id005
        locked: *id006
        startDate: *id007
        fee: *id008
        discount: *id009
        tagId: *id010
        email: *id011
      required:
      - displayName
      - description
    UpdateInstructorRequest:
      type: object
      properties:
        displayName: *id001
        description: *id002
        notes: *id003
        weight: *id004
        enabled: *id005
        locked: *id006
        startDate: *id007
        fee: *id008
        discount: *id009
        tagId: *id010
        email: *id011
      required:
      - displayName
      - description
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
