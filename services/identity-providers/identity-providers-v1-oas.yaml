openapi: 3.0.3
info:
  title: Identity Providers API
  description: External IdP registration and trust config.
  version: 2.1.0
  contact:
    name: Identity Providers Team
    email: identityproviders@example.com
servers:
- url: https://api.example.com/identity-providers/v1
  description: Production
- url: https://staging-api.example.com/identity-providers/v1
  description: Staging
tags:
- name: Identity Providers
  description: Identity Providers resource operations.
- name: Logs
  description: Logs resource operations.
- name: Health
  description: Service health checks.
paths:
  /identity-providers:
    get:
      tags:
      - Identity Providers
      summary: List identity providers
      operationId: listIdentityProvider
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of identity providers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityProviderList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Identity Providers
      summary: Create identity provider
      operationId: createIdentityProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIdentityProviderRequest'
      responses:
        '201':
          description: Identity Provider created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityProvider'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /identity-providers/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Identity Providers
      summary: Get identity provider by ID
      operationId: getIdentityProvider
      responses:
        '200':
          description: Identity Provider details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityProvider'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Identity Providers
      summary: Update identity provider
      operationId: updateIdentityProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIdentityProviderRequest'
      responses:
        '200':
          description: Identity Provider updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityProvider'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Identity Providers
      summary: Delete identity provider
      operationId: deleteIdentityProvider
      responses:
        '204':
          description: Identity Provider deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /identity-providers/search:
    post:
      tags:
      - Identity Providers
      summary: Advanced search across identity providers
      operationId: searchIdentityProvider
      description: Submit a structured query for complex filtering not expressible via the list endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      op:
                        type: string
                        enum:
                        - eq
                        - ne
                        - gt
                        - lt
                        - in
                        - contains
                      value: {}
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      direction:
                        type: string
                        enum:
                        - asc
                        - desc
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
                  maximum: 200
            example:
              filters:
              - field: status
                op: eq
                value: active
              - field: createdAt
                op: gt
                value: '2026-01-01T00:00:00Z'
              sort:
              - field: createdAt
                direction: desc
              page: 1
              limit: 50
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityProviderList'
      security:
      - bearerAuth: []
  /logs:
    get:
      tags:
      - Logs
      summary: List logs
      operationId: listLog
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of logs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Logs
      summary: Create log
      operationId: createLog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLogRequest'
      responses:
        '201':
          description: Log created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /logs/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Logs
      summary: Get log by ID
      operationId: getLog
      responses:
        '200':
          description: Log details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Logs
      summary: Update log
      operationId: updateLog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLogRequest'
      responses:
        '200':
          description: Log updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Logs
      summary: Delete log
      operationId: deleteLog
      responses:
        '204':
          description: Log deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    IdentityProvider:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - approved
          - rejected
        slug: &id001
          type: string
        name: &id002
          type: string
        weight: &id003
          type: number
          format: float
        threshold: &id004
          type: number
          format: float
        active: &id005
          type: boolean
        startDate: &id006
          type: string
          format: date
        endDate: &id007
          type: string
          format: date
        total: &id008
          type: number
          format: float
        organizationId: &id009
          type: string
          format: uuid
        tagId: &id010
          type: string
          format: uuid
        phone: &id011
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    IdentityProviderList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/IdentityProvider'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateIdentityProviderRequest:
      type: object
      properties:
        slug: *id001
        name: *id002
        weight: *id003
        threshold: *id004
        active: *id005
        startDate: *id006
        endDate: *id007
        total: *id008
        organizationId: *id009
        tagId: *id010
        phone: *id011
      required:
      - slug
      - name
    UpdateIdentityProviderRequest:
      type: object
      properties:
        slug: *id001
        name: *id002
        weight: *id003
        threshold: *id004
        active: *id005
        startDate: *id006
        endDate: *id007
        total: *id008
        organizationId: *id009
        tagId: *id010
        phone: *id011
      required:
      - slug
      - name
    Log:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - queued
          - processing
          - completed
          - failed
          - cancelled
        reference: &id012
          type: string
        externalId: &id013
          type: string
        weight: &id014
          type: number
          format: float
        priority: &id015
          type: integer
        locked: &id016
          type: boolean
        verified: &id017
          type: boolean
        scheduledAt: &id018
          type: string
          format: date-time
        publishedAt: &id019
          type: string
          format: date-time
        fee: &id020
          type: number
          format: float
        price: &id021
          type: number
          format: float
        updatedBy: &id022
          type: string
          format: uuid
        tagId: &id023
          type: string
          format: uuid
        email: &id024
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    LogList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Log'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateLogRequest:
      type: object
      properties:
        reference: *id012
        externalId: *id013
        weight: *id014
        priority: *id015
        locked: *id016
        verified: *id017
        scheduledAt: *id018
        publishedAt: *id019
        fee: *id020
        price: *id021
        updatedBy: *id022
        tagId: *id023
        email: *id024
      required:
      - reference
      - externalId
    UpdateLogRequest:
      type: object
      properties:
        reference: *id012
        externalId: *id013
        weight: *id014
        priority: *id015
        locked: *id016
        verified: *id017
        scheduledAt: *id018
        publishedAt: *id019
        fee: *id020
        price: *id021
        updatedBy: *id022
        tagId: *id023
        email: *id024
      required:
      - reference
      - externalId
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
