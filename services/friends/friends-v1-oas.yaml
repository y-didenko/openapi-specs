openapi: 3.0.3
info:
  title: Friends API
  description: Friendship graph.
  version: 2.1.0
  contact:
    name: Friends Team
    email: friends@example.com
servers:
- url: https://api.example.com/friends/v1
  description: Production
- url: https://staging-api.example.com/friends/v1
  description: Staging
tags:
- name: Friends
  description: Friends resource operations.
- name: Health
  description: Service health checks.
paths:
  /friends:
    get:
      tags:
      - Friends
      summary: List friends
      operationId: listFriend
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of friends.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Friends
      summary: Create friend
      operationId: createFriend
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFriendRequest'
      responses:
        '201':
          description: Friend created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Friend'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /friends/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Friends
      summary: Get friend by ID
      operationId: getFriend
      responses:
        '200':
          description: Friend details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Friend'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Friends
      summary: Update friend
      operationId: updateFriend
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFriendRequest'
      responses:
        '200':
          description: Friend updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Friend'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Friends
      summary: Delete friend
      operationId: deleteFriend
      responses:
        '204':
          description: Friend deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /friends/stats:
    get:
      tags:
      - Friends
      summary: Aggregate friends stats
      operationId: getFriendStats
      description: Returns aggregate counters (totals, by status, by day) suitable for dashboards.
      parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Aggregate stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  byDay:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        count:
                          type: integer
                example:
                  total: 1234
                  byStatus:
                    active: 800
                    archived: 200
                    pending: 234
                  byDay:
                  - date: '2026-04-28'
                    count: 42
                  - date: '2026-04-29'
                    count: 51
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Friend:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - new
          - in_progress
          - resolved
          - closed
        summary: &id001
          type: string
        description: &id002
          type: string
        capacity: &id003
          type: integer
        enabled: &id004
          type: boolean
        visible: &id005
          type: boolean
        scheduledAt: &id006
          type: string
          format: date-time
        total: &id007
          type: number
          format: float
        organizationId: &id008
          type: string
          format: uuid
        websiteUrl: &id009
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    FriendList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Friend'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateFriendRequest:
      type: object
      properties:
        summary: *id001
        description: *id002
        capacity: *id003
        enabled: *id004
        visible: *id005
        scheduledAt: *id006
        total: *id007
        organizationId: *id008
        websiteUrl: *id009
      required:
      - summary
      - description
    UpdateFriendRequest:
      type: object
      properties:
        summary: *id001
        description: *id002
        capacity: *id003
        enabled: *id004
        visible: *id005
        scheduledAt: *id006
        total: *id007
        organizationId: *id008
        websiteUrl: *id009
      required:
      - summary
      - description
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
