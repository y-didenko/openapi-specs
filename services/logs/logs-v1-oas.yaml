      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of links.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
      description: Returns a paginated list of links. Supports status and free-text filters.
    post:
      tags:
      - Links
      summary: Create link
      operationId: createLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLinkRequest'
      responses:
        '201':
          description: Link created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
      description: Creates a new link record.
  /links/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Links
      summary: Get link by ID
      operationId: getLink
      responses:
        '200':
          description: Link details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Links
      summary: Update link
      operationId: updateLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLinkRequest'
      responses:
        '200':
          description: Link updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Links
      summary: Delete link
      operationId: deleteLink
      responses:
        '204':
          description: Link deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /links/{id}/attachments:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Links
      summary: List attachments
      operationId: listLinkAttachments
      responses:
        '200':
          description: Attachments list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attachment'
      security:
      - bearerAuth: []
    post:
      tags:
      - Links
      summary: Upload attachment
      operationId: uploadLinkAttachment
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                description:
                  type: string
              required:
              - file
      responses:
        '201':
          description: Attachment created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
      security:
      - bearerAuth: []
  /links/bulk:
    post:
      tags:
      - Links
      summary: Bulk create links
      operationId: bulkCreateLink
      description: Create up to 500 records in a single request. Returns per-row results.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items:
                    $ref: '#/components/schemas/CreateLinkRequest'
              required:
              - items
      responses:
        '200':
          description: Bulk operation results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  succeeded:
                    type: integer
                  failed:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        id:
                          type: string
                          format: uuid
                          nullable: true
                        error:
                          type: string
                          nullable: true
      security:
      - bearerAuth: []
    delete:
      tags:
      - Links
      summary: Bulk delete links
      operationId: bulkDeleteLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
              required:
              - ids
      responses:
        '200':
          description: Deletion summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                  skipped:
                    type: integer
      security:
      - bearerAuth: []
  /history:
    get:
      tags:
      - History
      summary: List history
      operationId: listHistory
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
      description: Returns a paginated list of history. Supports status and free-text filters.
    post:
      tags:
      - History
      summary: Create history
      operationId: createHistory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHistoryRequest'
      responses:
        '201':
          description: History created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/History'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
      description: Creates a new history record.
  /history/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - History
      summary: Get history by ID
      operationId: getHistory
      responses:
        '200':
          description: History details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/History'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - History
      summary: Update history
      operationId: updateHistory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHistoryRequest'
      responses:
        '200':
          description: History updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/History'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - History
      summary: Delete history
      operationId: deleteHistory
      responses:
        '204':
          description: History deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /history/{id}/start:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    post:
      tags:
      - History
      summary: Start history
      operationId: startHistory
      description: Transitions the record to the start state. Idempotent on records already in the target state.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for the transition.
                note:
                  type: string
            example:
              reason: manager_override
              note: Approved offline
      responses:
        '200':
          description: Record after transition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/History'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Invalid state transition
      security:
      - bearerAuth: []
  /history/{id}/complete:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    post:
      tags:
      - History
      summary: Complete history
      operationId: completeHistory
      description: Transitions the record to the complete state. Idempotent on records already in the target state.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for the transition.
                note:
                  type: string
            example:
              reason: manager_override
              note: Approved offline
      responses:
        '200':
          description: Record after transition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/History'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Invalid state transition
      security:
      - bearerAuth: []
  /history/{id}/cancel:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    post:
      tags:
      - History
      summary: Cancel history
      operationId: cancelHistory
      description: Transitions the record to the cancel state. Idempotent on records already in the target state.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for the transition.
                note:
                  type: string
            example:
              reason: manager_override
              note: Approved offline
      responses:
        '200':
          description: Record after transition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/History'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Invalid state transition
      security:
      - bearerAuth: []
  /history/{id}/audit:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - History
      summary: Get audit trail
      operationId: getHistoryAuditTrail
      description: Returns the chronological audit log for this record.
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          default: 50
          maximum: 500
      responses:
        '200':
          description: Audit entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        actor:
                          type: string
                        action:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
                        diff:
                          type: object
                          additionalProperties: true
      security:
      - bearerAuth: []
  /events:
    get:
      tags:
      - Events
      summary: List events
      operationId: listEvent
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
      description: Returns a paginated list of events. Supports status and free-text filters.
    post:
      tags:
      - Events
      summary: Create event
      operationId: createEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventRequest'
      responses:
        '201':
          description: Event created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
      description: Creates a new event record.
  /events/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Events
      summary: Get event by ID
      operationId: getEvent
      responses:
        '200':
          description: Event details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Events
      summary: Update event
      operationId: updateEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventRequest'
      responses:
        '200':
          description: Event updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Events
      summary: Delete event
      operationId: deleteEvent
      responses:
        '204':
          description: Event deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /events/search:
    post:
      tags:
      - Events
      summary: Advanced search across events
      operationId: searchEvent
      description: Submit a structured query for complex filtering not expressible via the list endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      op:
                        type: string
                        enum:
                        - eq
                        - ne
                        - gt
                        - lt
                        - in
                        - contains
                      value: {}
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      direction:
                        type: string
                        enum:
                        - asc
                        - desc
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
                  maximum: 200
            example:
              filters:
              - field: status
                op: eq
                value: active
              - field: createdAt
                op: gt
                value: '2026-01-01T00:00:00Z'
              sort:
              - field: createdAt
                direction: desc
              page: 1
              limit: 50
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventList'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
