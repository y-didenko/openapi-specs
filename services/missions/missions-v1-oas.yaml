openapi: 3.0.3
info:
  title: Missions API
  description: In-game mission definitions.
  version: 1.1.0
  contact:
    name: Missions Team
    email: missions@example.com
servers:
- url: https://api.example.com/missions/v1
  description: Production
- url: https://staging-api.example.com/missions/v1
  description: Staging
tags:
- name: Missions
  description: Missions resource operations.
- name: Rules
  description: Rules resource operations.
- name: Imports
  description: Imports resource operations.
- name: Health
  description: Service health checks.
paths:
  /missions:
    get:
      tags:
      - Missions
      summary: List missions
      operationId: listMission
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of missions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MissionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Missions
      summary: Create mission
      operationId: createMission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMissionRequest'
      responses:
        '201':
          description: Mission created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mission'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /missions/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Missions
      summary: Get mission by ID
      operationId: getMission
      responses:
        '200':
          description: Mission details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mission'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Missions
      summary: Update mission
      operationId: updateMission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMissionRequest'
      responses:
        '200':
          description: Mission updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mission'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Missions
      summary: Delete mission
      operationId: deleteMission
      responses:
        '204':
          description: Mission deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /missions/bulk:
    post:
      tags:
      - Missions
      summary: Bulk create missions
      operationId: bulkCreateMission
      description: Create up to 500 records in a single request. Returns per-row results.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items:
                    $ref: '#/components/schemas/CreateMissionRequest'
              required:
              - items
      responses:
        '200':
          description: Bulk operation results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  succeeded:
                    type: integer
                  failed:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        id:
                          type: string
                          format: uuid
                          nullable: true
                        error:
                          type: string
                          nullable: true
      security:
      - bearerAuth: []
    delete:
      tags:
      - Missions
      summary: Bulk delete missions
      operationId: bulkDeleteMission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
              required:
              - ids
      responses:
        '200':
          description: Deletion summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                  skipped:
                    type: integer
      security:
      - bearerAuth: []
  /rules:
    get:
      tags:
      - Rules
      summary: List rules
      operationId: listRule
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of rules.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Rules
      summary: Create rule
      operationId: createRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRuleRequest'
      responses:
        '201':
          description: Rule created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /rules/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Rules
      summary: Get rule by ID
      operationId: getRule
      responses:
        '200':
          description: Rule details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Rules
      summary: Update rule
      operationId: updateRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRuleRequest'
      responses:
        '200':
          description: Rule updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Rules
      summary: Delete rule
      operationId: deleteRule
      responses:
        '204':
          description: Rule deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /rules/stats:
    get:
      tags:
      - Rules
      summary: Aggregate rules stats
      operationId: getRuleStats
      description: Returns aggregate counters (totals, by status, by day) suitable for dashboards.
      parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Aggregate stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  byDay:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        count:
                          type: integer
                example:
                  total: 1234
                  byStatus:
                    active: 800
                    archived: 200
                    pending: 234
                  byDay:
                  - date: '2026-04-28'
                    count: 42
                  - date: '2026-04-29'
                    count: 51
      security:
      - bearerAuth: []
  /imports:
    get:
      tags:
      - Imports
      summary: List imports
      operationId: listImport
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of imports.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Imports
      summary: Create import
      operationId: createImport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImportRequest'
      responses:
        '201':
          description: Import created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Import'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /imports/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Imports
      summary: Get import by ID
      operationId: getImport
      responses:
        '200':
          description: Import details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Import'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Imports
      summary: Update import
      operationId: updateImport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateImportRequest'
      responses:
        '200':
          description: Import updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Import'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Imports
      summary: Delete import
      operationId: deleteImport
      responses:
        '204':
          description: Import deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /imports/{id}/publish:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    post:
      tags:
      - Imports
      summary: Publish import
      operationId: publishImport
      description: Transitions the record to the publish state. Idempotent on records already in the target state.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for the transition.
                note:
                  type: string
            example:
              reason: manager_override
              note: Approved offline
      responses:
        '200':
          description: Record after transition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Import'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Invalid state transition
      security:
      - bearerAuth: []
  /imports/{id}/unpublish:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    post:
      tags:
      - Imports
      summary: Unpublish import
      operationId: unpublishImport
      description: Transitions the record to the unpublish state. Idempotent on records already in the target state.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for the transition.
                note:
                  type: string
            example:
              reason: manager_override
              note: Approved offline
      responses:
        '200':
          description: Record after transition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Import'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Invalid state transition
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    CommentEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        author:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
    Attachment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        contentType:
          type: string
        size:
          type: integer
        url:
          type: string
          format: uri
        uploadedAt:
          type: string
          format: date-time
    Mission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - draft
          - published
          - archived
        slug: &id001
          type: string
        displayName: &id002
          type: string
        notes: &id003
          type: string
        rank: &id004
          type: integer
        archived: &id005
          type: boolean
        verified: &id006
          type: boolean
        expiresAt: &id007
          type: string
          format: date-time
        startDate: &id008
          type: string
          format: date
        total: &id009
          type: number
          format: float
        currency: &id010
          type: string
        updatedBy: &id011
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    MissionList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Mission'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateMissionRequest:
      type: object
      properties:
        slug: *id001
        displayName: *id002
        notes: *id003
        rank: *id004
        archived: *id005
        verified: *id006
        expiresAt: *id007
        startDate: *id008
        total: *id009
        currency: *id010
        updatedBy: *id011
      required:
      - slug
      - displayName
    UpdateMissionRequest:
      type: object
      properties:
        slug: *id001
        displayName: *id002
        notes: *id003
        rank: *id004
        archived: *id005
        verified: *id006
        expiresAt: *id007
        startDate: *id008
        total: *id009
        currency: *id010
        updatedBy: *id011
      required:
      - slug
      - displayName
    Rule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - active
          - inactive
          - archived
        externalId: &id012
          type: string
        notes: &id013
          type: string
        code: &id014
          type: string
        default: &id015
          type: boolean
        publishedAt: &id016
          type: string
          format: date-time
        organizationId: &id017
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    RuleList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Rule'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateRuleRequest:
      type: object
      properties:
        externalId: *id012
        notes: *id013
        code: *id014
        default: *id015
        publishedAt: *id016
        organizationId: *id017
      required:
      - externalId
      - notes
    UpdateRuleRequest:
      type: object
      properties:
        externalId: *id012
        notes: *id013
        code: *id014
        default: *id015
        publishedAt: *id016
        organizationId: *id017
      required:
      - externalId
      - notes
    Import:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - queued
          - processing
          - completed
          - failed
          - cancelled
        title: &id018
          type: string
        name: &id019
          type: string
        description: &id020
          type: string
        active: &id021
          type: boolean
        endDate: &id022
          type: string
          format: date
        lastSeenAt: &id023
          type: string
          format: date-time
        parentId: &id024
          type: string
          format: uuid
        email: &id025
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    ImportList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Import'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateImportRequest:
      type: object
      properties:
        title: *id018
        name: *id019
        description: *id020
        active: *id021
        endDate: *id022
        lastSeenAt: *id023
        parentId: *id024
        email: *id025
      required:
      - title
      - name
    UpdateImportRequest:
      type: object
      properties:
        title: *id018
        name: *id019
        description: *id020
        active: *id021
        endDate: *id022
        lastSeenAt: *id023
        parentId: *id024
        email: *id025
      required:
      - title
      - name
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
