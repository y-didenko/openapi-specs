      security:
      - bearerAuth: []
    delete:
      tags:
      - Policies
      summary: Delete policy
      operationId: deletePolicy
      responses:
        '204':
          description: Policy deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /policies/export:
    post:
      tags:
      - Policies
      summary: Export policies as CSV
      operationId: exportPolicy
      description: Submits an asynchronous export job. The response includes a job ID; poll the job for download URL.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                format:
                  type: string
                  enum:
                  - csv
                  - ndjson
                  - xlsx
                filters:
                  type: object
                  additionalProperties: true
      responses:
        '202':
          description: Export job accepted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  statusUrl:
                    type: string
                    format: uri
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
