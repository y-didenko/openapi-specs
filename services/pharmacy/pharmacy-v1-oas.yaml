openapi: 3.0.3
info:
  title: Pharmacy API
  description: Pharmacy inventory and dispensing.
  version: 2.1.0
  contact:
    name: Pharmacy Team
    email: pharmacy@example.com
servers:
- url: https://api.example.com/pharmacy/v1
  description: Production
- url: https://staging-api.example.com/pharmacy/v1
  description: Staging
tags:
- name: Pharmacy
  description: Pharmacy resource operations.
- name: Health
  description: Service health checks.
paths:
  /pharmacy:
    get:
      tags:
      - Pharmacy
      summary: List pharmacy
      operationId: listPharmacy
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of pharmacy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PharmacyList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Pharmacy
      summary: Create pharmacy
      operationId: createPharmacy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePharmacyRequest'
      responses:
        '201':
          description: Pharmacy created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pharmacy'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /pharmacy/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Pharmacy
      summary: Get pharmacy by ID
      operationId: getPharmacy
      responses:
        '200':
          description: Pharmacy details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pharmacy'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Pharmacy
      summary: Update pharmacy
      operationId: updatePharmacy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePharmacyRequest'
      responses:
        '200':
          description: Pharmacy updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pharmacy'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Pharmacy
      summary: Delete pharmacy
      operationId: deletePharmacy
      responses:
        '204':
          description: Pharmacy deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /pharmacy/stats:
    get:
      tags:
      - Pharmacy
      summary: Aggregate pharmacy stats
      operationId: getPharmacyStats
      description: Returns aggregate counters (totals, by status, by day) suitable for dashboards.
      parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Aggregate stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  byDay:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        count:
                          type: integer
                example:
                  total: 1234
                  byStatus:
                    active: 800
                    archived: 200
                    pending: 234
                  byDay:
                  - date: '2026-04-28'
                    count: 42
                  - date: '2026-04-29'
                    count: 51
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Pharmacy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - new
          - in_progress
          - resolved
          - closed
        displayName: &id001
          type: string
        slug: &id002
          type: string
        visible: &id003
          type: boolean
        verified: &id004
          type: boolean
        completedAt: &id005
          type: string
          format: date-time
        publishedAt: &id006
          type: string
          format: date-time
        subtotal: &id007
          type: number
          format: float
        parentId: &id008
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    PharmacyList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Pharmacy'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreatePharmacyRequest:
      type: object
      properties:
        displayName: *id001
        slug: *id002
        visible: *id003
        verified: *id004
        completedAt: *id005
        publishedAt: *id006
        subtotal: *id007
        parentId: *id008
      required:
      - displayName
      - slug
    UpdatePharmacyRequest:
      type: object
      properties:
        displayName: *id001
        slug: *id002
        visible: *id003
        verified: *id004
        completedAt: *id005
        publishedAt: *id006
        subtotal: *id007
        parentId: *id008
      required:
      - displayName
      - slug
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
