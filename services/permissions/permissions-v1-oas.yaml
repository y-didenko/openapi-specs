openapi: 3.0.3
info:
  title: Permissions API
  description: Fine-grained permission grants.
  version: 1.0.0
  contact:
    name: Permissions Team
    email: permissions@example.com
servers:
- url: https://api.example.com/permissions/v1
  description: Production
- url: https://staging-api.example.com/permissions/v1
  description: Staging
tags:
- name: Permissions
  description: Permissions resource operations.
- name: History
  description: History resource operations.
- name: Health
  description: Service health checks.
paths:
  /permissions:
    get:
      tags:
      - Permissions
      summary: List permissions
      operationId: listPermission
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Permissions
      summary: Create permission
      operationId: createPermission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePermissionRequest'
      responses:
        '201':
          description: Permission created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Permission'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /permissions/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Permissions
      summary: Get permission by ID
      operationId: getPermission
      responses:
        '200':
          description: Permission details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Permission'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Permissions
      summary: Update permission
      operationId: updatePermission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePermissionRequest'
      responses:
        '200':
          description: Permission updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Permission'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Permissions
      summary: Delete permission
      operationId: deletePermission
      responses:
        '204':
          description: Permission deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /permissions/search:
    post:
      tags:
      - Permissions
      summary: Advanced search across permissions
      operationId: searchPermission
      description: Submit a structured query for complex filtering not expressible via the list endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      op:
                        type: string
                        enum:
                        - eq
                        - ne
                        - gt
                        - lt
                        - in
                        - contains
                      value: {}
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      direction:
                        type: string
                        enum:
                        - asc
                        - desc
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
                  maximum: 200
            example:
              filters:
              - field: status
                op: eq
                value: active
              - field: createdAt
                op: gt
                value: '2026-01-01T00:00:00Z'
              sort:
              - field: createdAt
                direction: desc
              page: 1
              limit: 50
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionList'
      security:
      - bearerAuth: []
  /history:
    get:
      tags:
      - History
      summary: List history
      operationId: listHistory
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - History
      summary: Create history
      operationId: createHistory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHistoryRequest'
      responses:
        '201':
          description: History created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/History'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /history/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - History
      summary: Get history by ID
      operationId: getHistory
      responses:
        '200':
          description: History details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/History'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - History
      summary: Update history
      operationId: updateHistory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHistoryRequest'
      responses:
        '200':
          description: History updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/History'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - History
      summary: Delete history
      operationId: deleteHistory
      responses:
        '204':
          description: History deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Permission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - active
          - inactive
          - archived
        name: &id001
          type: string
        notes: &id002
          type: string
        rank: &id003
          type: integer
        position: &id004
          type: integer
        enabled: &id005
          type: boolean
        visible: &id006
          type: boolean
        scheduledAt: &id007
          type: string
          format: date-time
        categoryId: &id008
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    PermissionList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreatePermissionRequest:
      type: object
      properties:
        name: *id001
        notes: *id002
        rank: *id003
        position: *id004
        enabled: *id005
        visible: *id006
        scheduledAt: *id007
        categoryId: *id008
      required:
      - name
      - notes
    UpdatePermissionRequest:
      type: object
      properties:
        name: *id001
        notes: *id002
        rank: *id003
        position: *id004
        enabled: *id005
        visible: *id006
        scheduledAt: *id007
        categoryId: *id008
      required:
      - name
      - notes
    History:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - approved
          - rejected
        description: &id009
          type: string
        reference: &id010
          type: string
        title: &id011
          type: string
        priority: &id012
          type: integer
        capacity: &id013
          type: integer
        locked: &id014
          type: boolean
        active: &id015
          type: boolean
        dueDate: &id016
          type: string
          format: date
        scheduledAt: &id017
          type: string
          format: date-time
        price: &id018
          type: number
          format: float
        tagId: &id019
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    HistoryList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/History'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateHistoryRequest:
      type: object
      properties:
        description: *id009
        reference: *id010
        title: *id011
        priority: *id012
        capacity: *id013
        locked: *id014
        active: *id015
        dueDate: *id016
        scheduledAt: *id017
        price: *id018
        tagId: *id019
      required:
      - description
      - reference
    UpdateHistoryRequest:
      type: object
      properties:
        description: *id009
        reference: *id010
        title: *id011
        priority: *id012
        capacity: *id013
        locked: *id014
        active: *id015
        dueDate: *id016
        scheduledAt: *id017
        price: *id018
        tagId: *id019
      required:
      - description
      - reference
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
