openapi: 3.0.3
info:
  title: Doctors API
  description: Provider directory.
  version: 1.0.0
  contact:
    name: Doctors Team
    email: doctors@example.com
servers:
- url: https://api.example.com/doctors/v1
  description: Production
- url: https://staging-api.example.com/doctors/v1
  description: Staging
tags:
- name: Doctors
  description: Doctors resource operations.
- name: History
  description: History resource operations.
- name: Health
  description: Service health checks.
paths:
  /doctors:
    get:
      tags:
      - Doctors
      summary: List doctors
      operationId: listDoctor
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of doctors.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Doctors
      summary: Create doctor
      operationId: createDoctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDoctorRequest'
      responses:
        '201':
          description: Doctor created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Doctor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /doctors/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Doctors
      summary: Get doctor by ID
      operationId: getDoctor
      responses:
        '200':
          description: Doctor details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Doctor'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Doctors
      summary: Update doctor
      operationId: updateDoctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDoctorRequest'
      responses:
        '200':
          description: Doctor updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Doctor'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Doctors
      summary: Delete doctor
      operationId: deleteDoctor
      responses:
        '204':
          description: Doctor deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /doctors/search:
    post:
      tags:
      - Doctors
      summary: Advanced search across doctors
      operationId: searchDoctor
      description: Submit a structured query for complex filtering not expressible via the list endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      op:
                        type: string
                        enum:
                        - eq
                        - ne
                        - gt
                        - lt
                        - in
                        - contains
                      value: {}
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      direction:
                        type: string
                        enum:
                        - asc
                        - desc
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
                  maximum: 200
            example:
              filters:
              - field: status
                op: eq
                value: active
              - field: createdAt
                op: gt
                value: '2026-01-01T00:00:00Z'
              sort:
              - field: createdAt
                direction: desc
              page: 1
              limit: 50
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorList'
      security:
      - bearerAuth: []
  /history:
    get:
      tags:
      - History
      summary: List history
      operationId: listHistory
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - History
      summary: Create history
      operationId: createHistory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHistoryRequest'
      responses:
        '201':
          description: History created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/History'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /history/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - History
      summary: Get history by ID
      operationId: getHistory
      responses:
        '200':
          description: History details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/History'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - History
      summary: Update history
      operationId: updateHistory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHistoryRequest'
      responses:
        '200':
          description: History updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/History'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - History
      summary: Delete history
      operationId: deleteHistory
      responses:
        '204':
          description: History deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Doctor:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - open
          - closed
        displayName: &id001
          type: string
        description: &id002
          type: string
        rank: &id003
          type: integer
        position: &id004
          type: integer
        locked: &id005
          type: boolean
        lastSeenAt: &id006
          type: string
          format: date-time
        publishedAt: &id007
          type: string
          format: date-time
        createdBy: &id008
          type: string
          format: uuid
        categoryId: &id009
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    DoctorList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Doctor'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateDoctorRequest:
      type: object
      properties:
        displayName: *id001
        description: *id002
        rank: *id003
        position: *id004
        locked: *id005
        lastSeenAt: *id006
        publishedAt: *id007
        createdBy: *id008
        categoryId: *id009
      required:
      - displayName
      - description
    UpdateDoctorRequest:
      type: object
      properties:
        displayName: *id001
        description: *id002
        rank: *id003
        position: *id004
        locked: *id005
        lastSeenAt: *id006
        publishedAt: *id007
        createdBy: *id008
        categoryId: *id009
      required:
      - displayName
      - description
    History:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - queued
          - processing
          - completed
          - failed
          - cancelled
        title: &id010
          type: string
        externalId: &id011
          type: string
        reference: &id012
          type: string
        weight: &id013
          type: number
          format: float
        default: &id014
          type: boolean
        archived: &id015
          type: boolean
        publishedAt: &id016
          type: string
          format: date-time
        completedAt: &id017
          type: string
          format: date-time
        organizationId: &id018
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    HistoryList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/History'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateHistoryRequest:
      type: object
      properties:
        title: *id010
        externalId: *id011
        reference: *id012
        weight: *id013
        default: *id014
        archived: *id015
        publishedAt: *id016
        completedAt: *id017
        organizationId: *id018
      required:
      - title
      - externalId
    UpdateHistoryRequest:
      type: object
      properties:
        title: *id010
        externalId: *id011
        reference: *id012
        weight: *id013
        default: *id014
        archived: *id015
        publishedAt: *id016
        completedAt: *id017
        organizationId: *id018
      required:
      - title
      - externalId
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
