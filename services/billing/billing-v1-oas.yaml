openapi: 3.0.3
info:
  title: Billing API
  description: Subscription billing cycles and proration.
  version: 1.2.0
  contact:
    name: Billing Team
    email: billing@example.com
servers:
- url: https://api.example.com/billing/v1
  description: Production
- url: https://staging-api.example.com/billing/v1
  description: Staging
tags:
- name: Billing
  description: Billing resource operations.
- name: Health
  description: Service health checks.
paths:
  /billing:
    get:
      tags:
      - Billing
      summary: List billing
      operationId: listBilling
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of billing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Billing
      summary: Create billing
      operationId: createBilling
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBillingRequest'
      responses:
        '201':
          description: Billing created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Billing'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /billing/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Billing
      summary: Get billing by ID
      operationId: getBilling
      responses:
        '200':
          description: Billing details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Billing'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Billing
      summary: Update billing
      operationId: updateBilling
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBillingRequest'
      responses:
        '200':
          description: Billing updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Billing'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Billing
      summary: Delete billing
      operationId: deleteBilling
      responses:
        '204':
          description: Billing deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Billing:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - active
          - inactive
          - archived
        name: &id001
          type: string
        notes: &id002
          type: string
        version: &id003
          type: integer
        enabled: &id004
          type: boolean
        archived: &id005
          type: boolean
        completedAt: &id006
          type: string
          format: date-time
        scheduledAt: &id007
          type: string
          format: date-time
        categoryId: &id008
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    BillingList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Billing'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateBillingRequest:
      type: object
      properties:
        name: *id001
        notes: *id002
        version: *id003
        enabled: *id004
        archived: *id005
        completedAt: *id006
        scheduledAt: *id007
        categoryId: *id008
      required:
      - name
      - notes
    UpdateBillingRequest:
      type: object
      properties:
        name: *id001
        notes: *id002
        version: *id003
        enabled: *id004
        archived: *id005
        completedAt: *id006
        scheduledAt: *id007
        categoryId: *id008
      required:
      - name
      - notes
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
