openapi: 3.0.3
info:
  title: CRM Customers API
  description: Customer relationship records.
  version: 1.0.0
  contact:
    name: CRM Customers Team
    email: crmcustomers@example.com
servers:
- url: https://api.example.com/crm-customers/v1
  description: Production
- url: https://staging-api.example.com/crm-customers/v1
  description: Staging
tags:
- name: Crm Customers
  description: Crm Customers resource operations.
- name: Health
  description: Service health checks.
paths:
  /crm-customers:
    get:
      tags:
      - Crm Customers
      summary: List crm customers
      operationId: listCrmCustomer
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of crm customers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmCustomerList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Crm Customers
      summary: Create crm customer
      operationId: createCrmCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCrmCustomerRequest'
      responses:
        '201':
          description: Crm Customer created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmCustomer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /crm-customers/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Crm Customers
      summary: Get crm customer by ID
      operationId: getCrmCustomer
      responses:
        '200':
          description: Crm Customer details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmCustomer'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Crm Customers
      summary: Update crm customer
      operationId: updateCrmCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCrmCustomerRequest'
      responses:
        '200':
          description: Crm Customer updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrmCustomer'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Crm Customers
      summary: Delete crm customer
      operationId: deleteCrmCustomer
      responses:
        '204':
          description: Crm Customer deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /crm-customers/stats:
    get:
      tags:
      - Crm Customers
      summary: Aggregate crm customers stats
      operationId: getCrmCustomerStats
      description: Returns aggregate counters (totals, by status, by day) suitable for dashboards.
      parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Aggregate stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  byDay:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        count:
                          type: integer
                example:
                  total: 1234
                  byStatus:
                    active: 800
                    archived: 200
                    pending: 234
                  byDay:
                  - date: '2026-04-28'
                    count: 42
                  - date: '2026-04-29'
                    count: 51
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    CrmCustomer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - active
          - inactive
          - archived
        name: &id001
          type: string
        slug: &id002
          type: string
        locked: &id003
          type: boolean
        expiresAt: &id004
          type: string
          format: date-time
        fee: &id005
          type: number
          format: float
        price: &id006
          type: number
          format: float
        tagId: &id007
          type: string
          format: uuid
        websiteUrl: &id008
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    CrmCustomerList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CrmCustomer'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateCrmCustomerRequest:
      type: object
      properties:
        name: *id001
        slug: *id002
        locked: *id003
        expiresAt: *id004
        fee: *id005
        price: *id006
        tagId: *id007
        websiteUrl: *id008
      required:
      - name
      - slug
    UpdateCrmCustomerRequest:
      type: object
      properties:
        name: *id001
        slug: *id002
        locked: *id003
        expiresAt: *id004
        fee: *id005
        price: *id006
        tagId: *id007
        websiteUrl: *id008
      required:
      - name
      - slug
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
