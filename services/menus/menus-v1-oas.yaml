openapi: 3.0.3
info:
  title: Menus API
  description: Menu and item management.
  version: 1.2.0
  contact:
    name: Menus Team
    email: menus@example.com
servers:
- url: https://api.example.com/menus/v1
  description: Production
- url: https://staging-api.example.com/menus/v1
  description: Staging
tags:
- name: Menus
  description: Menus resource operations.
- name: Configs
  description: Configs resource operations.
- name: Health
  description: Service health checks.
paths:
  /menus:
    get:
      tags:
      - Menus
      summary: List menus
      operationId: listMenu
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of menus.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Menus
      summary: Create menu
      operationId: createMenu
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMenuRequest'
      responses:
        '201':
          description: Menu created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Menu'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /menus/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Menus
      summary: Get menu by ID
      operationId: getMenu
      responses:
        '200':
          description: Menu details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Menu'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Menus
      summary: Update menu
      operationId: updateMenu
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMenuRequest'
      responses:
        '200':
          description: Menu updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Menu'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Menus
      summary: Delete menu
      operationId: deleteMenu
      responses:
        '204':
          description: Menu deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /menus/search:
    post:
      tags:
      - Menus
      summary: Advanced search across menus
      operationId: searchMenu
      description: Submit a structured query for complex filtering not expressible via the list endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      op:
                        type: string
                        enum:
                        - eq
                        - ne
                        - gt
                        - lt
                        - in
                        - contains
                      value: {}
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      direction:
                        type: string
                        enum:
                        - asc
                        - desc
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
                  maximum: 200
            example:
              filters:
              - field: status
                op: eq
                value: active
              - field: createdAt
                op: gt
                value: '2026-01-01T00:00:00Z'
              sort:
              - field: createdAt
                direction: desc
              page: 1
              limit: 50
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuList'
      security:
      - bearerAuth: []
  /menus/{id}/enable:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    post:
      tags:
      - Menus
      summary: Enable menu
      operationId: enableMenu
      description: Transitions the record to the enable state. Idempotent on records already in the target state.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for the transition.
                note:
                  type: string
            example:
              reason: manager_override
              note: Approved offline
      responses:
        '200':
          description: Record after transition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Menu'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Invalid state transition
      security:
      - bearerAuth: []
  /menus/{id}/disable:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    post:
      tags:
      - Menus
      summary: Disable menu
      operationId: disableMenu
      description: Transitions the record to the disable state. Idempotent on records already in the target state.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for the transition.
                note:
                  type: string
            example:
              reason: manager_override
              note: Approved offline
      responses:
        '200':
          description: Record after transition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Menu'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Invalid state transition
      security:
      - bearerAuth: []
  /configs:
    get:
      tags:
      - Configs
      summary: List configs
      operationId: listConfig
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of configs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Configs
      summary: Create config
      operationId: createConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConfigRequest'
      responses:
        '201':
          description: Config created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /configs/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Configs
      summary: Get config by ID
      operationId: getConfig
      responses:
        '200':
          description: Config details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Configs
      summary: Update config
      operationId: updateConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConfigRequest'
      responses:
        '200':
          description: Config updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Configs
      summary: Delete config
      operationId: deleteConfig
      responses:
        '204':
          description: Config deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    CommentEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        author:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
    Attachment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        contentType:
          type: string
        size:
          type: integer
        url:
          type: string
          format: uri
        uploadedAt:
          type: string
          format: date-time
    Menu:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - active
          - inactive
          - archived
        summary: &id001
          type: string
        code: &id002
          type: string
        slug: &id003
          type: string
        capacity: &id004
          type: integer
        archived: &id005
          type: boolean
        lastSeenAt: &id006
          type: string
          format: date-time
        organizationId: &id007
          type: string
          format: uuid
        createdBy: &id008
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    MenuList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Menu'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateMenuRequest:
      type: object
      properties:
        summary: *id001
        code: *id002
        slug: *id003
        capacity: *id004
        archived: *id005
        lastSeenAt: *id006
        organizationId: *id007
        createdBy: *id008
      required:
      - summary
      - code
    UpdateMenuRequest:
      type: object
      properties:
        summary: *id001
        code: *id002
        slug: *id003
        capacity: *id004
        archived: *id005
        lastSeenAt: *id006
        organizationId: *id007
        createdBy: *id008
      required:
      - summary
      - code
    Config:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - open
          - closed
        notes: &id009
          type: string
        description: &id010
          type: string
        externalId: &id011
          type: string
        score: &id012
          type: number
          format: float
        locked: &id013
          type: boolean
        completedAt: &id014
          type: string
          format: date-time
        updatedBy: &id015
          type: string
          format: uuid
        email: &id016
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    ConfigList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Config'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateConfigRequest:
      type: object
      properties:
        notes: *id009
        description: *id010
        externalId: *id011
        score: *id012
        locked: *id013
        completedAt: *id014
        updatedBy: *id015
        email: *id016
      required:
      - notes
      - description
    UpdateConfigRequest:
      type: object
      properties:
        notes: *id009
        description: *id010
        externalId: *id011
        score: *id012
        locked: *id013
        completedAt: *id014
        updatedBy: *id015
        email: *id016
      required:
      - notes
      - description
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
