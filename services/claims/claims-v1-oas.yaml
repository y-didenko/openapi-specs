openapi: 3.0.3
info:
  title: Claims API
  description: Insurance claim submission.
  version: 1.3.4
  contact:
    name: Claims Team
    email: claims@example.com
servers:
- url: https://api.example.com/claims/v1
  description: Production
- url: https://staging-api.example.com/claims/v1
  description: Staging
tags:
- name: Claims
  description: Claims resource operations.
- name: Health
  description: Service health checks.
paths:
  /claims:
    get:
      tags:
      - Claims
      summary: List claims
      operationId: listClaim
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Claims
      summary: Create claim
      operationId: createClaim
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClaimRequest'
      responses:
        '201':
          description: Claim created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Claim'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /claims/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Claims
      summary: Get claim by ID
      operationId: getClaim
      responses:
        '200':
          description: Claim details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Claim'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Claims
      summary: Update claim
      operationId: updateClaim
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClaimRequest'
      responses:
        '200':
          description: Claim updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Claim'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Claims
      summary: Delete claim
      operationId: deleteClaim
      responses:
        '204':
          description: Claim deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Claim:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - open
          - closed
        slug: &id001
          type: string
        description: &id002
          type: string
        externalId: &id003
          type: string
        position: &id004
          type: integer
        locked: &id005
          type: boolean
        active: &id006
          type: boolean
        endDate: &id007
          type: string
          format: date
        currency: &id008
          type: string
        ownerId: &id009
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    ClaimList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Claim'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateClaimRequest:
      type: object
      properties:
        slug: *id001
        description: *id002
        externalId: *id003
        position: *id004
        locked: *id005
        active: *id006
        endDate: *id007
        currency: *id008
        ownerId: *id009
      required:
      - slug
      - description
    UpdateClaimRequest:
      type: object
      properties:
        slug: *id001
        description: *id002
        externalId: *id003
        position: *id004
        locked: *id005
        active: *id006
        endDate: *id007
        currency: *id008
        ownerId: *id009
      required:
      - slug
      - description
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
