openapi: 3.0.3
info:
  title: Training API
  description: Learning paths and course completion.
  version: 1.3.4
  contact:
    name: Training Team
    email: training@example.com
servers:
- url: https://api.example.com/training/v1
  description: Production
- url: https://staging-api.example.com/training/v1
  description: Staging
tags:
- name: Training
  description: Training resource operations.
- name: Events
  description: Events resource operations.
- name: Health
  description: Service health checks.
paths:
  /training:
    get:
      tags:
      - Training
      summary: List training
      operationId: listTraining
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of training.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Training
      summary: Create training
      operationId: createTraining
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTrainingRequest'
      responses:
        '201':
          description: Training created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Training'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /training/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Training
      summary: Get training by ID
      operationId: getTraining
      responses:
        '200':
          description: Training details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Training'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Training
      summary: Update training
      operationId: updateTraining
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTrainingRequest'
      responses:
        '200':
          description: Training updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Training'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Training
      summary: Delete training
      operationId: deleteTraining
      responses:
        '204':
          description: Training deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /training/stats:
    get:
      tags:
      - Training
      summary: Aggregate training stats
      operationId: getTrainingStats
      description: Returns aggregate counters (totals, by status, by day) suitable for dashboards.
      parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Aggregate stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  byDay:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        count:
                          type: integer
                example:
                  total: 1234
                  byStatus:
                    active: 800
                    archived: 200
                    pending: 234
                  byDay:
                  - date: '2026-04-28'
                    count: 42
                  - date: '2026-04-29'
                    count: 51
      security:
      - bearerAuth: []
  /events:
    get:
      tags:
      - Events
      summary: List events
      operationId: listEvent
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Events
      summary: Create event
      operationId: createEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventRequest'
      responses:
        '201':
          description: Event created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /events/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Events
      summary: Get event by ID
      operationId: getEvent
      responses:
        '200':
          description: Event details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Events
      summary: Update event
      operationId: updateEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventRequest'
      responses:
        '200':
          description: Event updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Events
      summary: Delete event
      operationId: deleteEvent
      responses:
        '204':
          description: Event deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Training:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - open
          - closed
        reference: &id001
          type: string
        slug: &id002
          type: string
        position: &id003
          type: integer
        score: &id004
          type: number
          format: float
        default: &id005
          type: boolean
        dueDate: &id006
          type: string
          format: date
        updatedBy: &id007
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    TrainingList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Training'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateTrainingRequest:
      type: object
      properties:
        reference: *id001
        slug: *id002
        position: *id003
        score: *id004
        default: *id005
        dueDate: *id006
        updatedBy: *id007
      required:
      - reference
      - slug
    UpdateTrainingRequest:
      type: object
      properties:
        reference: *id001
        slug: *id002
        position: *id003
        score: *id004
        default: *id005
        dueDate: *id006
        updatedBy: *id007
      required:
      - reference
      - slug
    Event:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - active
          - inactive
          - archived
        summary: &id008
          type: string
        externalId: &id009
          type: string
        slug: &id010
          type: string
        visible: &id011
          type: boolean
        endDate: &id012
          type: string
          format: date
        publishedAt: &id013
          type: string
          format: date-time
        teamId: &id014
          type: string
          format: uuid
        phone: &id015
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    EventList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateEventRequest:
      type: object
      properties:
        summary: *id008
        externalId: *id009
        slug: *id010
        visible: *id011
        endDate: *id012
        publishedAt: *id013
        teamId: *id014
        phone: *id015
      required:
      - summary
      - externalId
    UpdateEventRequest:
      type: object
      properties:
        summary: *id008
        externalId: *id009
        slug: *id010
        visible: *id011
        endDate: *id012
        publishedAt: *id013
        teamId: *id014
        phone: *id015
      required:
      - summary
      - externalId
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
