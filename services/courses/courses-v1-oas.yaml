openapi: 3.0.3
info:
  title: Courses API
  description: Course catalog and metadata.
  version: 1.3.4
  contact:
    name: Courses Team
    email: courses@example.com
servers:
- url: https://api.example.com/courses/v1
  description: Production
- url: https://staging-api.example.com/courses/v1
  description: Staging
tags:
- name: Courses
  description: Courses resource operations.
- name: Health
  description: Service health checks.
paths:
  /courses:
    get:
      tags:
      - Courses
      summary: List courses
      operationId: listCours
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of courses.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoursList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Courses
      summary: Create cours
      operationId: createCour
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCoursRequest'
      responses:
        '201':
          description: Cours created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cours'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /courses/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Courses
      summary: Get cours by ID
      operationId: getCour
      responses:
        '200':
          description: Cours details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cours'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Courses
      summary: Update cours
      operationId: updateCour
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCoursRequest'
      responses:
        '200':
          description: Cours updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cours'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Courses
      summary: Delete cours
      operationId: deleteCour
      responses:
        '204':
          description: Cours deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /courses/search:
    post:
      tags:
      - Courses
      summary: Advanced search across courses
      operationId: searchCours
      description: Submit a structured query for complex filtering not expressible via the list endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      op:
                        type: string
                        enum:
                        - eq
                        - ne
                        - gt
                        - lt
                        - in
                        - contains
                      value: {}
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      direction:
                        type: string
                        enum:
                        - asc
                        - desc
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
                  maximum: 200
            example:
              filters:
              - field: status
                op: eq
                value: active
              - field: createdAt
                op: gt
                value: '2026-01-01T00:00:00Z'
              sort:
              - field: createdAt
                direction: desc
              page: 1
              limit: 50
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoursList'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Cours:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - queued
          - processing
          - completed
          - failed
          - cancelled
        name: &id001
          type: string
        reference: &id002
          type: string
        description: &id003
          type: string
        position: &id004
          type: integer
        priority: &id005
          type: integer
        enabled: &id006
          type: boolean
        startDate: &id007
          type: string
          format: date
        subtotal: &id008
          type: number
          format: float
        createdBy: &id009
          type: string
          format: uuid
        email: &id010
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    CoursList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Cours'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateCoursRequest:
      type: object
      properties:
        name: *id001
        reference: *id002
        description: *id003
        position: *id004
        priority: *id005
        enabled: *id006
        startDate: *id007
        subtotal: *id008
        createdBy: *id009
        email: *id010
      required:
      - name
      - reference
    UpdateCoursRequest:
      type: object
      properties:
        name: *id001
        reference: *id002
        description: *id003
        position: *id004
        priority: *id005
        enabled: *id006
        startDate: *id007
        subtotal: *id008
        createdBy: *id009
        email: *id010
      required:
      - name
      - reference
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
