      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                description:
                  type: string
              required:
              - file
      responses:
        '201':
          description: Attachment created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
      security:
      - bearerAuth: []
  /policies/bulk:
    post:
      tags:
      - Policies
      summary: Bulk create policies
      operationId: bulkCreatePolicy
      description: Create up to 500 records in a single request. Returns per-row results.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items:
                    $ref: '#/components/schemas/CreatePolicyRequest'
              required:
              - items
      responses:
        '200':
          description: Bulk operation results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  succeeded:
                    type: integer
                  failed:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        id:
                          type: string
                          format: uuid
                          nullable: true
                        error:
