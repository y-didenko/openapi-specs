openapi: 3.0.3
info:
  title: Experiments API
  description: A/B experiment tracking.
  version: 2.0.0
  contact:
    name: Experiments Team
    email: experiments@example.com
servers:
- url: https://api.example.com/experiments/v1
  description: Production
- url: https://staging-api.example.com/experiments/v1
  description: Staging
tags:
- name: Experiments
  description: Experiments resource operations.
- name: Rules
  description: Rules resource operations.
- name: Policies
  description: Policies resource operations.
- name: Notes
  description: Notes resource operations.
- name: Labels
  description: Labels resource operations.
- name: Health
  description: Service health checks.
paths:
  /experiments:
    get:
      tags:
      - Experiments
      summary: List experiments
      operationId: listExperiment
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of experiments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperimentList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
      description: Returns a paginated list of experiments. Supports status and free-text filters.
    post:
      tags:
      - Experiments
      summary: Create experiment
      operationId: createExperiment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExperimentRequest'
      responses:
        '201':
          description: Experiment created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Experiment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
      description: Creates a new experiment record.
  /experiments/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Experiments
      summary: Get experiment by ID
      operationId: getExperiment
      responses:
        '200':
          description: Experiment details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Experiment'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Experiments
      summary: Update experiment
      operationId: updateExperiment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExperimentRequest'
      responses:
        '200':
          description: Experiment updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Experiment'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Experiments
      summary: Delete experiment
      operationId: deleteExperiment
      responses:
        '204':
          description: Experiment deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /experiments/{id}/approve:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    post:
      tags:
      - Experiments
      summary: Approve experiment
      operationId: approveExperiment
      description: Transitions the record to the approve state. Idempotent on records already in the target state.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for the transition.
                note:
                  type: string
            example:
              reason: manager_override
              note: Approved offline
      responses:
        '200':
          description: Record after transition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Experiment'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Invalid state transition
      security:
      - bearerAuth: []
  /experiments/{id}/reject:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    post:
      tags:
      - Experiments
      summary: Reject experiment
      operationId: rejectExperiment
      description: Transitions the record to the reject state. Idempotent on records already in the target state.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for the transition.
                note:
                  type: string
            example:
              reason: manager_override
              note: Approved offline
      responses:
        '200':
          description: Record after transition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Experiment'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Invalid state transition
      security:
      - bearerAuth: []
  /experiments/search:
    post:
      tags:
      - Experiments
      summary: Advanced search across experiments
      operationId: searchExperiment
      description: Submit a structured query for complex filtering not expressible via the list endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      op:
                        type: string
                        enum:
                        - eq
                        - ne
                        - gt
                        - lt
                        - in
                        - contains
                      value: {}
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      direction:
                        type: string
                        enum:
                        - asc
                        - desc
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
                  maximum: 200
            example:
              filters:
              - field: status
                op: eq
                value: active
              - field: createdAt
                op: gt
                value: '2026-01-01T00:00:00Z'
              sort:
              - field: createdAt
                direction: desc
              page: 1
              limit: 50
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperimentList'
      security:
      - bearerAuth: []
  /experiments/{id}/comments:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Experiments
      summary: List comments
      operationId: listExperimentComments
      responses:
        '200':
          description: Comments list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CommentEntry'
      security:
      - bearerAuth: []
    post:
      tags:
      - Experiments
      summary: Add comment
      operationId: addExperimentComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - body
              properties:
                body:
                  type: string
            example:
              body: Reviewed and approved.
      responses:
        '201':
          description: Comment created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentEntry'
      security:
      - bearerAuth: []
  /experiments/{id}/attachments:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Experiments
      summary: List attachments
      operationId: listExperimentAttachments
      responses:
        '200':
          description: Attachments list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attachment'
      security:
      - bearerAuth: []
    post:
      tags:
      - Experiments
      summary: Upload attachment
      operationId: uploadExperimentAttachment
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                description:
                  type: string
              required:
              - file
      responses:
        '201':
          description: Attachment created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
      security:
      - bearerAuth: []
  /experiments/export:
    post:
      tags:
      - Experiments
      summary: Export experiments as CSV
      operationId: exportExperiment
      description: Submits an asynchronous export job. The response includes a job ID; poll the job for download URL.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                format:
                  type: string
                  enum:
                  - csv
                  - ndjson
                  - xlsx
                filters:
                  type: object
                  additionalProperties: true
      responses:
        '202':
          description: Export job accepted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  statusUrl:
                    type: string
                    format: uri
      security:
      - bearerAuth: []
  /experiments/bulk:
    post:
      tags:
      - Experiments
      summary: Bulk create experiments
      operationId: bulkCreateExperiment
      description: Create up to 500 records in a single request. Returns per-row results.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items:
                    $ref: '#/components/schemas/CreateExperimentRequest'
              required:
              - items
      responses:
        '200':
          description: Bulk operation results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  succeeded:
                    type: integer
                  failed:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        id:
                          type: string
                          format: uuid
                          nullable: true
                        error:
                          type: string
                          nullable: true
      security:
      - bearerAuth: []
    delete:
      tags:
      - Experiments
      summary: Bulk delete experiments
      operationId: bulkDeleteExperiment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
              required:
              - ids
      responses:
        '200':
          description: Deletion summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                  skipped:
                    type: integer
      security:
      - bearerAuth: []
  /rules:
    get:
      tags:
      - Rules
      summary: List rules
      operationId: listRule
      parameters:
      - name: page
