  /logs/{id}/audit:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Logs
      summary: Get audit trail
      operationId: getLogAuditTrail
      description: Returns the chronological audit log for this record.
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          default: 50
          maximum: 500
      responses:
        '200':
          description: Audit entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
