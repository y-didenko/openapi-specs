openapi: 3.0.3
info:
  title: Recipes API
  description: Recipe library.
  version: 2.1.0
  contact:
    name: Recipes Team
    email: recipes@example.com
servers:
- url: https://api.example.com/recipes/v1
  description: Production
- url: https://staging-api.example.com/recipes/v1
  description: Staging
tags:
- name: Recipes
  description: Recipes resource operations.
- name: Events
  description: Events resource operations.
- name: Rules
  description: Rules resource operations.
- name: Labels
  description: Labels resource operations.
- name: Alerts
  description: Alerts resource operations.
- name: Links
  description: Links resource operations.
- name: Health
  description: Service health checks.
paths:
  /recipes:
    get:
      tags:
      - Recipes
      summary: List recipes
      operationId: listRecipe
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of recipes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
      description: Returns a paginated list of recipes. Supports status and free-text filters.
    post:
      tags:
      - Recipes
      summary: Create recipe
      operationId: createRecipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecipeRequest'
      responses:
        '201':
          description: Recipe created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipe'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
      description: Creates a new recipe record.
  /recipes/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Recipes
      summary: Get recipe by ID
      operationId: getRecipe
      responses:
        '200':
          description: Recipe details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipe'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Recipes
      summary: Update recipe
      operationId: updateRecipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRecipeRequest'
      responses:
        '200':
          description: Recipe updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipe'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Recipes
      summary: Delete recipe
      operationId: deleteRecipe
      responses:
        '204':
          description: Recipe deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /recipes/{id}/attachments:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Recipes
      summary: List attachments
      operationId: listRecipeAttachments
      responses:
        '200':
          description: Attachments list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attachment'
      security:
      - bearerAuth: []
    post:
      tags:
      - Recipes
      summary: Upload attachment
      operationId: uploadRecipeAttachment
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                description:
                  type: string
              required:
              - file
      responses:
        '201':
          description: Attachment created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
      security:
      - bearerAuth: []
  /recipes/search:
    post:
      tags:
      - Recipes
      summary: Advanced search across recipes
      operationId: searchRecipe
      description: Submit a structured query for complex filtering not expressible via the list endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      op:
                        type: string
                        enum:
                        - eq
                        - ne
                        - gt
                        - lt
                        - in
                        - contains
                      value: {}
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      direction:
                        type: string
                        enum:
                        - asc
                        - desc
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
                  maximum: 200
            example:
              filters:
              - field: status
                op: eq
                value: active
              - field: createdAt
                op: gt
                value: '2026-01-01T00:00:00Z'
              sort:
              - field: createdAt
                direction: desc
              page: 1
              limit: 50
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeList'
      security:
      - bearerAuth: []
  /recipes/{id}/audit:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Recipes
      summary: Get audit trail
      operationId: getRecipeAuditTrail
      description: Returns the chronological audit log for this record.
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          default: 50
          maximum: 500
      responses:
        '200':
          description: Audit entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        actor:
                          type: string
                        action:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
                        diff:
                          type: object
                          additionalProperties: true
      security:
      - bearerAuth: []
  /recipes/bulk:
    post:
      tags:
      - Recipes
      summary: Bulk create recipes
      operationId: bulkCreateRecipe
      description: Create up to 500 records in a single request. Returns per-row results.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items:
                    $ref: '#/components/schemas/CreateRecipeRequest'
              required:
              - items
      responses:
        '200':
          description: Bulk operation results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  succeeded:
                    type: integer
                  failed:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        id:
                          type: string
                          format: uuid
                          nullable: true
                        error:
                          type: string
                          nullable: true
      security:
      - bearerAuth: []
    delete:
      tags:
      - Recipes
      summary: Bulk delete recipes
      operationId: bulkDeleteRecipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
              required:
              - ids
      responses:
        '200':
          description: Deletion summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                  skipped:
                    type: integer
      security:
      - bearerAuth: []
  /recipes/stats:
    get:
      tags:
      - Recipes
      summary: Aggregate recipes stats
      operationId: getRecipeStats
      description: Returns aggregate counters (totals, by status, by day) suitable for dashboards.
      parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Aggregate stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  byDay:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        count:
                          type: integer
                example:
                  total: 1234
                  byStatus:
                    active: 800
                    archived: 200
                    pending: 234
                  byDay:
                  - date: '2026-04-28'
                    count: 42
                  - date: '2026-04-29'
                    count: 51
      security:
      - bearerAuth: []
