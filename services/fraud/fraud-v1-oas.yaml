  /alerts:
    get:
      tags:
      - Alerts
      summary: List alerts
      operationId: listAlert
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
