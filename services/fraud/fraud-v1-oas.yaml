  /alerts/bulk:
    post:
      tags:
      - Alerts
      summary: Bulk create alerts
      operationId: bulkCreateAlert
      description: Create up to 500 records in a single request. Returns per-row results.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items:
                    $ref: '#/components/schemas/CreateAlertRequest'
              required:
              - items
      responses:
        '200':
          description: Bulk operation results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  succeeded:
                    type: integer
                  failed:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        id:
                          type: string
                          format: uuid
                          nullable: true
                        error:
                          type: string
                          nullable: true
      security:
      - bearerAuth: []
    delete:
      tags:
      - Alerts
      summary: Bulk delete alerts
      operationId: bulkDeleteAlert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
              required:
              - ids
      responses:
        '200':
          description: Deletion summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                  skipped:
                    type: integer
      security:
      - bearerAuth: []
  /health:
    get:
