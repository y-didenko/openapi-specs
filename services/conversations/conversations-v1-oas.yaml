openapi: 3.0.3
info:
  title: Conversations API
  description: Cross-channel customer conversations.
  version: 1.2.0
  contact:
    name: Conversations Team
    email: conversations@example.com
servers:
- url: https://api.example.com/conversations/v1
  description: Production
- url: https://staging-api.example.com/conversations/v1
  description: Staging
tags:
- name: Conversations
  description: Conversations resource operations.
- name: Exports
  description: Exports resource operations.
- name: Health
  description: Service health checks.
paths:
  /conversations:
    get:
      tags:
      - Conversations
      summary: List conversations
      operationId: listConversation
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of conversations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Conversations
      summary: Create conversation
      operationId: createConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '201':
          description: Conversation created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /conversations/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Conversations
      summary: Get conversation by ID
      operationId: getConversation
      responses:
        '200':
          description: Conversation details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Conversations
      summary: Update conversation
      operationId: updateConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConversationRequest'
      responses:
        '200':
          description: Conversation updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Conversations
      summary: Delete conversation
      operationId: deleteConversation
      responses:
        '204':
          description: Conversation deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /exports:
    get:
      tags:
      - Exports
      summary: List exports
      operationId: listExport
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of exports.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Exports
      summary: Create export
      operationId: createExport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExportRequest'
      responses:
        '201':
          description: Export created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Export'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /exports/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Exports
      summary: Get export by ID
      operationId: getExport
      responses:
        '200':
          description: Export details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Export'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Exports
      summary: Update export
      operationId: updateExport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExportRequest'
      responses:
        '200':
          description: Export updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Export'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Exports
      summary: Delete export
      operationId: deleteExport
      responses:
        '204':
          description: Export deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Conversation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - draft
          - published
          - archived
        slug: &id001
          type: string
        notes: &id002
          type: string
        count: &id003
          type: integer
        weight: &id004
          type: number
          format: float
        archived: &id005
          type: boolean
        locked: &id006
          type: boolean
        lastSeenAt: &id007
          type: string
          format: date-time
        startDate: &id008
          type: string
          format: date
        parentId: &id009
          type: string
          format: uuid
        organizationId: &id010
          type: string
          format: uuid
        email: &id011
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    ConversationList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Conversation'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateConversationRequest:
      type: object
      properties:
        slug: *id001
        notes: *id002
        count: *id003
        weight: *id004
        archived: *id005
        locked: *id006
        lastSeenAt: *id007
        startDate: *id008
        parentId: *id009
        organizationId: *id010
        email: *id011
      required:
      - slug
      - notes
    UpdateConversationRequest:
      type: object
      properties:
        slug: *id001
        notes: *id002
        count: *id003
        weight: *id004
        archived: *id005
        locked: *id006
        lastSeenAt: *id007
        startDate: *id008
        parentId: *id009
        organizationId: *id010
        email: *id011
      required:
      - slug
      - notes
    Export:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - approved
          - rejected
        description: &id012
          type: string
        notes: &id013
          type: string
        position: &id014
          type: integer
        verified: &id015
          type: boolean
        endDate: &id016
          type: string
          format: date
        publishedAt: &id017
          type: string
          format: date-time
        price: &id018
          type: number
          format: float
        currency: &id019
          type: string
        tagId: &id020
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    ExportList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Export'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateExportRequest:
      type: object
      properties:
        description: *id012
        notes: *id013
        position: *id014
        verified: *id015
        endDate: *id016
        publishedAt: *id017
        price: *id018
        currency: *id019
        tagId: *id020
      required:
      - description
      - notes
    UpdateExportRequest:
      type: object
      properties:
        description: *id012
        notes: *id013
        position: *id014
        verified: *id015
        endDate: *id016
        publishedAt: *id017
        price: *id018
        currency: *id019
        tagId: *id020
      required:
      - description
      - notes
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
