openapi: 3.0.3
info:
  title: Polls API
  description: Polls and voting.
  version: 1.1.0
  contact:
    name: Polls Team
    email: polls@example.com
servers:
- url: https://api.example.com/polls/v1
  description: Production
- url: https://staging-api.example.com/polls/v1
  description: Staging
tags:
- name: Polls
  description: Polls resource operations.
- name: History
  description: History resource operations.
- name: Health
  description: Service health checks.
paths:
  /polls:
    get:
      tags:
      - Polls
      summary: List polls
      operationId: listPoll
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of polls.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Polls
      summary: Create poll
      operationId: createPoll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePollRequest'
      responses:
        '201':
          description: Poll created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Poll'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /polls/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Polls
      summary: Get poll by ID
      operationId: getPoll
      responses:
        '200':
          description: Poll details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Poll'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Polls
      summary: Update poll
      operationId: updatePoll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePollRequest'
      responses:
        '200':
          description: Poll updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Poll'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Polls
      summary: Delete poll
      operationId: deletePoll
      responses:
        '204':
          description: Poll deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /polls/stats:
    get:
      tags:
      - Polls
      summary: Aggregate polls stats
      operationId: getPollStats
      description: Returns aggregate counters (totals, by status, by day) suitable for dashboards.
      parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Aggregate stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  byDay:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        count:
                          type: integer
                example:
                  total: 1234
                  byStatus:
                    active: 800
                    archived: 200
                    pending: 234
                  byDay:
                  - date: '2026-04-28'
                    count: 42
                  - date: '2026-04-29'
                    count: 51
      security:
      - bearerAuth: []
  /history:
    get:
      tags:
      - History
      summary: List history
      operationId: listHistory
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - History
      summary: Create history
      operationId: createHistory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHistoryRequest'
      responses:
        '201':
          description: History created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/History'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /history/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - History
      summary: Get history by ID
      operationId: getHistory
      responses:
        '200':
          description: History details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/History'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - History
      summary: Update history
      operationId: updateHistory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHistoryRequest'
      responses:
        '200':
          description: History updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/History'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - History
      summary: Delete history
      operationId: deleteHistory
      responses:
        '204':
          description: History deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Poll:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - active
          - inactive
          - archived
        notes: &id001
          type: string
        description: &id002
          type: string
        version: &id003
          type: integer
        visible: &id004
          type: boolean
        locked: &id005
          type: boolean
        endDate: &id006
          type: string
          format: date
        expiresAt: &id007
          type: string
          format: date-time
        fee: &id008
          type: number
          format: float
        currency: &id009
          type: string
        ownerId: &id010
          type: string
          format: uuid
        parentId: &id011
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    PollList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Poll'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreatePollRequest:
      type: object
      properties:
        notes: *id001
        description: *id002
        version: *id003
        visible: *id004
        locked: *id005
        endDate: *id006
        expiresAt: *id007
        fee: *id008
        currency: *id009
        ownerId: *id010
        parentId: *id011
      required:
      - notes
      - description
    UpdatePollRequest:
      type: object
      properties:
        notes: *id001
        description: *id002
        version: *id003
        visible: *id004
        locked: *id005
        endDate: *id006
        expiresAt: *id007
        fee: *id008
        currency: *id009
        ownerId: *id010
        parentId: *id011
      required:
      - notes
      - description
    History:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - active
          - inactive
          - archived
        name: &id012
          type: string
        summary: &id013
          type: string
        priority: &id014
          type: integer
        archived: &id015
          type: boolean
        active: &id016
          type: boolean
        expiresAt: &id017
          type: string
          format: date-time
        amount: &id018
          type: number
          format: float
        price: &id019
          type: number
          format: float
        teamId: &id020
          type: string
          format: uuid
        updatedBy: &id021
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    HistoryList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/History'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateHistoryRequest:
      type: object
      properties:
        name: *id012
        summary: *id013
        priority: *id014
        archived: *id015
        active: *id016
        expiresAt: *id017
        amount: *id018
        price: *id019
        teamId: *id020
        updatedBy: *id021
      required:
      - name
      - summary
    UpdateHistoryRequest:
      type: object
      properties:
        name: *id012
        summary: *id013
        priority: *id014
        archived: *id015
        active: *id016
        expiresAt: *id017
        amount: *id018
        price: *id019
        teamId: *id020
        updatedBy: *id021
      required:
      - name
      - summary
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
