openapi: 3.0.3
info:
  title: Audit Log API
  description: Append-only audit log.
  version: 1.3.4
  contact:
    name: Audit Log Team
    email: auditlog@example.com
servers:
- url: https://api.example.com/audit-log/v1
  description: Production
- url: https://staging-api.example.com/audit-log/v1
  description: Staging
tags:
- name: Audit Log
  description: Audit Log resource operations.
- name: Health
  description: Service health checks.
paths:
  /audit-log:
    get:
      tags:
      - Audit Log
      summary: List audit log
      operationId: listAuditLog
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of audit log.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Audit Log
      summary: Create audit log
      operationId: createAuditLog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuditLogRequest'
      responses:
        '201':
          description: Audit Log created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLog'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /audit-log/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Audit Log
      summary: Get audit log by ID
      operationId: getAuditLog
      responses:
        '200':
          description: Audit Log details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLog'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Audit Log
      summary: Update audit log
      operationId: updateAuditLog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAuditLogRequest'
      responses:
        '200':
          description: Audit Log updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLog'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Audit Log
      summary: Delete audit log
      operationId: deleteAuditLog
      responses:
        '204':
          description: Audit Log deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - new
          - in_progress
          - resolved
          - closed
        title: &id001
          type: string
        reference: &id002
          type: string
        default: &id003
          type: boolean
        archived: &id004
          type: boolean
        startDate: &id005
          type: string
          format: date
        scheduledAt: &id006
          type: string
          format: date-time
        amount: &id007
          type: number
          format: float
        createdBy: &id008
          type: string
          format: uuid
        organizationId: &id009
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    AuditLogList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditLog'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateAuditLogRequest:
      type: object
      properties:
        title: *id001
        reference: *id002
        default: *id003
        archived: *id004
        startDate: *id005
        scheduledAt: *id006
        amount: *id007
        createdBy: *id008
        organizationId: *id009
      required:
      - title
      - reference
    UpdateAuditLogRequest:
      type: object
      properties:
        title: *id001
        reference: *id002
        default: *id003
        archived: *id004
        startDate: *id005
        scheduledAt: *id006
        amount: *id007
        createdBy: *id008
        organizationId: *id009
      required:
      - title
      - reference
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
