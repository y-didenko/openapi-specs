openapi: 3.0.3
info:
  title: Analytics Events API
  description: Behavioural event ingestion.
  version: 1.2.0
  contact:
    name: Analytics Events Team
    email: eventsanalytics@example.com
servers:
- url: https://api.example.com/events-analytics/v1
  description: Production
- url: https://staging-api.example.com/events-analytics/v1
  description: Staging
tags:
- name: Events Analytics
  description: Events Analytics resource operations.
- name: Labels
  description: Labels resource operations.
- name: Logs
  description: Logs resource operations.
- name: Health
  description: Service health checks.
paths:
  /events-analytics:
    get:
      tags:
      - Events Analytics
      summary: List events analytics
      operationId: listEventsAnalytic
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of events analytics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventsAnalyticList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Events Analytics
      summary: Create events analytic
      operationId: createEventsAnalytic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventsAnalyticRequest'
      responses:
        '201':
          description: Events Analytic created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventsAnalytic'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /events-analytics/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Events Analytics
      summary: Get events analytic by ID
      operationId: getEventsAnalytic
      responses:
        '200':
          description: Events Analytic details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventsAnalytic'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Events Analytics
      summary: Update events analytic
      operationId: updateEventsAnalytic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventsAnalyticRequest'
      responses:
        '200':
          description: Events Analytic updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventsAnalytic'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Events Analytics
      summary: Delete events analytic
      operationId: deleteEventsAnalytic
      responses:
        '204':
          description: Events Analytic deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /events-analytics/search:
    post:
      tags:
      - Events Analytics
      summary: Advanced search across events analytics
      operationId: searchEventsAnalytic
      description: Submit a structured query for complex filtering not expressible via the list endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      op:
                        type: string
                        enum:
                        - eq
                        - ne
                        - gt
                        - lt
                        - in
                        - contains
                      value: {}
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      direction:
                        type: string
                        enum:
                        - asc
                        - desc
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
                  maximum: 200
            example:
              filters:
              - field: status
                op: eq
                value: active
              - field: createdAt
                op: gt
                value: '2026-01-01T00:00:00Z'
              sort:
              - field: createdAt
                direction: desc
              page: 1
              limit: 50
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventsAnalyticList'
      security:
      - bearerAuth: []
  /events-analytics/{id}/audit:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Events Analytics
      summary: Get audit trail
      operationId: getEventsAnalyticAuditTrail
      description: Returns the chronological audit log for this record.
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          default: 50
          maximum: 500
      responses:
        '200':
          description: Audit entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        actor:
                          type: string
                        action:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
                        diff:
                          type: object
                          additionalProperties: true
      security:
      - bearerAuth: []
  /labels:
    get:
      tags:
      - Labels
      summary: List labels
      operationId: listLabel
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of labels.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Labels
      summary: Create label
      operationId: createLabel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLabelRequest'
      responses:
        '201':
          description: Label created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Label'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /labels/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Labels
      summary: Get label by ID
      operationId: getLabel
      responses:
        '200':
          description: Label details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Label'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Labels
      summary: Update label
      operationId: updateLabel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLabelRequest'
      responses:
        '200':
          description: Label updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Label'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Labels
      summary: Delete label
      operationId: deleteLabel
      responses:
        '204':
          description: Label deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /logs:
    get:
      tags:
      - Logs
      summary: List logs
      operationId: listLog
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of logs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Logs
      summary: Create log
      operationId: createLog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLogRequest'
      responses:
        '201':
          description: Log created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /logs/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Logs
      summary: Get log by ID
      operationId: getLog
      responses:
        '200':
          description: Log details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Logs
      summary: Update log
      operationId: updateLog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLogRequest'
      responses:
        '200':
          description: Log updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Logs
      summary: Delete log
      operationId: deleteLog
      responses:
        '204':
          description: Log deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /logs/{id}/audit:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Logs
      summary: Get audit trail
      operationId: getLogAuditTrail
      description: Returns the chronological audit log for this record.
      parameters:
      - name: limit
        in: query
        schema:
          type: integer
          default: 50
          maximum: 500
      responses:
        '200':
          description: Audit entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        actor:
                          type: string
                        action:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
                        diff:
                          type: object
                          additionalProperties: true
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    CommentEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        author:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
    Attachment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        contentType:
          type: string
        size:
          type: integer
        url:
          type: string
          format: uri
        uploadedAt:
          type: string
          format: date-time
    EventsAnalytic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - new
          - in_progress
          - resolved
          - closed
        reference: &id001
          type: string
        description: &id002
          type: string
        externalId: &id003
          type: string
        version: &id004
          type: integer
        default: &id005
          type: boolean
        lastSeenAt: &id006
          type: string
          format: date-time
        total: &id007
          type: number
          format: float
        subtotal: &id008
          type: number
          format: float
        categoryId: &id009
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    EventsAnalyticList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/EventsAnalytic'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateEventsAnalyticRequest:
      type: object
      properties:
        reference: *id001
        description: *id002
        externalId: *id003
        version: *id004
        default: *id005
        lastSeenAt: *id006
        total: *id007
        subtotal: *id008
        categoryId: *id009
      required:
      - reference
      - description
    UpdateEventsAnalyticRequest:
      type: object
      properties:
        reference: *id001
        description: *id002
        externalId: *id003
        version: *id004
        default: *id005
        lastSeenAt: *id006
        total: *id007
        subtotal: *id008
        categoryId: *id009
      required:
      - reference
      - description
    Label:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - open
          - closed
        slug: &id010
          type: string
        code: &id011
          type: string
        description: &id012
          type: string
        version: &id013
          type: integer
        active: &id014
          type: boolean
        enabled: &id015
          type: boolean
        completedAt: &id016
          type: string
          format: date-time
        startDate: &id017
          type: string
          format: date
        discount: &id018
          type: number
          format: float
        updatedBy: &id019
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    LabelList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateLabelRequest:
      type: object
      properties:
        slug: *id010
        code: *id011
        description: *id012
        version: *id013
        active: *id014
        enabled: *id015
        completedAt: *id016
        startDate: *id017
        discount: *id018
        updatedBy: *id019
      required:
      - slug
      - code
    UpdateLabelRequest:
      type: object
      properties:
        slug: *id010
        code: *id011
        description: *id012
        version: *id013
        active: *id014
        enabled: *id015
        completedAt: *id016
        startDate: *id017
        discount: *id018
        updatedBy: *id019
      required:
      - slug
      - code
    Log:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - draft
          - published
          - archived
        notes: &id020
          type: string
        title: &id021
          type: string
        slug: &id022
          type: string
        version: &id023
          type: integer
        default: &id024
          type: boolean
        dueDate: &id025
          type: string
          format: date
        amount: &id026
          type: number
          format: float
        organizationId: &id027
          type: string
          format: uuid
        updatedBy: &id028
          type: string
          format: uuid
        phone: &id029
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    LogList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Log'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateLogRequest:
      type: object
      properties:
        notes: *id020
        title: *id021
        slug: *id022
        version: *id023
        default: *id024
        dueDate: *id025
        amount: *id026
        organizationId: *id027
        updatedBy: *id028
        phone: *id029
      required:
      - notes
      - title
    UpdateLogRequest:
      type: object
      properties:
        notes: *id020
        title: *id021
        slug: *id022
        version: *id023
        default: *id024
        dueDate: *id025
        amount: *id026
        organizationId: *id027
        updatedBy: *id028
        phone: *id029
      required:
      - notes
      - title
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
