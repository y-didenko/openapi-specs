openapi: 3.0.3
info:
  title: Deals API
  description: Closed deal records.
  version: 1.3.4
  contact:
    name: Deals Team
    email: deals@example.com
servers:
- url: https://api.example.com/deals/v1
  description: Production
- url: https://staging-api.example.com/deals/v1
  description: Staging
tags:
- name: Deals
  description: Deals resource operations.
- name: Health
  description: Service health checks.
paths:
  /deals:
    get:
      tags:
      - Deals
      summary: List deals
      operationId: listDeal
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of deals.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Deals
      summary: Create deal
      operationId: createDeal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDealRequest'
      responses:
        '201':
          description: Deal created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /deals/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Deals
      summary: Get deal by ID
      operationId: getDeal
      responses:
        '200':
          description: Deal details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Deals
      summary: Update deal
      operationId: updateDeal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDealRequest'
      responses:
        '200':
          description: Deal updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deal'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Deals
      summary: Delete deal
      operationId: deleteDeal
      responses:
        '204':
          description: Deal deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /deals/stats:
    get:
      tags:
      - Deals
      summary: Aggregate deals stats
      operationId: getDealStats
      description: Returns aggregate counters (totals, by status, by day) suitable for dashboards.
      parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Aggregate stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  byDay:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        count:
                          type: integer
                example:
                  total: 1234
                  byStatus:
                    active: 800
                    archived: 200
                    pending: 234
                  byDay:
                  - date: '2026-04-28'
                    count: 42
                  - date: '2026-04-29'
                    count: 51
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Deal:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - queued
          - processing
          - completed
          - failed
          - cancelled
        slug: &id001
          type: string
        externalId: &id002
          type: string
        threshold: &id003
          type: number
          format: float
        weight: &id004
          type: number
          format: float
        visible: &id005
          type: boolean
        dueDate: &id006
          type: string
          format: date
        scheduledAt: &id007
          type: string
          format: date-time
        fee: &id008
          type: number
          format: float
        price: &id009
          type: number
          format: float
        categoryId: &id010
          type: string
          format: uuid
        websiteUrl: &id011
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    DealList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Deal'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateDealRequest:
      type: object
      properties:
        slug: *id001
        externalId: *id002
        threshold: *id003
        weight: *id004
        visible: *id005
        dueDate: *id006
        scheduledAt: *id007
        fee: *id008
        price: *id009
        categoryId: *id010
        websiteUrl: *id011
      required:
      - slug
      - externalId
    UpdateDealRequest:
      type: object
      properties:
        slug: *id001
        externalId: *id002
        threshold: *id003
        weight: *id004
        visible: *id005
        dueDate: *id006
        scheduledAt: *id007
        fee: *id008
        price: *id009
        categoryId: *id010
        websiteUrl: *id011
      required:
      - slug
      - externalId
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
