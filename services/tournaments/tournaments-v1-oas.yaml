openapi: 3.0.3
info:
  title: Tournaments API
  description: Tournament brackets and results.
  version: 2.1.0
  contact:
    name: Tournaments Team
    email: tournaments@example.com
servers:
- url: https://api.example.com/tournaments/v1
  description: Production
- url: https://staging-api.example.com/tournaments/v1
  description: Staging
tags:
- name: Tournaments
  description: Tournaments resource operations.
- name: Imports
  description: Imports resource operations.
- name: Health
  description: Service health checks.
paths:
  /tournaments:
    get:
      tags:
      - Tournaments
      summary: List tournaments
      operationId: listTournament
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of tournaments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TournamentList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Tournaments
      summary: Create tournament
      operationId: createTournament
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTournamentRequest'
      responses:
        '201':
          description: Tournament created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tournament'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /tournaments/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Tournaments
      summary: Get tournament by ID
      operationId: getTournament
      responses:
        '200':
          description: Tournament details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tournament'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Tournaments
      summary: Update tournament
      operationId: updateTournament
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTournamentRequest'
      responses:
        '200':
          description: Tournament updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tournament'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Tournaments
      summary: Delete tournament
      operationId: deleteTournament
      responses:
        '204':
          description: Tournament deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /imports:
    get:
      tags:
      - Imports
      summary: List imports
      operationId: listImport
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of imports.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Imports
      summary: Create import
      operationId: createImport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImportRequest'
      responses:
        '201':
          description: Import created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Import'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /imports/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Imports
      summary: Get import by ID
      operationId: getImport
      responses:
        '200':
          description: Import details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Import'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Imports
      summary: Update import
      operationId: updateImport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateImportRequest'
      responses:
        '200':
          description: Import updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Import'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Imports
      summary: Delete import
      operationId: deleteImport
      responses:
        '204':
          description: Import deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Tournament:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - draft
          - published
          - archived
        externalId: &id001
          type: string
        displayName: &id002
          type: string
        count: &id003
          type: integer
        capacity: &id004
          type: integer
        verified: &id005
          type: boolean
        default: &id006
          type: boolean
        scheduledAt: &id007
          type: string
          format: date-time
        discount: &id008
          type: number
          format: float
        subtotal: &id009
          type: number
          format: float
        tagId: &id010
          type: string
          format: uuid
        createdBy: &id011
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    TournamentList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Tournament'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateTournamentRequest:
      type: object
      properties:
        externalId: *id001
        displayName: *id002
        count: *id003
        capacity: *id004
        verified: *id005
        default: *id006
        scheduledAt: *id007
        discount: *id008
        subtotal: *id009
        tagId: *id010
        createdBy: *id011
      required:
      - externalId
      - displayName
    UpdateTournamentRequest:
      type: object
      properties:
        externalId: *id001
        displayName: *id002
        count: *id003
        capacity: *id004
        verified: *id005
        default: *id006
        scheduledAt: *id007
        discount: *id008
        subtotal: *id009
        tagId: *id010
        createdBy: *id011
      required:
      - externalId
      - displayName
    Import:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - scheduled
          - running
          - completed
          - failed
        reference: &id012
          type: string
        slug: &id013
          type: string
        summary: &id014
          type: string
        version: &id015
          type: integer
        position: &id016
          type: integer
        enabled: &id017
          type: boolean
        verified: &id018
          type: boolean
        endDate: &id019
          type: string
          format: date
        parentId: &id020
          type: string
          format: uuid
        websiteUrl: &id021
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    ImportList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Import'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateImportRequest:
      type: object
      properties:
        reference: *id012
        slug: *id013
        summary: *id014
        version: *id015
        position: *id016
        enabled: *id017
        verified: *id018
        endDate: *id019
        parentId: *id020
        websiteUrl: *id021
      required:
      - reference
      - slug
    UpdateImportRequest:
      type: object
      properties:
        reference: *id012
        slug: *id013
        summary: *id014
        version: *id015
        position: *id016
        enabled: *id017
        verified: *id018
        endDate: *id019
        parentId: *id020
        websiteUrl: *id021
      required:
      - reference
      - slug
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
