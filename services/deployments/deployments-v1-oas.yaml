openapi: 3.0.3
info:
  title: Deployments API
  description: Deployment orchestration.
  version: 2.1.0
  contact:
    name: Deployments Team
    email: deployments@example.com
servers:
- url: https://api.example.com/deployments/v1
  description: Production
- url: https://staging-api.example.com/deployments/v1
  description: Staging
tags:
- name: Deployments
  description: Deployments resource operations.
- name: Health
  description: Service health checks.
paths:
  /deployments:
    get:
      tags:
      - Deployments
      summary: List deployments
      operationId: listDeployment
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of deployments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Deployments
      summary: Create deployment
      operationId: createDeployment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeploymentRequest'
      responses:
        '201':
          description: Deployment created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /deployments/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Deployments
      summary: Get deployment by ID
      operationId: getDeployment
      responses:
        '200':
          description: Deployment details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Deployments
      summary: Update deployment
      operationId: updateDeployment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeploymentRequest'
      responses:
        '200':
          description: Deployment updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Deployments
      summary: Delete deployment
      operationId: deleteDeployment
      responses:
        '204':
          description: Deployment deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Deployment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - new
          - in_progress
          - resolved
          - closed
        notes: &id001
          type: string
        externalId: &id002
          type: string
        verified: &id003
          type: boolean
        archived: &id004
          type: boolean
        lastSeenAt: &id005
          type: string
          format: date-time
        createdBy: &id006
          type: string
          format: uuid
        teamId: &id007
          type: string
          format: uuid
        websiteUrl: &id008
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    DeploymentList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Deployment'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateDeploymentRequest:
      type: object
      properties:
        notes: *id001
        externalId: *id002
        verified: *id003
        archived: *id004
        lastSeenAt: *id005
        createdBy: *id006
        teamId: *id007
        websiteUrl: *id008
      required:
      - notes
      - externalId
    UpdateDeploymentRequest:
      type: object
      properties:
        notes: *id001
        externalId: *id002
        verified: *id003
        archived: *id004
        lastSeenAt: *id005
        createdBy: *id006
        teamId: *id007
        websiteUrl: *id008
      required:
      - notes
      - externalId
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
