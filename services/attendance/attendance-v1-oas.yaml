openapi: 3.0.3
info:
  title: Attendance API
  description: Clock-in/out and attendance records.
  version: 1.3.4
  contact:
    name: Attendance Team
    email: attendance@example.com
servers:
- url: https://api.example.com/attendance/v1
  description: Production
- url: https://staging-api.example.com/attendance/v1
  description: Staging
tags:
- name: Attendance
  description: Attendance resource operations.
- name: Health
  description: Service health checks.
paths:
  /attendance:
    get:
      tags:
      - Attendance
      summary: List attendance
      operationId: listAttendance
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of attendance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Attendance
      summary: Create attendance
      operationId: createAttendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAttendanceRequest'
      responses:
        '201':
          description: Attendance created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /attendance/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Attendance
      summary: Get attendance by ID
      operationId: getAttendance
      responses:
        '200':
          description: Attendance details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Attendance
      summary: Update attendance
      operationId: updateAttendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAttendanceRequest'
      responses:
        '200':
          description: Attendance updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Attendance
      summary: Delete attendance
      operationId: deleteAttendance
      responses:
        '204':
          description: Attendance deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Attendance:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - new
          - in_progress
          - resolved
          - closed
        notes: &id001
          type: string
        title: &id002
          type: string
        locked: &id003
          type: boolean
        visible: &id004
          type: boolean
        dueDate: &id005
          type: string
          format: date
        teamId: &id006
          type: string
          format: uuid
        organizationId: &id007
          type: string
          format: uuid
        email: &id008
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    AttendanceList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Attendance'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateAttendanceRequest:
      type: object
      properties:
        notes: *id001
        title: *id002
        locked: *id003
        visible: *id004
        dueDate: *id005
        teamId: *id006
        organizationId: *id007
        email: *id008
      required:
      - notes
      - title
    UpdateAttendanceRequest:
      type: object
      properties:
        notes: *id001
        title: *id002
        locked: *id003
        visible: *id004
        dueDate: *id005
        teamId: *id006
        organizationId: *id007
        email: *id008
      required:
      - notes
      - title
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
