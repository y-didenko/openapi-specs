openapi: 3.0.3
info:
  title: Audit API
  description: Security audit event log.
  version: 1.3.4
  contact:
    name: Audit Team
    email: audit@example.com
servers:
- url: https://api.example.com/audit/v1
  description: Production
- url: https://staging-api.example.com/audit/v1
  description: Staging
tags:
- name: Audit
  description: Audit resource operations.
- name: Templates
  description: Templates resource operations.
- name: Health
  description: Service health checks.
paths:
  /audit:
    get:
      tags:
      - Audit
      summary: List audit
      operationId: listAudit
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of audit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Audit
      summary: Create audit
      operationId: createAudit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuditRequest'
      responses:
        '201':
          description: Audit created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Audit'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /audit/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Audit
      summary: Get audit by ID
      operationId: getAudit
      responses:
        '200':
          description: Audit details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Audit'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Audit
      summary: Update audit
      operationId: updateAudit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAuditRequest'
      responses:
        '200':
          description: Audit updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Audit'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Audit
      summary: Delete audit
      operationId: deleteAudit
      responses:
        '204':
          description: Audit deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /templates:
    get:
      tags:
      - Templates
      summary: List templates
      operationId: listTemplate
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of templates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Templates
      summary: Create template
      operationId: createTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
      responses:
        '201':
          description: Template created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /templates/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Templates
      summary: Get template by ID
      operationId: getTemplate
      responses:
        '200':
          description: Template details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Templates
      summary: Update template
      operationId: updateTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateRequest'
      responses:
        '200':
          description: Template updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Templates
      summary: Delete template
      operationId: deleteTemplate
      responses:
        '204':
          description: Template deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Audit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - new
          - in_progress
          - resolved
          - closed
        name: &id001
          type: string
        notes: &id002
          type: string
        slug: &id003
          type: string
        score: &id004
          type: number
          format: float
        threshold: &id005
          type: number
          format: float
        archived: &id006
          type: boolean
        enabled: &id007
          type: boolean
        startDate: &id008
          type: string
          format: date
        currency: &id009
          type: string
        organizationId: &id010
          type: string
          format: uuid
        websiteUrl: &id011
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    AuditList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Audit'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateAuditRequest:
      type: object
      properties:
        name: *id001
        notes: *id002
        slug: *id003
        score: *id004
        threshold: *id005
        archived: *id006
        enabled: *id007
        startDate: *id008
        currency: *id009
        organizationId: *id010
        websiteUrl: *id011
      required:
      - name
      - notes
    UpdateAuditRequest:
      type: object
      properties:
        name: *id001
        notes: *id002
        slug: *id003
        score: *id004
        threshold: *id005
        archived: *id006
        enabled: *id007
        startDate: *id008
        currency: *id009
        organizationId: *id010
        websiteUrl: *id011
      required:
      - name
      - notes
    Template:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - scheduled
          - running
          - completed
          - failed
        code: &id012
          type: string
        name: &id013
          type: string
        visible: &id014
          type: boolean
        default: &id015
          type: boolean
        startDate: &id016
          type: string
          format: date
        total: &id017
          type: number
          format: float
        amount: &id018
          type: number
          format: float
        organizationId: &id019
          type: string
          format: uuid
        createdBy: &id020
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    TemplateList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Template'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateTemplateRequest:
      type: object
      properties:
        code: *id012
        name: *id013
        visible: *id014
        default: *id015
        startDate: *id016
        total: *id017
        amount: *id018
        organizationId: *id019
        createdBy: *id020
      required:
      - code
      - name
    UpdateTemplateRequest:
      type: object
      properties:
        code: *id012
        name: *id013
        visible: *id014
        default: *id015
        startDate: *id016
        total: *id017
        amount: *id018
        organizationId: *id019
        createdBy: *id020
      required:
      - code
      - name
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
