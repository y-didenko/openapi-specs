openapi: 3.0.3
info:
  title: Push Notifications API
  description: Mobile push notification delivery.
  version: 1.2.0
  contact:
    name: Push Notifications Team
    email: push@example.com
servers:
- url: https://api.example.com/push/v1
  description: Production
- url: https://staging-api.example.com/push/v1
  description: Staging
tags:
- name: Push
  description: Push resource operations.
- name: Notes
  description: Notes resource operations.
- name: Health
  description: Service health checks.
paths:
  /push:
    get:
      tags:
      - Push
      summary: List push
      operationId: listPush
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of push.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PushList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Push
      summary: Create push
      operationId: createPush
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePushRequest'
      responses:
        '201':
          description: Push created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Push'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /push/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Push
      summary: Get push by ID
      operationId: getPush
      responses:
        '200':
          description: Push details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Push'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Push
      summary: Update push
      operationId: updatePush
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePushRequest'
      responses:
        '200':
          description: Push updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Push'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Push
      summary: Delete push
      operationId: deletePush
      responses:
        '204':
          description: Push deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /push/bulk:
    post:
      tags:
      - Push
      summary: Bulk create push
      operationId: bulkCreatePush
      description: Create up to 500 records in a single request. Returns per-row results.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items:
                    $ref: '#/components/schemas/CreatePushRequest'
              required:
              - items
      responses:
        '200':
          description: Bulk operation results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  succeeded:
                    type: integer
                  failed:
                    type: integer
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: integer
                        id:
                          type: string
                          format: uuid
                          nullable: true
                        error:
                          type: string
                          nullable: true
      security:
      - bearerAuth: []
    delete:
      tags:
      - Push
      summary: Bulk delete push
      operationId: bulkDeletePush
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
              required:
              - ids
      responses:
        '200':
          description: Deletion summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                  skipped:
                    type: integer
      security:
      - bearerAuth: []
  /push/search:
    post:
      tags:
      - Push
      summary: Advanced search across push
      operationId: searchPush
      description: Submit a structured query for complex filtering not expressible via the list endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      op:
                        type: string
                        enum:
                        - eq
                        - ne
                        - gt
                        - lt
                        - in
                        - contains
                      value: {}
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      direction:
                        type: string
                        enum:
                        - asc
                        - desc
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
                  maximum: 200
            example:
              filters:
              - field: status
                op: eq
                value: active
              - field: createdAt
                op: gt
                value: '2026-01-01T00:00:00Z'
              sort:
              - field: createdAt
                direction: desc
              page: 1
              limit: 50
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PushList'
      security:
      - bearerAuth: []
  /notes:
    get:
      tags:
      - Notes
      summary: List notes
      operationId: listNote
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of notes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Notes
      summary: Create note
      operationId: createNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNoteRequest'
      responses:
        '201':
          description: Note created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /notes/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Notes
      summary: Get note by ID
      operationId: getNote
      responses:
        '200':
          description: Note details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Notes
      summary: Update note
      operationId: updateNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNoteRequest'
      responses:
        '200':
          description: Note updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Notes
      summary: Delete note
      operationId: deleteNote
      responses:
        '204':
          description: Note deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    CommentEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        author:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
    Attachment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        contentType:
          type: string
        size:
          type: integer
        url:
          type: string
          format: uri
        uploadedAt:
          type: string
          format: date-time
    Push:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - new
          - in_progress
          - resolved
          - closed
        name: &id001
          type: string
        summary: &id002
          type: string
        version: &id003
          type: integer
        verified: &id004
          type: boolean
        publishedAt: &id005
          type: string
          format: date-time
        dueDate: &id006
          type: string
          format: date
        tagId: &id007
          type: string
          format: uuid
        createdBy: &id008
          type: string
          format: uuid
        websiteUrl: &id009
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    PushList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Push'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreatePushRequest:
      type: object
      properties:
        name: *id001
        summary: *id002
        version: *id003
        verified: *id004
        publishedAt: *id005
        dueDate: *id006
        tagId: *id007
        createdBy: *id008
        websiteUrl: *id009
      required:
      - name
      - summary
    UpdatePushRequest:
      type: object
      properties:
        name: *id001
        summary: *id002
        version: *id003
        verified: *id004
        publishedAt: *id005
        dueDate: *id006
        tagId: *id007
        createdBy: *id008
        websiteUrl: *id009
      required:
      - name
      - summary
    Note:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - open
          - closed
        displayName: &id010
          type: string
        externalId: &id011
          type: string
        summary: &id012
          type: string
        score: &id013
          type: number
          format: float
        count: &id014
          type: integer
        default: &id015
          type: boolean
        endDate: &id016
          type: string
          format: date
        lastSeenAt: &id017
          type: string
          format: date-time
        total: &id018
          type: number
          format: float
        discount: &id019
          type: number
          format: float
        ownerId: &id020
          type: string
          format: uuid
        tagId: &id021
          type: string
          format: uuid
        phone: &id022
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    NoteList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Note'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateNoteRequest:
      type: object
      properties:
        displayName: *id010
        externalId: *id011
        summary: *id012
        score: *id013
        count: *id014
        default: *id015
        endDate: *id016
        lastSeenAt: *id017
        total: *id018
        discount: *id019
        ownerId: *id020
        tagId: *id021
        phone: *id022
      required:
      - displayName
      - externalId
    UpdateNoteRequest:
      type: object
      properties:
        displayName: *id010
        externalId: *id011
        summary: *id012
        score: *id013
        count: *id014
        default: *id015
        endDate: *id016
        lastSeenAt: *id017
        total: *id018
        discount: *id019
        ownerId: *id020
        tagId: *id021
        phone: *id022
      required:
      - displayName
      - externalId
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
