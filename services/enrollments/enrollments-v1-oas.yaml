openapi: 3.0.3
info:
  title: Enrollments API
  description: Course enrollment lifecycle.
  version: 1.0.0
  contact:
    name: Enrollments Team
    email: enrollments@example.com
servers:
- url: https://api.example.com/enrollments/v1
  description: Production
- url: https://staging-api.example.com/enrollments/v1
  description: Staging
tags:
- name: Enrollments
  description: Enrollments resource operations.
- name: Health
  description: Service health checks.
paths:
  /enrollments:
    get:
      tags:
      - Enrollments
      summary: List enrollments
      operationId: listEnrollment
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of enrollments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Enrollments
      summary: Create enrollment
      operationId: createEnrollment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEnrollmentRequest'
      responses:
        '201':
          description: Enrollment created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enrollment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /enrollments/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Enrollments
      summary: Get enrollment by ID
      operationId: getEnrollment
      responses:
        '200':
          description: Enrollment details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enrollment'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Enrollments
      summary: Update enrollment
      operationId: updateEnrollment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEnrollmentRequest'
      responses:
        '200':
          description: Enrollment updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enrollment'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Enrollments
      summary: Delete enrollment
      operationId: deleteEnrollment
      responses:
        '204':
          description: Enrollment deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /enrollments/search:
    post:
      tags:
      - Enrollments
      summary: Advanced search across enrollments
      operationId: searchEnrollment
      description: Submit a structured query for complex filtering not expressible via the list endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      op:
                        type: string
                        enum:
                        - eq
                        - ne
                        - gt
                        - lt
                        - in
                        - contains
                      value: {}
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      direction:
                        type: string
                        enum:
                        - asc
                        - desc
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
                  maximum: 200
            example:
              filters:
              - field: status
                op: eq
                value: active
              - field: createdAt
                op: gt
                value: '2026-01-01T00:00:00Z'
              sort:
              - field: createdAt
                direction: desc
              page: 1
              limit: 50
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentList'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Enrollment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - active
          - inactive
          - archived
        slug: &id001
          type: string
        description: &id002
          type: string
        reference: &id003
          type: string
        capacity: &id004
          type: integer
        archived: &id005
          type: boolean
        lastSeenAt: &id006
          type: string
          format: date-time
        total: &id007
          type: number
          format: float
        fee: &id008
          type: number
          format: float
        createdBy: &id009
          type: string
          format: uuid
        phone: &id010
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    EnrollmentList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Enrollment'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateEnrollmentRequest:
      type: object
      properties:
        slug: *id001
        description: *id002
        reference: *id003
        capacity: *id004
        archived: *id005
        lastSeenAt: *id006
        total: *id007
        fee: *id008
        createdBy: *id009
        phone: *id010
      required:
      - slug
      - description
    UpdateEnrollmentRequest:
      type: object
      properties:
        slug: *id001
        description: *id002
        reference: *id003
        capacity: *id004
        archived: *id005
        lastSeenAt: *id006
        total: *id007
        fee: *id008
        createdBy: *id009
        phone: *id010
      required:
      - slug
      - description
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
