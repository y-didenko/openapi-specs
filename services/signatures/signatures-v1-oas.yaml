openapi: 3.0.3
info:
  title: Signatures API
  description: E-signature requests.
  version: 1.1.0
  contact:
    name: Signatures Team
    email: signatures@example.com
servers:
- url: https://api.example.com/signatures/v1
  description: Production
- url: https://staging-api.example.com/signatures/v1
  description: Staging
tags:
- name: Signatures
  description: Signatures resource operations.
- name: Health
  description: Service health checks.
paths:
  /signatures:
    get:
      tags:
      - Signatures
      summary: List signatures
      operationId: listSignature
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of signatures.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignatureList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Signatures
      summary: Create signature
      operationId: createSignature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSignatureRequest'
      responses:
        '201':
          description: Signature created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Signature'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /signatures/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Signatures
      summary: Get signature by ID
      operationId: getSignature
      responses:
        '200':
          description: Signature details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Signature'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Signatures
      summary: Update signature
      operationId: updateSignature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSignatureRequest'
      responses:
        '200':
          description: Signature updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Signature'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Signatures
      summary: Delete signature
      operationId: deleteSignature
      responses:
        '204':
          description: Signature deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /signatures/search:
    post:
      tags:
      - Signatures
      summary: Advanced search across signatures
      operationId: searchSignature
      description: Submit a structured query for complex filtering not expressible via the list endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      op:
                        type: string
                        enum:
                        - eq
                        - ne
                        - gt
                        - lt
                        - in
                        - contains
                      value: {}
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      direction:
                        type: string
                        enum:
                        - asc
                        - desc
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
                  maximum: 200
            example:
              filters:
              - field: status
                op: eq
                value: active
              - field: createdAt
                op: gt
                value: '2026-01-01T00:00:00Z'
              sort:
              - field: createdAt
                direction: desc
              page: 1
              limit: 50
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignatureList'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Signature:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - new
          - in_progress
          - resolved
          - closed
        notes: &id001
          type: string
        description: &id002
          type: string
        slug: &id003
          type: string
        score: &id004
          type: number
          format: float
        priority: &id005
          type: integer
        archived: &id006
          type: boolean
        visible: &id007
          type: boolean
        publishedAt: &id008
          type: string
          format: date-time
        price: &id009
          type: number
          format: float
        categoryId: &id010
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    SignatureList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Signature'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateSignatureRequest:
      type: object
      properties:
        notes: *id001
        description: *id002
        slug: *id003
        score: *id004
        priority: *id005
        archived: *id006
        visible: *id007
        publishedAt: *id008
        price: *id009
        categoryId: *id010
      required:
      - notes
      - description
    UpdateSignatureRequest:
      type: object
      properties:
        notes: *id001
        description: *id002
        slug: *id003
        score: *id004
        priority: *id005
        archived: *id006
        visible: *id007
        publishedAt: *id008
        price: *id009
        categoryId: *id010
      required:
      - notes
      - description
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
