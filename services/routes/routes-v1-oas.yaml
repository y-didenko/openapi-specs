      schema:
        type: string
        format: uuid
    post:
      tags:
      - History
      summary: Deactivate history
      operationId: deactivateHistory
      description: Transitions the record to the deactivate state. Idempotent on records already in the target state.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for the transition.
                note:
                  type: string
