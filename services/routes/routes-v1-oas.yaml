        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /logs/{id}/comments:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Logs
      summary: List comments
      operationId: listLogComments
      responses:
        '200':
          description: Comments list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CommentEntry'
      security:
      - bearerAuth: []
    post:
      tags:
      - Logs
      summary: Add comment
      operationId: addLogComment
      requestBody:
        required: true
