openapi: 3.0.3
info:
  title: Warehouses API
  description: Warehouse locations and capacity.
  version: 1.2.0
  contact:
    name: Warehouses Team
    email: warehouses@example.com
servers:
- url: https://api.example.com/warehouses/v1
  description: Production
- url: https://staging-api.example.com/warehouses/v1
  description: Staging
tags:
- name: Warehouses
  description: Warehouses resource operations.
- name: Health
  description: Service health checks.
paths:
  /warehouses:
    get:
      tags:
      - Warehouses
      summary: List warehouses
      operationId: listWarehous
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of warehouses.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarehousList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Warehouses
      summary: Create warehous
      operationId: createWarehou
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWarehousRequest'
      responses:
        '201':
          description: Warehous created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Warehous'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /warehouses/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Warehouses
      summary: Get warehous by ID
      operationId: getWarehou
      responses:
        '200':
          description: Warehous details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Warehous'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Warehouses
      summary: Update warehous
      operationId: updateWarehou
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWarehousRequest'
      responses:
        '200':
          description: Warehous updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Warehous'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Warehouses
      summary: Delete warehous
      operationId: deleteWarehou
      responses:
        '204':
          description: Warehous deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Warehous:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - active
          - inactive
          - archived
        notes: &id001
          type: string
        externalId: &id002
          type: string
        rank: &id003
          type: integer
        version: &id004
          type: integer
        archived: &id005
          type: boolean
        enabled: &id006
          type: boolean
        expiresAt: &id007
          type: string
          format: date-time
        dueDate: &id008
          type: string
          format: date
        createdBy: &id009
          type: string
          format: uuid
        email: &id010
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    WarehousList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Warehous'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateWarehousRequest:
      type: object
      properties:
        notes: *id001
        externalId: *id002
        rank: *id003
        version: *id004
        archived: *id005
        enabled: *id006
        expiresAt: *id007
        dueDate: *id008
        createdBy: *id009
        email: *id010
      required:
      - notes
      - externalId
    UpdateWarehousRequest:
      type: object
      properties:
        notes: *id001
        externalId: *id002
        rank: *id003
        version: *id004
        archived: *id005
        enabled: *id006
        expiresAt: *id007
        dueDate: *id008
        createdBy: *id009
        email: *id010
      required:
      - notes
      - externalId
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
