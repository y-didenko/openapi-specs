openapi: 3.0.3
info:
  title: Coupons API
  description: Coupon code issuance and redemption.
  version: 1.1.0
  contact:
    name: Coupons Team
    email: coupons@example.com
servers:
- url: https://api.example.com/coupons/v1
  description: Production
- url: https://staging-api.example.com/coupons/v1
  description: Staging
tags:
- name: Coupons
  description: Coupons resource operations.
- name: Imports
  description: Imports resource operations.
- name: Health
  description: Service health checks.
paths:
  /coupons:
    get:
      tags:
      - Coupons
      summary: List coupons
      operationId: listCoupon
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of coupons.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CouponList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Coupons
      summary: Create coupon
      operationId: createCoupon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCouponRequest'
      responses:
        '201':
          description: Coupon created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coupon'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /coupons/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Coupons
      summary: Get coupon by ID
      operationId: getCoupon
      responses:
        '200':
          description: Coupon details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coupon'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Coupons
      summary: Update coupon
      operationId: updateCoupon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCouponRequest'
      responses:
        '200':
          description: Coupon updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Coupon'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Coupons
      summary: Delete coupon
      operationId: deleteCoupon
      responses:
        '204':
          description: Coupon deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /coupons/search:
    post:
      tags:
      - Coupons
      summary: Advanced search across coupons
      operationId: searchCoupon
      description: Submit a structured query for complex filtering not expressible via the list endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      op:
                        type: string
                        enum:
                        - eq
                        - ne
                        - gt
                        - lt
                        - in
                        - contains
                      value: {}
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      direction:
                        type: string
                        enum:
                        - asc
                        - desc
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
                  maximum: 200
            example:
              filters:
              - field: status
                op: eq
                value: active
              - field: createdAt
                op: gt
                value: '2026-01-01T00:00:00Z'
              sort:
              - field: createdAt
                direction: desc
              page: 1
              limit: 50
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CouponList'
      security:
      - bearerAuth: []
  /imports:
    get:
      tags:
      - Imports
      summary: List imports
      operationId: listImport
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of imports.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Imports
      summary: Create import
      operationId: createImport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImportRequest'
      responses:
        '201':
          description: Import created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Import'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /imports/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Imports
      summary: Get import by ID
      operationId: getImport
      responses:
        '200':
          description: Import details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Import'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Imports
      summary: Update import
      operationId: updateImport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateImportRequest'
      responses:
        '200':
          description: Import updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Import'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Imports
      summary: Delete import
      operationId: deleteImport
      responses:
        '204':
          description: Import deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Coupon:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - scheduled
          - running
          - completed
          - failed
        description: &id001
          type: string
        slug: &id002
          type: string
        version: &id003
          type: integer
        visible: &id004
          type: boolean
        archived: &id005
          type: boolean
        scheduledAt: &id006
          type: string
          format: date-time
        endDate: &id007
          type: string
          format: date
        currency: &id008
          type: string
        ownerId: &id009
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    CouponList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Coupon'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateCouponRequest:
      type: object
      properties:
        description: *id001
        slug: *id002
        version: *id003
        visible: *id004
        archived: *id005
        scheduledAt: *id006
        endDate: *id007
        currency: *id008
        ownerId: *id009
      required:
      - description
      - slug
    UpdateCouponRequest:
      type: object
      properties:
        description: *id001
        slug: *id002
        version: *id003
        visible: *id004
        archived: *id005
        scheduledAt: *id006
        endDate: *id007
        currency: *id008
        ownerId: *id009
      required:
      - description
      - slug
    Import:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - active
          - inactive
          - archived
        externalId: &id010
          type: string
        code: &id011
          type: string
        weight: &id012
          type: number
          format: float
        score: &id013
          type: number
          format: float
        locked: &id014
          type: boolean
        scheduledAt: &id015
          type: string
          format: date-time
        endDate: &id016
          type: string
          format: date
        currency: &id017
          type: string
        createdBy: &id018
          type: string
          format: uuid
        phone: &id019
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    ImportList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Import'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateImportRequest:
      type: object
      properties:
        externalId: *id010
        code: *id011
        weight: *id012
        score: *id013
        locked: *id014
        scheduledAt: *id015
        endDate: *id016
        currency: *id017
        createdBy: *id018
        phone: *id019
      required:
      - externalId
      - code
    UpdateImportRequest:
      type: object
      properties:
        externalId: *id010
        code: *id011
        weight: *id012
        score: *id013
        locked: *id014
        scheduledAt: *id015
        endDate: *id016
        currency: *id017
        createdBy: *id018
        phone: *id019
      required:
      - externalId
      - code
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
