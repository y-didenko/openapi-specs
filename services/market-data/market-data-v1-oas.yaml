openapi: 3.0.3
info:
  title: Market Data API
  description: Historical market data.
  version: 1.3.4
  contact:
    name: Market Data Team
    email: marketdata@example.com
servers:
- url: https://api.example.com/market-data/v1
  description: Production
- url: https://staging-api.example.com/market-data/v1
  description: Staging
tags:
- name: Market Data
  description: Market Data resource operations.
- name: Health
  description: Service health checks.
paths:
  /market-data:
    get:
      tags:
      - Market Data
      summary: List market data
      operationId: listMarketData
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of market data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketDataList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Market Data
      summary: Create market data
      operationId: createMarketData
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMarketDataRequest'
      responses:
        '201':
          description: Market Data created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /market-data/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Market Data
      summary: Get market data by ID
      operationId: getMarketData
      responses:
        '200':
          description: Market Data details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketData'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Market Data
      summary: Update market data
      operationId: updateMarketData
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMarketDataRequest'
      responses:
        '200':
          description: Market Data updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketData'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Market Data
      summary: Delete market data
      operationId: deleteMarketData
      responses:
        '204':
          description: Market Data deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    MarketData:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - queued
          - processing
          - completed
          - failed
          - cancelled
        slug: &id001
          type: string
        externalId: &id002
          type: string
        name: &id003
          type: string
        locked: &id004
          type: boolean
        scheduledAt: &id005
          type: string
          format: date-time
        total: &id006
          type: number
          format: float
        teamId: &id007
          type: string
          format: uuid
        tagId: &id008
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    MarketDataList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MarketData'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateMarketDataRequest:
      type: object
      properties:
        slug: *id001
        externalId: *id002
        name: *id003
        locked: *id004
        scheduledAt: *id005
        total: *id006
        teamId: *id007
        tagId: *id008
      required:
      - slug
      - externalId
    UpdateMarketDataRequest:
      type: object
      properties:
        slug: *id001
        externalId: *id002
        name: *id003
        locked: *id004
        scheduledAt: *id005
        total: *id006
        teamId: *id007
        tagId: *id008
      required:
      - slug
      - externalId
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
