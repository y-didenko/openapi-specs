openapi: 3.0.3
info:
  title: SSO API
  description: SAML and OIDC identity provider integration.
  version: 1.3.4
  contact:
    name: SSO Team
    email: sso@example.com
servers:
- url: https://api.example.com/sso/v1
  description: Production
- url: https://staging-api.example.com/sso/v1
  description: Staging
tags:
- name: Sso
  description: Sso resource operations.
- name: Health
  description: Service health checks.
paths:
  /sso:
    get:
      tags:
      - Sso
      summary: List sso
      operationId: listSso
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of sso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SsoList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Sso
      summary: Create sso
      operationId: createSso
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSsoRequest'
      responses:
        '201':
          description: Sso created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sso'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /sso/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Sso
      summary: Get sso by ID
      operationId: getSso
      responses:
        '200':
          description: Sso details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sso'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Sso
      summary: Update sso
      operationId: updateSso
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSsoRequest'
      responses:
        '200':
          description: Sso updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sso'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Sso
      summary: Delete sso
      operationId: deleteSso
      responses:
        '204':
          description: Sso deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /sso/search:
    post:
      tags:
      - Sso
      summary: Advanced search across sso
      operationId: searchSso
      description: Submit a structured query for complex filtering not expressible via the list endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      op:
                        type: string
                        enum:
                        - eq
                        - ne
                        - gt
                        - lt
                        - in
                        - contains
                      value: {}
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      direction:
                        type: string
                        enum:
                        - asc
                        - desc
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
                  maximum: 200
            example:
              filters:
              - field: status
                op: eq
                value: active
              - field: createdAt
                op: gt
                value: '2026-01-01T00:00:00Z'
              sort:
              - field: createdAt
                direction: desc
              page: 1
              limit: 50
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SsoList'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Sso:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - scheduled
          - running
          - completed
          - failed
        description: &id001
          type: string
        notes: &id002
          type: string
        externalId: &id003
          type: string
        threshold: &id004
          type: number
          format: float
        capacity: &id005
          type: integer
        default: &id006
          type: boolean
        active: &id007
          type: boolean
        dueDate: &id008
          type: string
          format: date
        startDate: &id009
          type: string
          format: date
        parentId: &id010
          type: string
          format: uuid
        websiteUrl: &id011
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    SsoList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Sso'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateSsoRequest:
      type: object
      properties:
        description: *id001
        notes: *id002
        externalId: *id003
        threshold: *id004
        capacity: *id005
        default: *id006
        active: *id007
        dueDate: *id008
        startDate: *id009
        parentId: *id010
        websiteUrl: *id011
      required:
      - description
      - notes
    UpdateSsoRequest:
      type: object
      properties:
        description: *id001
        notes: *id002
        externalId: *id003
        threshold: *id004
        capacity: *id005
        default: *id006
        active: *id007
        dueDate: *id008
        startDate: *id009
        parentId: *id010
        websiteUrl: *id011
      required:
      - description
      - notes
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
