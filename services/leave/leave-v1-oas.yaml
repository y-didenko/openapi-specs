openapi: 3.0.3
info:
  title: Leave API
  description: Time-off requests and balances.
  version: 2.0.0
  contact:
    name: Leave Team
    email: leave@example.com
servers:
- url: https://api.example.com/leave/v1
  description: Production
- url: https://staging-api.example.com/leave/v1
  description: Staging
tags:
- name: Leave
  description: Leave resource operations.
- name: Notes
  description: Notes resource operations.
- name: Health
  description: Service health checks.
paths:
  /leave:
    get:
      tags:
      - Leave
      summary: List leave
      operationId: listLeave
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of leave.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Leave
      summary: Create leave
      operationId: createLeave
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLeaveRequest'
      responses:
        '201':
          description: Leave created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Leave'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /leave/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Leave
      summary: Get leave by ID
      operationId: getLeave
      responses:
        '200':
          description: Leave details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Leave'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Leave
      summary: Update leave
      operationId: updateLeave
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLeaveRequest'
      responses:
        '200':
          description: Leave updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Leave'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Leave
      summary: Delete leave
      operationId: deleteLeave
      responses:
        '204':
          description: Leave deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /notes:
    get:
      tags:
      - Notes
      summary: List notes
      operationId: listNote
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of notes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Notes
      summary: Create note
      operationId: createNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNoteRequest'
      responses:
        '201':
          description: Note created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /notes/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Notes
      summary: Get note by ID
      operationId: getNote
      responses:
        '200':
          description: Note details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Notes
      summary: Update note
      operationId: updateNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNoteRequest'
      responses:
        '200':
          description: Note updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Notes
      summary: Delete note
      operationId: deleteNote
      responses:
        '204':
          description: Note deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Leave:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - new
          - in_progress
          - resolved
          - closed
        externalId: &id001
          type: string
        name: &id002
          type: string
        position: &id003
          type: integer
        threshold: &id004
          type: number
          format: float
        visible: &id005
          type: boolean
        verified: &id006
          type: boolean
        completedAt: &id007
          type: string
          format: date-time
        dueDate: &id008
          type: string
          format: date
        tagId: &id009
          type: string
          format: uuid
        email: &id010
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    LeaveList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Leave'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateLeaveRequest:
      type: object
      properties:
        externalId: *id001
        name: *id002
        position: *id003
        threshold: *id004
        visible: *id005
        verified: *id006
        completedAt: *id007
        dueDate: *id008
        tagId: *id009
        email: *id010
      required:
      - externalId
      - name
    UpdateLeaveRequest:
      type: object
      properties:
        externalId: *id001
        name: *id002
        position: *id003
        threshold: *id004
        visible: *id005
        verified: *id006
        completedAt: *id007
        dueDate: *id008
        tagId: *id009
        email: *id010
      required:
      - externalId
      - name
    Note:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - new
          - in_progress
          - resolved
          - closed
        slug: &id011
          type: string
        summary: &id012
          type: string
        notes: &id013
          type: string
        default: &id014
          type: boolean
        dueDate: &id015
          type: string
          format: date
        startDate: &id016
          type: string
          format: date
        amount: &id017
          type: number
          format: float
        price: &id018
          type: number
          format: float
        parentId: &id019
          type: string
          format: uuid
        organizationId: &id020
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    NoteList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Note'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateNoteRequest:
      type: object
      properties:
        slug: *id011
        summary: *id012
        notes: *id013
        default: *id014
        dueDate: *id015
        startDate: *id016
        amount: *id017
        price: *id018
        parentId: *id019
        organizationId: *id020
      required:
      - slug
      - summary
    UpdateNoteRequest:
      type: object
      properties:
        slug: *id011
        summary: *id012
        notes: *id013
        default: *id014
        dueDate: *id015
        startDate: *id016
        amount: *id017
        price: *id018
        parentId: *id019
        organizationId: *id020
      required:
      - slug
      - summary
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
