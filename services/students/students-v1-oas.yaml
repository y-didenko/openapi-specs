openapi: 3.0.3
info:
  title: Students API
  description: Student records and enrollment.
  version: 2.1.0
  contact:
    name: Students Team
    email: students@example.com
servers:
- url: https://api.example.com/students/v1
  description: Production
- url: https://staging-api.example.com/students/v1
  description: Staging
tags:
- name: Students
  description: Students resource operations.
- name: Logs
  description: Logs resource operations.
- name: Health
  description: Service health checks.
paths:
  /students:
    get:
      tags:
      - Students
      summary: List students
      operationId: listStudent
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of students.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Students
      summary: Create student
      operationId: createStudent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStudentRequest'
      responses:
        '201':
          description: Student created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Student'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /students/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Students
      summary: Get student by ID
      operationId: getStudent
      responses:
        '200':
          description: Student details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Student'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Students
      summary: Update student
      operationId: updateStudent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStudentRequest'
      responses:
        '200':
          description: Student updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Student'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Students
      summary: Delete student
      operationId: deleteStudent
      responses:
        '204':
          description: Student deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /logs:
    get:
      tags:
      - Logs
      summary: List logs
      operationId: listLog
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of logs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Logs
      summary: Create log
      operationId: createLog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLogRequest'
      responses:
        '201':
          description: Log created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /logs/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Logs
      summary: Get log by ID
      operationId: getLog
      responses:
        '200':
          description: Log details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Logs
      summary: Update log
      operationId: updateLog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLogRequest'
      responses:
        '200':
          description: Log updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Logs
      summary: Delete log
      operationId: deleteLog
      responses:
        '204':
          description: Log deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Student:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - approved
          - rejected
        slug: &id001
          type: string
        code: &id002
          type: string
        active: &id003
          type: boolean
        lastSeenAt: &id004
          type: string
          format: date-time
        dueDate: &id005
          type: string
          format: date
        discount: &id006
          type: number
          format: float
        updatedBy: &id007
          type: string
          format: uuid
        parentId: &id008
          type: string
          format: uuid
        email: &id009
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    StudentList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Student'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateStudentRequest:
      type: object
      properties:
        slug: *id001
        code: *id002
        active: *id003
        lastSeenAt: *id004
        dueDate: *id005
        discount: *id006
        updatedBy: *id007
        parentId: *id008
        email: *id009
      required:
      - slug
      - code
    UpdateStudentRequest:
      type: object
      properties:
        slug: *id001
        code: *id002
        active: *id003
        lastSeenAt: *id004
        dueDate: *id005
        discount: *id006
        updatedBy: *id007
        parentId: *id008
        email: *id009
      required:
      - slug
      - code
    Log:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - approved
          - rejected
        description: &id010
          type: string
        code: &id011
          type: string
        threshold: &id012
          type: number
          format: float
        score: &id013
          type: number
          format: float
        active: &id014
          type: boolean
        dueDate: &id015
          type: string
          format: date
        fee: &id016
          type: number
          format: float
        amount: &id017
          type: number
          format: float
        teamId: &id018
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    LogList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Log'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateLogRequest:
      type: object
      properties:
        description: *id010
        code: *id011
        threshold: *id012
        score: *id013
        active: *id014
        dueDate: *id015
        fee: *id016
        amount: *id017
        teamId: *id018
      required:
      - description
      - code
    UpdateLogRequest:
      type: object
      properties:
        description: *id010
        code: *id011
        threshold: *id012
        score: *id013
        active: *id014
        dueDate: *id015
        fee: *id016
        amount: *id017
        teamId: *id018
      required:
      - description
      - code
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
