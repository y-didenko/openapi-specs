openapi: 3.0.3
info:
  title: Page Builder API
  description: Drag-and-drop page composition.
  version: 1.3.4
  contact:
    name: Page Builder Team
    email: pagebuilder@example.com
servers:
- url: https://api.example.com/page-builder/v1
  description: Production
- url: https://staging-api.example.com/page-builder/v1
  description: Staging
tags:
- name: Page Builder
  description: Page Builder resource operations.
- name: Notes
  description: Notes resource operations.
- name: Health
  description: Service health checks.
paths:
  /page-builder:
    get:
      tags:
      - Page Builder
      summary: List page builder
      operationId: listPageBuilder
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of page builder.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageBuilderList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Page Builder
      summary: Create page builder
      operationId: createPageBuilder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePageBuilderRequest'
      responses:
        '201':
          description: Page Builder created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageBuilder'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /page-builder/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Page Builder
      summary: Get page builder by ID
      operationId: getPageBuilder
      responses:
        '200':
          description: Page Builder details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageBuilder'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Page Builder
      summary: Update page builder
      operationId: updatePageBuilder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePageBuilderRequest'
      responses:
        '200':
          description: Page Builder updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageBuilder'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Page Builder
      summary: Delete page builder
      operationId: deletePageBuilder
      responses:
        '204':
          description: Page Builder deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /notes:
    get:
      tags:
      - Notes
      summary: List notes
      operationId: listNote
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of notes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Notes
      summary: Create note
      operationId: createNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNoteRequest'
      responses:
        '201':
          description: Note created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /notes/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Notes
      summary: Get note by ID
      operationId: getNote
      responses:
        '200':
          description: Note details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Notes
      summary: Update note
      operationId: updateNote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNoteRequest'
      responses:
        '200':
          description: Note updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Notes
      summary: Delete note
      operationId: deleteNote
      responses:
        '204':
          description: Note deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    PageBuilder:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - open
          - closed
        title: &id001
          type: string
        slug: &id002
          type: string
        summary: &id003
          type: string
        weight: &id004
          type: number
          format: float
        rank: &id005
          type: integer
        active: &id006
          type: boolean
        lastSeenAt: &id007
          type: string
          format: date-time
        dueDate: &id008
          type: string
          format: date
        categoryId: &id009
          type: string
          format: uuid
        updatedBy: &id010
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    PageBuilderList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PageBuilder'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreatePageBuilderRequest:
      type: object
      properties:
        title: *id001
        slug: *id002
        summary: *id003
        weight: *id004
        rank: *id005
        active: *id006
        lastSeenAt: *id007
        dueDate: *id008
        categoryId: *id009
        updatedBy: *id010
      required:
      - title
      - slug
    UpdatePageBuilderRequest:
      type: object
      properties:
        title: *id001
        slug: *id002
        summary: *id003
        weight: *id004
        rank: *id005
        active: *id006
        lastSeenAt: *id007
        dueDate: *id008
        categoryId: *id009
        updatedBy: *id010
      required:
      - title
      - slug
    Note:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - scheduled
          - running
          - completed
          - failed
        displayName: &id011
          type: string
        description: &id012
          type: string
        count: &id013
          type: integer
        default: &id014
          type: boolean
        publishedAt: &id015
          type: string
          format: date-time
        completedAt: &id016
          type: string
          format: date-time
        discount: &id017
          type: number
          format: float
        subtotal: &id018
          type: number
          format: float
        teamId: &id019
          type: string
          format: uuid
        createdBy: &id020
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    NoteList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Note'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateNoteRequest:
      type: object
      properties:
        displayName: *id011
        description: *id012
        count: *id013
        default: *id014
        publishedAt: *id015
        completedAt: *id016
        discount: *id017
        subtotal: *id018
        teamId: *id019
        createdBy: *id020
      required:
      - displayName
      - description
    UpdateNoteRequest:
      type: object
      properties:
        displayName: *id011
        description: *id012
        count: *id013
        default: *id014
        publishedAt: *id015
        completedAt: *id016
        discount: *id017
        subtotal: *id018
        teamId: *id019
        createdBy: *id020
      required:
      - displayName
      - description
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
