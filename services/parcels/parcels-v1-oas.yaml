openapi: 3.0.3
info:
  title: Parcels API
  description: Parcel-level metadata.
  version: 2.0.0
  contact:
    name: Parcels Team
    email: parcels@example.com
servers:
- url: https://api.example.com/parcels/v1
  description: Production
- url: https://staging-api.example.com/parcels/v1
  description: Staging
tags:
- name: Parcels
  description: Parcels resource operations.
- name: Health
  description: Service health checks.
paths:
  /parcels:
    get:
      tags:
      - Parcels
      summary: List parcels
      operationId: listParcel
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of parcels.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParcelList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Parcels
      summary: Create parcel
      operationId: createParcel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateParcelRequest'
      responses:
        '201':
          description: Parcel created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Parcel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /parcels/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Parcels
      summary: Get parcel by ID
      operationId: getParcel
      responses:
        '200':
          description: Parcel details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Parcel'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Parcels
      summary: Update parcel
      operationId: updateParcel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateParcelRequest'
      responses:
        '200':
          description: Parcel updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Parcel'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Parcels
      summary: Delete parcel
      operationId: deleteParcel
      responses:
        '204':
          description: Parcel deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Parcel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - open
          - closed
        slug: &id001
          type: string
        code: &id002
          type: string
        enabled: &id003
          type: boolean
        locked: &id004
          type: boolean
        dueDate: &id005
          type: string
          format: date
        fee: &id006
          type: number
          format: float
        currency: &id007
          type: string
        ownerId: &id008
          type: string
          format: uuid
        organizationId: &id009
          type: string
          format: uuid
        email: &id010
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    ParcelList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Parcel'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateParcelRequest:
      type: object
      properties:
        slug: *id001
        code: *id002
        enabled: *id003
        locked: *id004
        dueDate: *id005
        fee: *id006
        currency: *id007
        ownerId: *id008
        organizationId: *id009
        email: *id010
      required:
      - slug
      - code
    UpdateParcelRequest:
      type: object
      properties:
        slug: *id001
        code: *id002
        enabled: *id003
        locked: *id004
        dueDate: *id005
        fee: *id006
        currency: *id007
        ownerId: *id008
        organizationId: *id009
        email: *id010
      required:
      - slug
      - code
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
