openapi: 3.0.3
info:
  title: Transfers API
  description: ACH, wire, and internal money transfers.
  version: 1.1.0
  contact:
    name: Transfers Team
    email: transfers@example.com
servers:
- url: https://api.example.com/transfers/v1
  description: Production
- url: https://staging-api.example.com/transfers/v1
  description: Staging
tags:
- name: Transfers
  description: Transfers resource operations.
- name: Health
  description: Service health checks.
paths:
  /transfers:
    get:
      tags:
      - Transfers
      summary: List transfers
      operationId: listTransfer
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of transfers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Transfers
      summary: Create transfer
      operationId: createTransfer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransferRequest'
      responses:
        '201':
          description: Transfer created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /transfers/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Transfers
      summary: Get transfer by ID
      operationId: getTransfer
      responses:
        '200':
          description: Transfer details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Transfers
      summary: Update transfer
      operationId: updateTransfer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTransferRequest'
      responses:
        '200':
          description: Transfer updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Transfers
      summary: Delete transfer
      operationId: deleteTransfer
      responses:
        '204':
          description: Transfer deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Transfer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - scheduled
          - running
          - completed
          - failed
        notes: &id001
          type: string
        title: &id002
          type: string
        externalId: &id003
          type: string
        default: &id004
          type: boolean
        lastSeenAt: &id005
          type: string
          format: date-time
        fee: &id006
          type: number
          format: float
        total: &id007
          type: number
          format: float
        parentId: &id008
          type: string
          format: uuid
        ownerId: &id009
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    TransferList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Transfer'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateTransferRequest:
      type: object
      properties:
        notes: *id001
        title: *id002
        externalId: *id003
        default: *id004
        lastSeenAt: *id005
        fee: *id006
        total: *id007
        parentId: *id008
        ownerId: *id009
      required:
      - notes
      - title
    UpdateTransferRequest:
      type: object
      properties:
        notes: *id001
        title: *id002
        externalId: *id003
        default: *id004
        lastSeenAt: *id005
        fee: *id006
        total: *id007
        parentId: *id008
        ownerId: *id009
      required:
      - notes
      - title
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
