openapi: 3.0.3
info:
  title: Queues API
  description: Message queue management.
  version: 1.2.0
  contact:
    name: Queues Team
    email: queues@example.com
servers:
- url: https://api.example.com/queues/v1
  description: Production
- url: https://staging-api.example.com/queues/v1
  description: Staging
tags:
- name: Queues
  description: Queues resource operations.
- name: Logs
  description: Logs resource operations.
- name: Health
  description: Service health checks.
paths:
  /queues:
    get:
      tags:
      - Queues
      summary: List queues
      operationId: listQueue
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of queues.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Queues
      summary: Create queue
      operationId: createQueue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQueueRequest'
      responses:
        '201':
          description: Queue created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Queue'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /queues/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Queues
      summary: Get queue by ID
      operationId: getQueue
      responses:
        '200':
          description: Queue details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Queue'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Queues
      summary: Update queue
      operationId: updateQueue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateQueueRequest'
      responses:
        '200':
          description: Queue updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Queue'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Queues
      summary: Delete queue
      operationId: deleteQueue
      responses:
        '204':
          description: Queue deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /queues/stats:
    get:
      tags:
      - Queues
      summary: Aggregate queues stats
      operationId: getQueueStats
      description: Returns aggregate counters (totals, by status, by day) suitable for dashboards.
      parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Aggregate stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  byDay:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        count:
                          type: integer
                example:
                  total: 1234
                  byStatus:
                    active: 800
                    archived: 200
                    pending: 234
                  byDay:
                  - date: '2026-04-28'
                    count: 42
                  - date: '2026-04-29'
                    count: 51
      security:
      - bearerAuth: []
  /logs:
    get:
      tags:
      - Logs
      summary: List logs
      operationId: listLog
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of logs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Logs
      summary: Create log
      operationId: createLog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLogRequest'
      responses:
        '201':
          description: Log created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /logs/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Logs
      summary: Get log by ID
      operationId: getLog
      responses:
        '200':
          description: Log details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Logs
      summary: Update log
      operationId: updateLog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLogRequest'
      responses:
        '200':
          description: Log updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Logs
      summary: Delete log
      operationId: deleteLog
      responses:
        '204':
          description: Log deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Queue:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - open
          - closed
        name: &id001
          type: string
        externalId: &id002
          type: string
        verified: &id003
          type: boolean
        visible: &id004
          type: boolean
        lastSeenAt: &id005
          type: string
          format: date-time
        expiresAt: &id006
          type: string
          format: date-time
        ownerId: &id007
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    QueueList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Queue'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateQueueRequest:
      type: object
      properties:
        name: *id001
        externalId: *id002
        verified: *id003
        visible: *id004
        lastSeenAt: *id005
        expiresAt: *id006
        ownerId: *id007
      required:
      - name
      - externalId
    UpdateQueueRequest:
      type: object
      properties:
        name: *id001
        externalId: *id002
        verified: *id003
        visible: *id004
        lastSeenAt: *id005
        expiresAt: *id006
        ownerId: *id007
      required:
      - name
      - externalId
    Log:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - draft
          - published
          - archived
        reference: &id008
          type: string
        externalId: &id009
          type: string
        code: &id010
          type: string
        version: &id011
          type: integer
        locked: &id012
          type: boolean
        visible: &id013
          type: boolean
        endDate: &id014
          type: string
          format: date
        total: &id015
          type: number
          format: float
        fee: &id016
          type: number
          format: float
        ownerId: &id017
          type: string
          format: uuid
        phone: &id018
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    LogList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Log'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateLogRequest:
      type: object
      properties:
        reference: *id008
        externalId: *id009
        code: *id010
        version: *id011
        locked: *id012
        visible: *id013
        endDate: *id014
        total: *id015
        fee: *id016
        ownerId: *id017
        phone: *id018
      required:
      - reference
      - externalId
    UpdateLogRequest:
      type: object
      properties:
        reference: *id008
        externalId: *id009
        code: *id010
        version: *id011
        locked: *id012
        visible: *id013
        endDate: *id014
        total: *id015
        fee: *id016
        ownerId: *id017
        phone: *id018
      required:
      - reference
      - externalId
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
