openapi: 3.0.3
info:
  title: Prescriptions API
  description: Prescription orders and pharmacy routing.
  version: 1.0.0
  contact:
    name: Prescriptions Team
    email: prescriptions@example.com
servers:
- url: https://api.example.com/prescriptions/v1
  description: Production
- url: https://staging-api.example.com/prescriptions/v1
  description: Staging
tags:
- name: Prescriptions
  description: Prescriptions resource operations.
- name: Exports
  description: Exports resource operations.
- name: Health
  description: Service health checks.
paths:
  /prescriptions:
    get:
      tags:
      - Prescriptions
      summary: List prescriptions
      operationId: listPrescription
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of prescriptions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrescriptionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Prescriptions
      summary: Create prescription
      operationId: createPrescription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePrescriptionRequest'
      responses:
        '201':
          description: Prescription created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prescription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /prescriptions/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Prescriptions
      summary: Get prescription by ID
      operationId: getPrescription
      responses:
        '200':
          description: Prescription details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prescription'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Prescriptions
      summary: Update prescription
      operationId: updatePrescription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePrescriptionRequest'
      responses:
        '200':
          description: Prescription updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prescription'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Prescriptions
      summary: Delete prescription
      operationId: deletePrescription
      responses:
        '204':
          description: Prescription deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /prescriptions/stats:
    get:
      tags:
      - Prescriptions
      summary: Aggregate prescriptions stats
      operationId: getPrescriptionStats
      description: Returns aggregate counters (totals, by status, by day) suitable for dashboards.
      parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Aggregate stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  byDay:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        count:
                          type: integer
                example:
                  total: 1234
                  byStatus:
                    active: 800
                    archived: 200
                    pending: 234
                  byDay:
                  - date: '2026-04-28'
                    count: 42
                  - date: '2026-04-29'
                    count: 51
      security:
      - bearerAuth: []
  /exports:
    get:
      tags:
      - Exports
      summary: List exports
      operationId: listExport
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of exports.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Exports
      summary: Create export
      operationId: createExport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExportRequest'
      responses:
        '201':
          description: Export created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Export'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /exports/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Exports
      summary: Get export by ID
      operationId: getExport
      responses:
        '200':
          description: Export details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Export'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Exports
      summary: Update export
      operationId: updateExport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExportRequest'
      responses:
        '200':
          description: Export updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Export'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Exports
      summary: Delete export
      operationId: deleteExport
      responses:
        '204':
          description: Export deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Prescription:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - queued
          - processing
          - completed
          - failed
          - cancelled
        description: &id001
          type: string
        summary: &id002
          type: string
        default: &id003
          type: boolean
        visible: &id004
          type: boolean
        scheduledAt: &id005
          type: string
          format: date-time
        amount: &id006
          type: number
          format: float
        teamId: &id007
          type: string
          format: uuid
        ownerId: &id008
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    PrescriptionList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Prescription'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreatePrescriptionRequest:
      type: object
      properties:
        description: *id001
        summary: *id002
        default: *id003
        visible: *id004
        scheduledAt: *id005
        amount: *id006
        teamId: *id007
        ownerId: *id008
      required:
      - description
      - summary
    UpdatePrescriptionRequest:
      type: object
      properties:
        description: *id001
        summary: *id002
        default: *id003
        visible: *id004
        scheduledAt: *id005
        amount: *id006
        teamId: *id007
        ownerId: *id008
      required:
      - description
      - summary
    Export:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - scheduled
          - running
          - completed
          - failed
        slug: &id009
          type: string
        description: &id010
          type: string
        displayName: &id011
          type: string
        count: &id012
          type: integer
        default: &id013
          type: boolean
        visible: &id014
          type: boolean
        expiresAt: &id015
          type: string
          format: date-time
        parentId: &id016
          type: string
          format: uuid
        organizationId: &id017
          type: string
          format: uuid
        websiteUrl: &id018
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    ExportList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Export'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateExportRequest:
      type: object
      properties:
        slug: *id009
        description: *id010
        displayName: *id011
        count: *id012
        default: *id013
        visible: *id014
        expiresAt: *id015
        parentId: *id016
        organizationId: *id017
        websiteUrl: *id018
      required:
      - slug
      - description
    UpdateExportRequest:
      type: object
      properties:
        slug: *id009
        description: *id010
        displayName: *id011
        count: *id012
        default: *id013
        visible: *id014
        expiresAt: *id015
        parentId: *id016
        organizationId: *id017
        websiteUrl: *id018
      required:
      - slug
      - description
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
