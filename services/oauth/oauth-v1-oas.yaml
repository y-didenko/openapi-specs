openapi: 3.0.3
info:
  title: OAuth API
  description: OAuth 2.0 client and grant management.
  version: 1.2.0
  contact:
    name: OAuth Team
    email: oauth@example.com
servers:
- url: https://api.example.com/oauth/v1
  description: Production
- url: https://staging-api.example.com/oauth/v1
  description: Staging
tags:
- name: Oauth
  description: Oauth resource operations.
- name: Links
  description: Links resource operations.
- name: Health
  description: Service health checks.
paths:
  /oauth:
    get:
      tags:
      - Oauth
      summary: List oauth
      operationId: listOauth
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of oauth.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OauthList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Oauth
      summary: Create oauth
      operationId: createOauth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOauthRequest'
      responses:
        '201':
          description: Oauth created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Oauth'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /oauth/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Oauth
      summary: Get oauth by ID
      operationId: getOauth
      responses:
        '200':
          description: Oauth details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Oauth'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Oauth
      summary: Update oauth
      operationId: updateOauth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOauthRequest'
      responses:
        '200':
          description: Oauth updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Oauth'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Oauth
      summary: Delete oauth
      operationId: deleteOauth
      responses:
        '204':
          description: Oauth deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /oauth/stats:
    get:
      tags:
      - Oauth
      summary: Aggregate oauth stats
      operationId: getOauthStats
      description: Returns aggregate counters (totals, by status, by day) suitable for dashboards.
      parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Aggregate stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  byDay:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        count:
                          type: integer
                example:
                  total: 1234
                  byStatus:
                    active: 800
                    archived: 200
                    pending: 234
                  byDay:
                  - date: '2026-04-28'
                    count: 42
                  - date: '2026-04-29'
                    count: 51
      security:
      - bearerAuth: []
  /links:
    get:
      tags:
      - Links
      summary: List links
      operationId: listLink
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of links.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Links
      summary: Create link
      operationId: createLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLinkRequest'
      responses:
        '201':
          description: Link created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /links/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Links
      summary: Get link by ID
      operationId: getLink
      responses:
        '200':
          description: Link details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Links
      summary: Update link
      operationId: updateLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLinkRequest'
      responses:
        '200':
          description: Link updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Links
      summary: Delete link
      operationId: deleteLink
      responses:
        '204':
          description: Link deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Oauth:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - scheduled
          - running
          - completed
          - failed
        slug: &id001
          type: string
        reference: &id002
          type: string
        position: &id003
          type: integer
        enabled: &id004
          type: boolean
        lastSeenAt: &id005
          type: string
          format: date-time
        completedAt: &id006
          type: string
          format: date-time
        discount: &id007
          type: number
          format: float
        currency: &id008
          type: string
        teamId: &id009
          type: string
          format: uuid
        parentId: &id010
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    OauthList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Oauth'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateOauthRequest:
      type: object
      properties:
        slug: *id001
        reference: *id002
        position: *id003
        enabled: *id004
        lastSeenAt: *id005
        completedAt: *id006
        discount: *id007
        currency: *id008
        teamId: *id009
        parentId: *id010
      required:
      - slug
      - reference
    UpdateOauthRequest:
      type: object
      properties:
        slug: *id001
        reference: *id002
        position: *id003
        enabled: *id004
        lastSeenAt: *id005
        completedAt: *id006
        discount: *id007
        currency: *id008
        teamId: *id009
        parentId: *id010
      required:
      - slug
      - reference
    Link:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - queued
          - processing
          - completed
          - failed
          - cancelled
        name: &id011
          type: string
        slug: &id012
          type: string
        externalId: &id013
          type: string
        active: &id014
          type: boolean
        scheduledAt: &id015
          type: string
          format: date-time
        dueDate: &id016
          type: string
          format: date
        currency: &id017
          type: string
        parentId: &id018
          type: string
          format: uuid
        categoryId: &id019
          type: string
          format: uuid
        websiteUrl: &id020
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    LinkList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Link'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateLinkRequest:
      type: object
      properties:
        name: *id011
        slug: *id012
        externalId: *id013
        active: *id014
        scheduledAt: *id015
        dueDate: *id016
        currency: *id017
        parentId: *id018
        categoryId: *id019
        websiteUrl: *id020
      required:
      - name
      - slug
    UpdateLinkRequest:
      type: object
      properties:
        name: *id011
        slug: *id012
        externalId: *id013
        active: *id014
        scheduledAt: *id015
        dueDate: *id016
        currency: *id017
        parentId: *id018
        categoryId: *id019
        websiteUrl: *id020
      required:
      - name
      - slug
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
