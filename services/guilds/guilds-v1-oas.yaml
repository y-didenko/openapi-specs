openapi: 3.0.3
info:
  title: Guilds API
  description: Player guilds and clans.
  version: 1.3.4
  contact:
    name: Guilds Team
    email: guilds@example.com
servers:
- url: https://api.example.com/guilds/v1
  description: Production
- url: https://staging-api.example.com/guilds/v1
  description: Staging
tags:
- name: Guilds
  description: Guilds resource operations.
- name: Alerts
  description: Alerts resource operations.
- name: Health
  description: Service health checks.
paths:
  /guilds:
    get:
      tags:
      - Guilds
      summary: List guilds
      operationId: listGuild
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of guilds.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuildList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Guilds
      summary: Create guild
      operationId: createGuild
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGuildRequest'
      responses:
        '201':
          description: Guild created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guild'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /guilds/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Guilds
      summary: Get guild by ID
      operationId: getGuild
      responses:
        '200':
          description: Guild details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guild'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Guilds
      summary: Update guild
      operationId: updateGuild
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGuildRequest'
      responses:
        '200':
          description: Guild updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guild'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Guilds
      summary: Delete guild
      operationId: deleteGuild
      responses:
        '204':
          description: Guild deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /alerts:
    get:
      tags:
      - Alerts
      summary: List alerts
      operationId: listAlert
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of alerts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Alerts
      summary: Create alert
      operationId: createAlert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAlertRequest'
      responses:
        '201':
          description: Alert created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /alerts/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Alerts
      summary: Get alert by ID
      operationId: getAlert
      responses:
        '200':
          description: Alert details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Alerts
      summary: Update alert
      operationId: updateAlert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAlertRequest'
      responses:
        '200':
          description: Alert updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Alerts
      summary: Delete alert
      operationId: deleteAlert
      responses:
        '204':
          description: Alert deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    Guild:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - scheduled
          - running
          - completed
          - failed
        notes: &id001
          type: string
        code: &id002
          type: string
        slug: &id003
          type: string
        enabled: &id004
          type: boolean
        active: &id005
          type: boolean
        startDate: &id006
          type: string
          format: date
        dueDate: &id007
          type: string
          format: date
        createdBy: &id008
          type: string
          format: uuid
        organizationId: &id009
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    GuildList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Guild'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateGuildRequest:
      type: object
      properties:
        notes: *id001
        code: *id002
        slug: *id003
        enabled: *id004
        active: *id005
        startDate: *id006
        dueDate: *id007
        createdBy: *id008
        organizationId: *id009
      required:
      - notes
      - code
    UpdateGuildRequest:
      type: object
      properties:
        notes: *id001
        code: *id002
        slug: *id003
        enabled: *id004
        active: *id005
        startDate: *id006
        dueDate: *id007
        createdBy: *id008
        organizationId: *id009
      required:
      - notes
      - code
    Alert:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - queued
          - processing
          - completed
          - failed
          - cancelled
        externalId: &id010
          type: string
        title: &id011
          type: string
        position: &id012
          type: integer
        active: &id013
          type: boolean
        dueDate: &id014
          type: string
          format: date
        scheduledAt: &id015
          type: string
          format: date-time
        price: &id016
          type: number
          format: float
        total: &id017
          type: number
          format: float
        ownerId: &id018
          type: string
          format: uuid
        categoryId: &id019
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    AlertList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Alert'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateAlertRequest:
      type: object
      properties:
        externalId: *id010
        title: *id011
        position: *id012
        active: *id013
        dueDate: *id014
        scheduledAt: *id015
        price: *id016
        total: *id017
        ownerId: *id018
        categoryId: *id019
      required:
      - externalId
      - title
    UpdateAlertRequest:
      type: object
      properties:
        externalId: *id010
        title: *id011
        position: *id012
        active: *id013
        dueDate: *id014
        scheduledAt: *id015
        price: *id016
        total: *id017
        ownerId: *id018
        categoryId: *id019
      required:
      - externalId
      - title
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
