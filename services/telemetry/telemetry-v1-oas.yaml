openapi: 3.0.3
info:
  title: Telemetry API
  description: Telemetry ingestion.
  version: 1.2.0
  contact:
    name: Telemetry Team
    email: telemetry@example.com
servers:
- url: https://api.example.com/telemetry/v1
  description: Production
- url: https://staging-api.example.com/telemetry/v1
  description: Staging
tags:
- name: Telemetry
  description: Telemetry resource operations.
- name: Links
  description: Links resource operations.
- name: Logs
  description: Logs resource operations.
- name: Health
  description: Service health checks.
paths:
  /telemetry:
    get:
      tags:
      - Telemetry
      summary: List telemetry
      operationId: listTelemetry
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of telemetry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Telemetry
      summary: Create telemetry
      operationId: createTelemetry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTelemetryRequest'
      responses:
        '201':
          description: Telemetry created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Telemetry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /telemetry/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Telemetry
      summary: Get telemetry by ID
      operationId: getTelemetry
      responses:
        '200':
          description: Telemetry details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Telemetry'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Telemetry
      summary: Update telemetry
      operationId: updateTelemetry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTelemetryRequest'
      responses:
        '200':
          description: Telemetry updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Telemetry'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Telemetry
      summary: Delete telemetry
      operationId: deleteTelemetry
      responses:
        '204':
          description: Telemetry deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /telemetry/search:
    post:
      tags:
      - Telemetry
      summary: Advanced search across telemetry
      operationId: searchTelemetry
      description: Submit a structured query for complex filtering not expressible via the list endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      op:
                        type: string
                        enum:
                        - eq
                        - ne
                        - gt
                        - lt
                        - in
                        - contains
                      value: {}
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      direction:
                        type: string
                        enum:
                        - asc
                        - desc
                page:
                  type: integer
                  default: 1
                limit:
                  type: integer
                  default: 20
                  maximum: 200
            example:
              filters:
              - field: status
                op: eq
                value: active
              - field: createdAt
                op: gt
                value: '2026-01-01T00:00:00Z'
              sort:
              - field: createdAt
                direction: desc
              page: 1
              limit: 50
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryList'
      security:
      - bearerAuth: []
  /telemetry/stats:
    get:
      tags:
      - Telemetry
      summary: Aggregate telemetry stats
      operationId: getTelemetryStats
      description: Returns aggregate counters (totals, by status, by day) suitable for dashboards.
      parameters:
      - name: from
        in: query
        schema:
          type: string
          format: date
      - name: to
        in: query
        schema:
          type: string
          format: date
      responses:
        '200':
          description: Aggregate stats.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                  byDay:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        count:
                          type: integer
                example:
                  total: 1234
                  byStatus:
                    active: 800
                    archived: 200
                    pending: 234
                  byDay:
                  - date: '2026-04-28'
                    count: 42
                  - date: '2026-04-29'
                    count: 51
      security:
      - bearerAuth: []
  /links:
    get:
      tags:
      - Links
      summary: List links
      operationId: listLink
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of links.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Links
      summary: Create link
      operationId: createLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLinkRequest'
      responses:
        '201':
          description: Link created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /links/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Links
      summary: Get link by ID
      operationId: getLink
      responses:
        '200':
          description: Link details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Links
      summary: Update link
      operationId: updateLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLinkRequest'
      responses:
        '200':
          description: Link updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Link'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Links
      summary: Delete link
      operationId: deleteLink
      responses:
        '204':
          description: Link deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /logs:
    get:
      tags:
      - Logs
      summary: List logs
      operationId: listLog
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
      - name: status
        in: query
        schema:
          type: string
      - name: q
        in: query
        description: Free-text search
        schema:
          type: string
      responses:
        '200':
          description: Paginated list of logs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogList'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
    post:
      tags:
      - Logs
      summary: Create log
      operationId: createLog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLogRequest'
      responses:
        '201':
          description: Log created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
      - bearerAuth: []
  /logs/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    get:
      tags:
      - Logs
      summary: Get log by ID
      operationId: getLog
      responses:
        '200':
          description: Log details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    patch:
      tags:
      - Logs
      summary: Update log
      operationId: updateLog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLogRequest'
      responses:
        '200':
          description: Log updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Logs
      summary: Delete log
      operationId: deleteLog
      responses:
        '204':
          description: Log deleted.
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - bearerAuth: []
  /logs/{id}/approve:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    post:
      tags:
      - Logs
      summary: Approve log
      operationId: approveLog
      description: Transitions the record to the approve state. Idempotent on records already in the target state.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for the transition.
                note:
                  type: string
            example:
              reason: manager_override
              note: Approved offline
      responses:
        '200':
          description: Record after transition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Invalid state transition
      security:
      - bearerAuth: []
  /logs/{id}/reject:
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    post:
      tags:
      - Logs
      summary: Reject log
      operationId: rejectLog
      description: Transitions the record to the reject state. Idempotent on records already in the target state.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for the transition.
                note:
                  type: string
            example:
              reason: manager_override
              note: Approved offline
      responses:
        '200':
          description: Record after transition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Log'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Invalid state transition
      security:
      - bearerAuth: []
  /health:
    get:
      tags:
      - Health
      summary: Service health probe
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  uptimeSeconds:
                    type: integer
                    example: 12345
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1234
        totalPages:
          type: integer
          example: 62
    Error:
      type: object
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: One or more fields failed validation.
        details:
          type: object
          additionalProperties: true
    CommentEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        author:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
    Attachment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        contentType:
          type: string
        size:
          type: integer
        url:
          type: string
          format: uri
        uploadedAt:
          type: string
          format: date-time
    Telemetry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - scheduled
          - running
          - completed
          - failed
        title: &id001
          type: string
        name: &id002
          type: string
        summary: &id003
          type: string
        default: &id004
          type: boolean
        startDate: &id005
          type: string
          format: date
        dueDate: &id006
          type: string
          format: date
        fee: &id007
          type: number
          format: float
        createdBy: &id008
          type: string
          format: uuid
        teamId: &id009
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    TelemetryList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Telemetry'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateTelemetryRequest:
      type: object
      properties:
        title: *id001
        name: *id002
        summary: *id003
        default: *id004
        startDate: *id005
        dueDate: *id006
        fee: *id007
        createdBy: *id008
        teamId: *id009
      required:
      - title
      - name
    UpdateTelemetryRequest:
      type: object
      properties:
        title: *id001
        name: *id002
        summary: *id003
        default: *id004
        startDate: *id005
        dueDate: *id006
        fee: *id007
        createdBy: *id008
        teamId: *id009
      required:
      - title
      - name
    Link:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - active
          - inactive
          - archived
        externalId: &id010
          type: string
        slug: &id011
          type: string
        description: &id012
          type: string
        rank: &id013
          type: integer
        threshold: &id014
          type: number
          format: float
        default: &id015
          type: boolean
        dueDate: &id016
          type: string
          format: date
        total: &id017
          type: number
          format: float
        currency: &id018
          type: string
        teamId: &id019
          type: string
          format: uuid
        email: &id020
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    LinkList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Link'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateLinkRequest:
      type: object
      properties:
        externalId: *id010
        slug: *id011
        description: *id012
        rank: *id013
        threshold: *id014
        default: *id015
        dueDate: *id016
        total: *id017
        currency: *id018
        teamId: *id019
        email: *id020
      required:
      - externalId
      - slug
    UpdateLinkRequest:
      type: object
      properties:
        externalId: *id010
        slug: *id011
        description: *id012
        rank: *id013
        threshold: *id014
        default: *id015
        dueDate: *id016
        total: *id017
        currency: *id018
        teamId: *id019
        email: *id020
      required:
      - externalId
      - slug
    Log:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - queued
          - processing
          - completed
          - failed
          - cancelled
        externalId: &id021
          type: string
        displayName: &id022
          type: string
        title: &id023
          type: string
        visible: &id024
          type: boolean
        verified: &id025
          type: boolean
        dueDate: &id026
          type: string
          format: date
        categoryId: &id027
          type: string
          format: uuid
        email: &id028
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - status
      - createdAt
      - updatedAt
    LogList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Log'
        pagination:
          $ref: '#/components/schemas/Pagination'
    CreateLogRequest:
      type: object
      properties:
        externalId: *id021
        displayName: *id022
        title: *id023
        visible: *id024
        verified: *id025
        dueDate: *id026
        categoryId: *id027
        email: *id028
      required:
      - externalId
      - displayName
    UpdateLogRequest:
      type: object
      properties:
        externalId: *id021
        displayName: *id022
        title: *id023
        visible: *id024
        verified: *id025
        dueDate: *id026
        categoryId: *id027
        email: *id028
      required:
      - externalId
      - displayName
  responses:
    BadRequest:
      description: "Bad request \u2014 input failed validation."
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
